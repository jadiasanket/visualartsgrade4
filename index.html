function ClassReviewModal({data,section,onClose}){
  // Build a unified timeline: collect all dates that have either a class log or student observations
  const dateMap = {}; // date → {log, students:[{s, obs}]}

  // Add class logs
  (data.classLogs||[]).forEach(l => {
    if(!dateMap[l.date]) dateMap[l.date] = {log:null, students:[]};
    dateMap[l.date].log = l;
  });

  // Add student observations grouped by date
  data.students.forEach(s => {
    (s.observations||[]).forEach(o => {
      const d = o.date||'Unknown date';
      if(!dateMap[d]) dateMap[d] = {log:null, students:[]};
      // Check if this student already has an entry for this date
      let entry = dateMap[d].students.find(e=>e.name===s.name);
      if(!entry){ entry={name:s.name, photo:s.photo, obs:[]}; dateMap[d].students.push(entry); }
      entry.obs.push(o);
    });
  });

  // Sort dates newest first (try to parse, fall back to string sort)
  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function parseDate(str){
    if(!str) return 0;
    const parts=str.split(' ');
    let d=0,m=-1,y=new Date().getFullYear();
    parts.forEach(p=>{if(MONTHS[p]!==undefined)m=MONTHS[p];else if(/^\d{4}$/.test(p))y=parseInt(p);else if(/^\d+$/.test(p))d=parseInt(p);});
    return m>=0?new Date(y,m,d).getTime():0;
  }
  const dates = Object.keys(dateMap).sort((a,b)=>parseDate(b)-parseDate(a));

  const tagColors={green:'var(--teal)',yellow:'var(--yellow)',red:'var(--coral)'};

  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'var(--popup-bg)',border:'1px solid var(--glass-border2)',
        borderRadius:20,width:'min(620px,95vw)',maxHeight:'88vh',
        display:'flex',flexDirection:'column',boxShadow:'var(--glass-shadow2)',backdropFilter:'blur(24px)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px 14px',borderBottom:'1px solid var(--glass-border)',flexShrink:0}}>
          <div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:'var(--tx)'}}>📝 {section.name} — Class Review</div>
            <div style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>{dates.length} session{dates.length!==1?'s':''} with notes</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--tx3)',fontSize:18,cursor:'pointer',lineHeight:1}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'14px 22px 20px'}}>
          {dates.length===0&&(
            <div style={{textAlign:'center',color:'var(--tx3)',fontSize:13,padding:'40px 0'}}>No notes yet. Add class logs or student observations to see them here.</div>
          )}
          {dates.map(date=>{
            const {log,students}=dateMap[date];
            const ratingCol=log&&log.rating?(log.rating<=2?'var(--coral)':log.rating===3?'var(--yellow)':'var(--teal)'):'var(--tx3)';
            return(
              <div key={date} style={{marginBottom:20}}>
                {/* Date header */}
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{height:1,flex:1,background:'var(--glass-border)'}}/>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--tx2)',whiteSpace:'nowrap'}}>{date}</div>
                  {log&&log.rating>0&&<span style={{fontSize:13,color:ratingCol,fontWeight:700,letterSpacing:1}}>{'★'.repeat(log.rating)}</span>}
                  <div style={{height:1,flex:1,background:'var(--glass-border)'}}/>
                </div>

                {/* Class note */}
                {log&&log.note&&(
                  <div style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',borderRadius:10,padding:'9px 13px',marginBottom:10,fontSize:12,color:'var(--tx2)',lineHeight:1.55,fontStyle:'italic'}}>
                    💬 {log.note}
                  </div>
                )}

                {/* Students for this date */}
                {students.length>0&&(
                  <div style={{display:'flex',flexDirection:'column',gap:7}}>
                    {students.map((entry,ei)=>{
                      const hasEsc=entry.obs.some(o=>o.escalation&&!o.escalationCleared);
                      return(
                        <div key={ei} style={{display:'flex',gap:10,background:'var(--glass-bg)',border:`1px solid ${hasEsc?'rgba(232,112,90,0.35)':'var(--glass-border)'}`,borderRadius:10,padding:'9px 12px',alignItems:'flex-start'}}>
                          {/* Avatar */}
                          {entry.photo?(
                            <div style={{width:30,height:30,borderRadius:'50%',overflow:'hidden',flexShrink:0,marginTop:1}}>
                              <img src={entry.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                            </div>
                          ):(
                            <div style={{width:30,height:30,borderRadius:'50%',background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,marginTop:1}}>👤</div>
                          )}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:700,color:'var(--tx)',marginBottom:4}}>
                              {entry.name}{hasEsc?' ⚠️':''}
                            </div>
                            {entry.obs.map((o,oi)=>(
                              <div key={oi} style={{marginBottom:oi<entry.obs.length-1?6:0}}>
                                {/* Thumb + tags */}
                                <div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>
                                  {o.thumb&&<span style={{fontSize:13}}>{o.thumb==='up'?'👍':'👎'}</span>}
                                  {(o.tags||[]).map((t,ti)=>{
                                    const td=OBS_TAGS.find(x=>x.label===t);
                                    return<span key={ti} style={{fontSize:10,padding:'1px 7px',borderRadius:8,background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',color:tagColors[td?td.color:'yellow']||'var(--tx2)',fontWeight:600}}>{t}</span>;
                                  })}
                                </div>
                                {o.note&&<div style={{fontSize:11,color:'var(--tx3)',marginTop:3,lineHeight:1.45,fontStyle:'italic'}}>"{o.note}"</div>}
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function SectionView({section,phases,onOpenLinkedSession,teacherMode,subSectionId,setSubSectionId,userId,onSignIn}){
  const initData={
    students:section.students.map(n=>({name:n,artfilePending:true,observations:[]})),
    sessions:[],classRating:0,classNote:'',classLogs:[],
  };
  const [data,setData,fsLoading]=useFirestore(section.id, userId, initData);
  const [editingDateIdx,setEditingDateIdx]=React.useState(null);
  const [editDateVal,setEditDateVal]=React.useState('');
  const [classLogOpen,setClassLogOpen]=React.useState(false);
  const [logRating,setLogRating]=React.useState(0);
  const [logHover,setLogHover]=React.useState(0);
  const [logNote,setLogNote]=React.useState('');

  function getAvgRating(){
    const logs=(data.classLogs||[]).filter(l=>l.rating>0);
    if(!logs.length) return 0;
    return(logs.reduce((a,l)=>a+l.rating,0)/logs.length).toFixed(1);
  }
  function saveClassLog(){
    const today=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    updateData(d=>{if(!d.classLogs)d.classLogs=[];d.classLogs.push({date:today,rating:logRating,note:logNote.trim()});});
    setLogRating(0);setLogNote('');setClassLogOpen(false);
  }
  function deleteClassLog(i){updateData(d=>{d.classLogs.splice(i,1);});}

  const [editingName,setEditingName]=React.useState(null);
  const [editNameVal,setEditNameVal]=React.useState('');
  const [obsPopup,setObsPopup]=React.useState(null);
  const [namePopup,setNamePopup]=React.useState(null);
  const [addSessionOpen,setAddSessionOpen]=React.useState(false);
  const [linkPickerFor,setLinkPickerFor]=React.useState(null);
  const [slideOpen,setSlideOpen]=React.useState(false);
  const [slideExpanded,setSlideExpanded]=React.useState(false);
  const [slideSession,setSlideSession]=React.useState(null);
  const [sortBy,setSortBy]=React.useState('alpha-asc');
  const [editMode,setEditMode]=React.useState(false);
  const [subMode,setSubMode]=React.useState(false);
  const [showSubEntry,setShowSubEntry]=React.useState(false);
  const [showGenPIN,setShowGenPIN]=React.useState(false);
  const [showAttPDF,setShowAttPDF]=React.useState(false);
  const [showClassReview,setShowClassReview]=React.useState(false);
  const [undoObs,setUndoObs]=React.useState(null); // {obs, studentIdx, obsIdx, timer}
  const [photoUploading,setPhotoUploading]=React.useState(false);
  const [photoError,setPhotoError]=React.useState(null);

  function updateData(fn){setData(prev=>{const next=JSON.parse(JSON.stringify(prev));fn(next);return next;});}

  // Show loading indicator while Firestore fetch is in progress
  if(fsLoading){
    return(
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,color:'var(--tx3)'}}>
        <div style={{fontSize:28,animation:'spin 1s linear infinite'}}>⏳</div>
        <div style={{fontSize:13,fontWeight:600}}>Loading {section.name}…</div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  function cycleAtt(studentIdx,sessionIdx){
    if(!userId&&!subMode){
      alert('Please sign in as teacher to save attendance. Changes made without signing in will not be saved.');
      return;
    }
    if(subMode){
      // Sub can only edit the column matching the linked PIN date
      const pinData=getSubPIN(section.id);
      if(pinData&&pinData.linkedDate){
        const linkedColIdx=data.sessions.findIndex(s=>!s.isDivider&&s.date===pinData.linkedDate);
        if(linkedColIdx===-1||sessionIdx!==linkedColIdx) return;
      }
      // Sub can only edit columns marked as 'sub' type
      const sess=data.sessions[sessionIdx];
      if(!sess||sess.sessType!=='sub') return;
    }
    updateData(d=>{
      const st=d.students[studentIdx];
      if(!st.attendance) st.attendance={};
      const cur=st.attendance[sessionIdx]||'empty';
      // Skip 'late' in the normal click cycle — late is long-press only
      const next={present:'absent',absent:'empty',empty:'present'}[cur]||'present';
      st.attendance[sessionIdx]=next;
    });
  }

  function setLate(studentIdx,sessionIdx){
    if(subMode){
      const sess=data.sessions[sessionIdx];
      if(!sess||sess.sessType!=='sub') return;
    }
    updateData(d=>{
      const st=d.students[studentIdx];
      if(!st.attendance) st.attendance={};
      st.attendance[sessionIdx]='late';
    });
  }

  function getAttCount(s){
    if(!s.attendance) return 0;
    // only count non-cancelled sessions
    return Object.keys(s.attendance).filter(ki=>{
      const sess=data.sessions[parseInt(ki)];
      return sess&&sess.sessType!=='cancelled'&&(s.attendance[ki]==='present'||s.attendance[ki]==='late');
    }).length;
  }

  function getObsColor(student){
    const obs=student.observations||[];
    if(obs.length===0) return 'empty';
    // Check most concerning tag
    const lastObs=obs[obs.length-1];
    const hasConcerning=(lastObs.tags||[]).some(t=>OBS_TAGS.find(td=>td.label===t&&td.color==='red'));
    if(hasConcerning) return 'red';
    const sessions=data.sessions.filter(s=>!s.isDivider);
    if(sessions.length===0) return 'green';
    const lastObsSessionIdx=lastObs.sessionIdx!=null?lastObs.sessionIdx:sessions.length-1;
    const since=sessions.filter((_,i)=>i>lastObsSessionIdx).length;
    if(since<=1) return 'green';
    if(since<=3) return 'yellow';
    return 'red';
  }

  function handleSaveObs(studentIdx,obsData){
    updateData(d=>{
      const st=d.students[studentIdx];
      if(!st.observations) st.observations=[];
      const realSessions=d.sessions.filter(s=>!s.isDivider);
      obsData.sessionIdx=realSessions.length-1;
      st.observations.push(obsData);
    });
    setObsPopup(null);
  }
  function handleDeleteObs(studentIdx,obsIdx){
    const deletedObs=data.students[studentIdx].observations[obsIdx];
    setUndoObs({obs:deletedObs,studentIdx,obsIdx,timer:setTimeout(()=>setUndoObs(null),6000)});
    updateData(d=>{d.students[studentIdx].observations.splice(obsIdx,1);});
  }
  function handleUndoDeleteObs(){
    if(!undoObs) return;
    clearTimeout(undoObs.timer);
    updateData(d=>{d.students[undoObs.studentIdx].observations.splice(undoObs.obsIdx,0,undoObs.obs);});

  }

  function handleToggleArtfile(studentIdx){
    updateData(d=>{d.students[studentIdx].artfilePending=!d.students[studentIdx].artfilePending;});

  function handleClearEscalation(studentIdx){
    updateData(d=>{
      const obs=d.students[studentIdx].observations||[];
      obs.forEach(o=>{if(o.escalation) o.escalationCleared=true;});
    });
  }

  function getSortedIndices(){
    const indices=data.students.map((_,i)=>i);
    if(sortBy==='alpha-asc') return [...indices].sort((a,b)=>data.students[a].name.localeCompare(data.students[b].name));
    if(sortBy==='alpha-desc') return [...indices].sort((a,b)=>data.students[b].name.localeCompare(data.students[a].name));
    if(sortBy==='att-desc') return [...indices].sort((a,b)=>getAttCount(data.students[b])-getAttCount(data.students[a]));
    if(sortBy==='att-asc') return [...indices].sort((a,b)=>getAttCount(data.students[a])-getAttCount(data.students[b]));
    if(sortBy==='obs-desc') return [...indices].sort((a,b)=>(data.students[b].observations||[]).length-(data.students[a].observations||[]).length);
    if(sortBy==='escalation') return [...indices].sort((a,b)=>{
      const ae=(data.students[a].observations||[]).some(o=>o.escalation&&!o.escalationCleared)?1:0;
      const be=(data.students[b].observations||[]).some(o=>o.escalation&&!o.escalationCleared)?1:0;
      return be-ae;
    });
    return indices;
  }

  const sortedIndices=getSortedIndices();
  const realSessions=data.sessions.filter(s=>!s.isDivider&&s.sessType!=='cancelled');
  const totalSessions=realSessions.length;

      <div className="section-page" style={{position:'relative',overflow:'hidden'}}>

          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>

              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                <span style={{fontSize:10,color:'var(--tx3)',minWidth:20,textAlign:'right'}}>{i+1}</span>
                <span style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>{s.name}</span>
              </div>
            ))}
            <div style={{padding:'12px 14px',fontSize:12,color:'var(--tx3)',textAlign:'center'}}>+{Math.max(0,data.students.length-12)} more students…</div>
          </div>
        </div>
        <SubPINEntryOverlay

    );

          <div style={{display:'flex',alignItems:'center',gap:10}}>

                              {sess.sessType==='sub'?'▶ REG':'⇄ SUB'}
                            </span>
                          </>
                        )}
                      </div>
                    </th>

                return(
                  <tr key={idx} className={student.artfilePending&&teacherMode?'artfile-pending':''}>
                    <td style={{textAlign:'center',fontSize:10,color:'var(--tx3)'}}>{rowNum+1}</td>
                    <td className="name-col">
                      {editingName===idx&&teacherMode?(
                        <input className="student-name-input" value={editNameVal} autoFocus

                          onBlur={()=>{updateData(d=>{d.students[idx].name=editNameVal||student.name;});setEditingName(null);}}
                          onKeyDown={e=>{if(e.key==='Enter'){updateData(d=>{d.students[idx].name=editNameVal||student.name;});setEditingName(null);}if(e.key==='Escape')setEditingName(null);}}/>

                            let pressTimer=null;
                            function handleAttMouseDown(e){

                              pressTimer=setTimeout(()=>{
                                pressTimer=null;
                                setLate(idx,si);
                              },500);

                            function handleAttMouseUp(e){
                              if(pressTimer){clearTimeout(pressTimer);pressTimer=null;cycleAtt(idx,si);}
                            }
                            function handleAttMouseLeave(){
                              if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}

                            return(
                              <span className={`att-box ${av||'empty'}`}

                return(
                  <div key={i} style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:9,padding:'9px 12px'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>{l.date}</span>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        {l.rating>0&&<span style={{fontSize:12,color:l.rating<=2?'var(--coral)':l.rating===3?'var(--yellow)':'var(--teal)',fontWeight:700}}>{'★'.repeat(l.rating)}</span>}
                        <button onClick={()=>deleteClassLog(realIdx)}
                          style={{fontSize:10,padding:'2px 6px',borderRadius:5,background:'rgba(232,112,90,0.1)',border:'1px solid rgba(232,112,90,0.25)',color:'var(--coral)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>✕</button>
                      </div>
                    </div>
                    {l.note&&<div style={{fontSize:12,color:'var(--tx2)',lineHeight:1.5}}>{l.note}</div>}
                  </div>
                );
              })}
            </div>
            </>}
          </div>
        )}
      </div>

      {/* Session slide panel */}
      {slideOpen&&slideSession&&(
        <div className="session-slide-overlay" style={{zIndex:slideExpanded?340:350}} onClick={()=>{setSlideOpen(false);setSlideExpanded(false);}}>
          <div className="session-slide-panel"
            style={{width:slideExpanded?'calc(100vw - 60px)':'min(720px,90vw)',transition:'width .3s cubic-bezier(.4,0,.2,1)'}}
            onClick={e=>e.stopPropagation()}>
            <div className="slide-panel-header">
              <div className="slide-panel-title">📎 {slideSession.label}</div>
              <button className="slide-panel-close" title={slideExpanded?'Collapse panel':'Expand to full width'}
                onClick={()=>setSlideExpanded(v=>!v)}
                style={{fontSize:16,padding:'4px 8px'}}>
                {slideExpanded?'›':'‹'}
              </button>
              <button className="slide-panel-close" onClick={()=>{setSlideOpen(false);setSlideExpanded(false);}}>✕</button>
            </div>
            <div className="slide-panel-body" style={{padding:0,overflowY:'auto'}}>
              <SlideSessionContent slideSession={slideSession} phases={phases} onOpenFull={()=>{onOpenLinkedSession(slideSession);setSlideOpen(false);setSlideExpanded(false);}}/>
            </div>
          </div>
        </div>
      )}

      {/* Modals */}
      {obsPopup&&teacherMode&&(
        <CombinedObsPopup
          studentIdx={obsPopup.studentIdx}
          student={data.students[obsPopup.studentIdx]}
          artfilePending={data.students[obsPopup.studentIdx].artfilePending}
          observations={data.students[obsPopup.studentIdx].observations||[]}
          totalSessions={totalSessions}
          attendanceCount={getAttCount(data.students[obsPopup.studentIdx])}
          onSave={(obs)=>handleSaveObs(obsPopup.studentIdx,obs)}
          onDeleteObs={(i)=>handleDeleteObs(obsPopup.studentIdx,i)}
          onToggleArtfile={()=>handleToggleArtfile(obsPopup.studentIdx)}
          onClearEscalation={()=>handleClearEscalation(obsPopup.studentIdx)}
          onPhotoChange={async (fileOrNull)=>{
            if(fileOrNull===null){
              updateData(d=>{d.students[obsPopup.studentIdx].photo=null;});
              return;
            }
            setPhotoUploading(true);setPhotoError(null);
            try{
              const dataUrl=await compressPhoto(fileOrNull);
              updateData(d=>{d.students[obsPopup.studentIdx].photo=dataUrl;});
            }catch(e){
              console.error('Photo failed',e);
              setPhotoError('Could not save photo: '+(e.message||'Unknown error'));
              setTimeout(()=>setPhotoError(null),8000);
            }finally{setPhotoUploading(false);}
          }}
          onClose={()=>setObsPopup(null)}
          editMode={editMode}
          customTags={data.customTags||[]}
          onAddCustomTag={(tag)=>updateData(d=>{if(!d.customTags)d.customTags=[];if(!d.customTags.find(t=>t.label===tag.label))d.customTags.push(tag);})}
          onDeleteCustomTag={(label)=>updateData(d=>{if(d.customTags)d.customTags=d.customTags.filter(t=>t.label!==label);})}
        />
      )}
      {namePopup!==null&&teacherMode&&(
        <StudentNamePopup
          studentIdx={namePopup}
          student={data.students[namePopup]}
          observations={data.students[namePopup].observations||[]}
          totalSessions={totalSessions}
          attendanceCount={getAttCount(data.students[namePopup])}
          onDeleteObs={(i)=>handleDeleteObs(namePopup,i)}
          onPhotoChange={async (fileOrNull)=>{
            if(fileOrNull===null){
              updateData(d=>{d.students[namePopup].photo=null;});
              return;
            }
            setPhotoUploading(true);setPhotoError(null);
            try{
              const dataUrl=await compressPhoto(fileOrNull);
              updateData(d=>{d.students[namePopup].photo=dataUrl;});
            }catch(e){
              console.error('Photo failed',e);
              setPhotoError('Could not save photo: '+(e.message||'Unknown error'));
              setTimeout(()=>setPhotoError(null),8000);
            }finally{setPhotoUploading(false);}
          }}
          onPrev={namePopup>0?()=>setNamePopup(p=>Math.max(0,p-1)):null}
          onNext={namePopup<data.students.length-1?()=>setNamePopup(p=>Math.min(data.students.length-1,p+1)):null}
          totalStudents={data.students.length}
          onClose={()=>setNamePopup(null)}/>
      )}
      {addSessionOpen&&<AddSessionModal phases={phases} onAdd={(sess)=>{
        updateData(d=>{
          d.sessions.push(sess);
          // Auto-mark present for normal and sub sessions (not cancelled)
          if(sess.sessType!=='cancelled'){
            const colIdx=d.sessions.length-1;
            d.students.forEach(st=>{if(!st.attendance)st.attendance={};st.attendance[colIdx]='present';});
          }
        });
      }} onClose={()=>setAddSessionOpen(false)}/>}
{/* link picker removed — linking now done in AddSessionModal */}
      {showGenPIN&&teacherMode&&<GenerateSubPINModal section={section} phases={phases} onClose={()=>setShowGenPIN(false)}/>}
      {showAttPDF&&teacherMode&&<AttendancePDFModal data={data} section={section} onClose={()=>setShowAttPDF(false)}/>}
      {showClassReview&&teacherMode&&<ClassReviewModal data={data} section={section} onClose={()=>setShowClassReview(false)}/>}
      {showSubEntry&&<EnterSubPINModal section={section} onSuccess={()=>{try{sessionStorage.removeItem('g4-teacher');}catch(e){}setSubMode(true);if(setSubSectionId)setSubSectionId(section.id);}} onClose={()=>setShowSubEntry(false)}/>}
      {photoUploading&&(
        <div style={{position:'fixed',bottom:72,left:'50%',transform:'translateX(-50%)',zIndex:9999,background:'var(--popup-bg)',border:'1px solid var(--glass-border2)',borderRadius:12,boxShadow:'var(--glass-shadow2)',padding:'10px 16px',fontSize:13,color:'var(--tx)',whiteSpace:'nowrap'}}>
          📷 Saving photo…
        </div>
      )}
      {photoError&&(
        <div style={{position:'fixed',bottom:72,left:'50%',transform:'translateX(-50%)',zIndex:9999,background:'var(--coral)',color:'#fff',borderRadius:12,boxShadow:'var(--glass-shadow2)',padding:'10px 16px',fontSize:13,maxWidth:360,textAlign:'center',display:'flex',alignItems:'center',gap:10}}>
          <span style={{flex:1}}>⚠️ {photoError}</span>
          <button onClick={()=>setPhotoError(null)} style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:'rgba(255,255,255,0.8)',background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1,flexShrink:0}}>✕</button>
        </div>
      )}
      {undoObs&&(
        <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:9999,background:'var(--popup-bg)',border:'1px solid var(--glass-border2)',borderRadius:12,boxShadow:'var(--glass-shadow2)',padding:'10px 16px',display:'flex',alignItems:'center',gap:12,fontSize:13,color:'var(--tx)',whiteSpace:'nowrap'}}>
          <span>Observation deleted</span>
          <button onClick={handleUndoDeleteObs} style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,color:'var(--teal)',background:'none',border:'none',cursor:'pointer',padding:0}}>Undo</button>
          <button onClick={()=>{clearTimeout(undoObs.timer);setUndoObs(null);}} style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:'var(--tx3)',background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1}}>✕</button>
        </div>
      )}
    </div>
  );
}

function App(){
  // ── Auth state ──
  const [user, setUser] = React.useState(undefined); // undefined = loading, null = signed out
  React.useEffect(()=>{
    const unsub = window._auth.onAuthStateChanged(u => setUser(u || null));
    return () => unsub();
  },[]);

  const [view,setView]=React.useState(()=>{
    try{const h=window.location.hash.slice(1);const p=JSON.parse(decodeURIComponent(h));return p.view||'annual';}catch{return 'annual';}
  });
  const [phase,setPhase]=React.useState(()=>{
    try{const h=window.location.hash.slice(1);const p=JSON.parse(decodeURIComponent(h));return p.phase||null;}catch{return null;}
  });
  const [progress,setProgress]=useLocalStorage('g4v3-prog',{});
  const [theme,setThemeState]=useLocalStorage('g4-theme','dark');
  // Migrate any stored 'colour' theme to 'dark'
  React.useEffect(()=>{
    if(theme==='colour'){setThemeState('dark');document.documentElement.setAttribute('data-theme','dark');}
  },[]);
  const [classView,setClassView]=React.useState(false);
  const [activeKw,setActiveKw]=React.useState(null);
  // Teacher mode: stored in sessionStorage so shared links start in read-only
  const [teacherMode,setTeacherModeState]=React.useState(()=>{
    try{return sessionStorage.getItem('g4-teacher')==='1';}catch{return false;}
  });
  const setTeacherMode=React.useCallback((v)=>{
    setTeacherModeState(v);
    try{if(v)sessionStorage.setItem('g4-teacher','1');else sessionStorage.removeItem('g4-teacher');}catch{}
  },[]);

  const setTheme=React.useCallback((t)=>{
    const allowed=['dark','light'];
    if(!allowed.includes(t)) return;
    setThemeState(t);
    document.documentElement.setAttribute('data-theme',t);
  },[setThemeState]);

  React.useEffect(()=>{
    const safe=['dark','light'].includes(theme)?theme:'dark';
    document.documentElement.setAttribute('data-theme',safe);
  },[theme]);

  React.useEffect(()=>{
    setProgress(prev=>{
      const next={...prev};
      let changed=false;
      ['p1:1','p1:2','p1:3'].forEach(k=>{if(!next[k]){next[k]=true;changed=true;}});
      return changed?next:prev;
    });
  },[]);

  const toggle=React.useCallback((phaseId,n)=>{
    setProgress(prev=>{const key=phaseId+':'+n;const next={...prev};if(next[key])delete next[key];else next[key]=true;return next;});
  },[setProgress]);

  const getPhaseProgress=React.useCallback((phaseId)=>{
    const ph=PHASES.find(p=>p.id===phaseId);
    if(!ph) return{done:0,total:0};
    return{done:ph.sessions.filter(s=>progress[phaseId+':'+s.n]).length,total:ph.sessions.length};
  },[progress]);

  const totalSessions=PHASES.reduce((a,p)=>a+p.sessions.length,0);
  const totalDone=PHASES.reduce((a,p)=>a+p.sessions.filter(s=>progress[p.id+':'+s.n]).length,0);

  const [section,setSection]=React.useState(null);
  const [subSectionId,setSubSectionId]=React.useState(null);
  const updateHash=React.useCallback((v,p,s)=>{
    try{window.location.hash=encodeURIComponent(JSON.stringify({view:v,phase:p?p.id:null,section:s?s.id:null}));}catch{}
  },[]);
  const handlePhase=React.useCallback((p)=>{setPhase(p);setView('phase');setSection(null);updateHash('phase',p,null);},[updateHash]);
  const handleNav=React.useCallback((v)=>{setView(v);if(v!=='phase')setPhase(null);setSection(null);updateHash(v,null,null);},[updateHash]);
  const handleBack=React.useCallback(()=>{setView('annual');setPhase(null);setSection(null);updateHash('annual',null,null);},[updateHash]);
  const handleSection=React.useCallback((s)=>{if(subSectionId&&s.id!==subSectionId)return;setSection(s);setView('section');setPhase(null);updateHash('section',null,s);},[subSectionId,updateHash]);
  const handleOpenLinkedSession=React.useCallback((linked)=>{
    const ph=PHASES.find(p=>p.id===linked.phaseId);
    if(ph){setPhase(ph);setView('phase');setSection(null);}
  },[]);

  React.useEffect(()=>{
    try{
      const h=window.location.hash.slice(1);
      const p=JSON.parse(decodeURIComponent(h));
      if(p.section){
        for(const ph2 of PHASES){
          const s=ph2.sections&&ph2.sections.find(x=>x.id===p.section);
          if(s){setSection(s);setView('section');break;}
        }
      } else if(p.phase){
        const found=PHASES.find(x=>x.id===p.phase);
        if(found){setPhase(found);setView('phase');}
      }
    }catch{}
  },[]);

  function handleSignOut(){
    window._auth.signOut();
    try{sessionStorage.removeItem('g4-teacher');}catch{}
    setTeacherModeState(false);
  }

  async function handleExportData(){
    const db=window._db;
    const SECTION_IDS=['4gir','4sariska','4ranthambore','4kanha','4corbett'];
    const exportObj={exportedAt:new Date().toISOString(),sections:{},localStorage:{}};
    // Export all 5 sections from Firestore (students, attendance, observations, class logs)
    for(const sid of SECTION_IDS){
      const sharedDocId='shared-'+sid;
      try{
        const snap=await db.collection('sections').doc(sharedDocId).get();
        const main=snap.exists?snap.data():{};
        const students=main.students||[];
        const photoPromises=students.map((_,i)=>
          db.collection('sections').doc(sharedDocId+'-photo-'+i).get()
            .then(s=>s.exists?s.data().photo:null).catch(()=>null)
        );
        const photos=await Promise.all(photoPromises);
        exportObj.sections[sid]={...main,_photos:photos};
      }catch(e){console.warn('Export failed for',sid,e);}
    }
    // Export ALL localStorage (references, artist images, session notes, global notes, step ticks)
    try{
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k) exportObj.localStorage[k]=localStorage.getItem(k);
      }
    }catch(e){console.warn('localStorage export failed:',e);}
    const blob=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='grade4-arts-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  async function handleImportData(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    if(!window.confirm('This will overwrite ALL section data in Firebase with the data from this file. Are you sure?'))return;
    try{
      const text=await file.text();
      const importObj=JSON.parse(text);
      if(!importObj.sections)throw new Error('Invalid backup file — missing sections key.');
      const db=window._db;
      for(const [sid,data] of Object.entries(importObj.sections)){
        const sharedDocId='shared-'+sid;
        const photos=data._photos||[];
        const mainData={...data};
        delete mainData._photos;
        // Write student photo docs
        const students=mainData.students||[];
        mainData.students=students.map((st,i)=>({...st,photo:'__photo_ref__'}));
        await db.collection('sections').doc(sharedDocId).set(mainData);
        for(let i=0;i<photos.length;i++){
          if(photos[i]){
            await db.collection('sections').doc(sharedDocId+'-photo-'+i).set({photo:photos[i]});
          }
        }
      }
      // Restore localStorage (references, notes, artist images, step ticks)
      if(importObj.localStorage){
        try{
          for(const [k,v] of Object.entries(importObj.localStorage)){
            localStorage.setItem(k,v);
          }
        }catch(lsErr){console.warn('localStorage restore failed:',lsErr);}
      }
      alert('Import complete! Refresh the page to see restored data.');
    }catch(err){
      alert('Import failed: '+err.message);
    }
    e.target.value='';
  }

  // ── showSignIn modal state (for signing in from within the app) ──
  const [showSignIn,setShowSignIn]=React.useState(false);

  // ── Auth loading ──
  if(user===undefined){
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--tx3)',fontSize:14}}>
        Loading…
      </div>
    );
  }

  // userId for Firestore — null if not signed in (sub PIN access uses guest userId)
  const userId=user?user.uid:null;
  // Visitor = not logged in AND not teacher mode
  const isVisitor=!user&&!teacherMode;

  // ── Render full app (signed in OR not — sections gate themselves) ──
  return(
    <KWContext.Provider value={{activeKw,setActiveKw,teacherMode,setTeacherMode}}>
      <div className={`app${classView?' class-view-active':''}`}>
        {classView&&(
          <>
            <div className="class-view-bar">
              <span className="cv-label" style={{display:"inline-flex",alignItems:"center",gap:6}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="12" rx="2"/><circle cx="17" cy="13" r="2"/><path d="M7 13h4M7 10h2M7 16h2"/></svg>Class View — projected</span>
            </div>
            <button className="cv-float-exit" onClick={()=>setClassView(false)}>✕ Exit Class View</button>
          </>
        )}
        {!classView&&<Sidebar view={view} phase={phase} section={section} onNav={handleNav} onPhase={handlePhase} onSection={handleSection}
          getPhaseProgress={getPhaseProgress} totalDone={totalDone} totalSessions={totalSessions}
          theme={theme} setTheme={setTheme} classView={classView} setClassView={setClassView} subSectionId={subSectionId}
          user={user} onSignOut={handleSignOut} onSignIn={()=>setShowSignIn(true)} isVisitor={isVisitor} onExportData={handleExportData} onImportData={handleImportData}/>}
        <div className="main">
          {view==='annual'&&<AnnualPlan onPhase={handlePhase} getPhaseProgress={getPhaseProgress} totalDone={totalDone} totalSessions={totalSessions} isVisitor={isVisitor} onExportData={handleExportData} onImportData={handleImportData}/>}
          {view==='months'&&<MonthsView/>}
          {view==='phase'&&phase&&<PhaseDetail phase={phase} onBack={handleBack} progress={progress} toggle={toggle} classView={classView} isVisitor={isVisitor}/>}
          {view==='notes'&&(isVisitor?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--tx3)',fontSize:13}}>Sign in to access Unit Notes.</div>:<GlobalNotes/>)}
          {view==='section'&&section&&<SectionView section={section} phases={PHASES} onOpenLinkedSession={handleOpenLinkedSession} teacherMode={teacherMode} subSectionId={subSectionId} setSubSectionId={setSubSectionId} userId={userId} onSignIn={()=>setShowSignIn(true)}/>}
        </div>
        <GlobalKWPopup activeKw={activeKw} onClose={()=>setActiveKw(null)}/>
        <Timer/>
        {/* Sign-in modal — can be triggered from sidebar when not logged in */}
        {showSignIn&&<SignInModal onClose={()=>setShowSignIn(false)}/>}
      </div>
    </KWContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
