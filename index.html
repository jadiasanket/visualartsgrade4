            const topEdge=r.top+pad+thumbH/2,botEdge=r.bottom-pad-thumbH/2;
            const frac=_cropClamp(1-(e.clientY-topEdge)/(botEdge-topEdge),0,1);
            barApplyDeg((frac*2-1)*_CROP_BAR_RANGE);
          }}
          onPointerMove={e=>{
            if(!(e.buttons&1))return;
            const r=barTrackRef.current.getBoundingClientRect();
            const pad=-3,thumbH=parseInt(barThumbRef.current.dataset.h||'30');
            const topEdge=r.top+pad+thumbH/2,botEdge=r.bottom-pad-thumbH/2;
            const frac=_cropClamp(1-(e.clientY-topEdge)/(botEdge-topEdge),0,1);
            barApplyDeg((frac*2-1)*_CROP_BAR_RANGE);
          }}
          onPointerUp={()=>{
            const thumb=barThumbRef.current;
            thumb.style.width='17px';thumb.style.height='30px';thumb.dataset.h='30';
            thumb.style.background='rgba(220,220,230,0.9)';
            setFineRot(fineRotRef.current);
          }}>
          <div style={{position:'absolute',inset:0,borderRadius:100,background:'rgba(7,7,8,0.87)',border:'1px solid rgba(255,255,255,0.15)',boxShadow:'0 4px 24px rgba(0,0,0,0.28)'}}/>
          <div ref={barFillRef} style={{position:'absolute',left:1,right:1,background:'rgba(255,255,255,0.15)',pointerEvents:'none',top:'50%',bottom:'50%'}}/>
          <div style={{position:'absolute',left:'50%',top:'50%',width:20,height:1,background:'rgba(255,255,255,0.30)',transform:'translate(-50%,-50%)',pointerEvents:'none',zIndex:3}}/>
          <div ref={barThumbRef} data-h="30" style={{position:'absolute',left:'50%',top:'calc(50% - 15px)',transform:'translateX(-50%)',width:17,height:30,borderRadius:100,background:'rgba(220,220,230,0.9)',border:'1px solid rgba(255,255,255,0.45)',boxShadow:'0 2px 8px rgba(0,0,0,0.55)',pointerEvents:'none',zIndex:2,transition:'width .12s,height .12s'}}/>
        </div>
        <button style={{background:'none',border:'none',cursor:'pointer',padding:0,color:'rgba(255,255,255,0.35)',fontSize:20,fontWeight:300,lineHeight:1}}
          onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.9)'}
          onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.35)'}
          onClick={()=>{barApplyDeg(_cropClamp(fineRotRef.current-1,-_CROP_BAR_RANGE,_CROP_BAR_RANGE));setFineRot(fineRotRef.current);}}>−</button>
        <div ref={barLabelRef}
          onClick={()=>{fineRotRef.current=0;setFineRot(0);computeFillScale();raf(()=>applyTransform());renderBar(0);}}
          style={{fontSize:10,fontFamily:"'DM Sans',sans-serif",fontWeight:600,marginTop:2,cursor:'pointer',color:'rgba(255,255,255,0.25)',letterSpacing:'0.03em',width:44,textAlign:'center'}}>0°</div>
      </div>
      {/* KEYSTONE HANDLES */}
      {ksCorners&&(
        <div style={{position:'fixed',inset:0,zIndex:25,pointerEvents:'none'}}>
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',overflow:'visible',pointerEvents:'none'}}>
            <polygon points={ksCorners.map(c=>c.x+','+c.y).join(' ')}
              fill="rgba(0,116,240,0.06)" stroke="rgb(0,116,240)" strokeWidth="1.5"/>
          </svg>
          {ksCorners.map((c,i)=>(
            <div key={i}
              style={{position:'fixed',left:c.x-5,top:c.y-5,width:10,height:10,borderRadius:2,
                background:'rgb(0,116,240)',border:'1.5px solid #fff',cursor:'nwse-resize',zIndex:26,
                boxShadow:'0 1px 6px rgba(0,0,0,0.5)',pointerEvents:'all',touchAction:'none'}}
              onMouseDown={e=>{
                e.stopPropagation();e.preventDefault();
                const startX=e.clientX,startY=e.clientY,ox=c.x,oy=c.y;
                function move(ev){
                  ev.preventDefault();
                  setKsCorners(prev=>prev.map((p,j)=>j===i?{x:ox+(ev.clientX-startX),y:oy+(ev.clientY-startY)}:p));
                }
                function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}
                document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
              }}>
            </div>
          ))}
        </div>
      )}
      <div style={{position:'fixed',bottom:0,height:`${_CROP_MARGIN_V*100}vh`,left:0,right:0,display:'flex',alignItems:'center',justifyContent:'center',gap:8,zIndex:20,pointerEvents:'none'}}
        onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',gap:8,pointerEvents:'all'}}>

          {/* Main pill — CCW, CW, Straighten, Keystone, Reset */}
          <CropToolPill
            ksCorners={ksCorners}
            onCCW={()=>{setKsCorners(null);rotate90('ccw');}}
            onCW={()=>{setKsCorners(null);rotate90('cw');}}
            onStraighten={()=>{setKsCorners(null);autoStraighten();}}
            onKeystone={ksCorners?applyKS:startKS}
            onReset={handleReset}
          />

          {/* Apply / Crop */}
          <button onClick={handleCommit}
            style={{height:38,paddingLeft:22,paddingRight:22,borderRadius:100,border:'none',
              background:cropActive?'rgb(34,197,94)':'rgb(0,116,240)',
              cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",
              color:'#fff',boxShadow:cropActive?'0 4px 16px rgba(34,197,94,0.4)':'0 4px 16px rgba(0,116,240,0.4)',
              transition:'background .15s',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}
            onMouseEnter={e=>e.currentTarget.style.background=cropActive?'rgb(22,163,74)':'rgb(0,100,220)'}
            onMouseLeave={e=>e.currentTarget.style.background=cropActive?'rgb(34,197,94)':'rgb(0,116,240)'}>
            {cropActive?<>Apply</>:<><_IcoCropIcon/> Crop</>}
          </button>

        </div>
      </div>
    </div>,
    document.body
  );
}

// ── ToolbarPill ──────────────────────────────────────────────────────────────
function ToolbarPill({activeControl,teacherMode,onSetControl}){
  const pillRef    = React.useRef(null);
  const btnRefs    = React.useRef([]);
  const divRefs    = React.useRef([]);
  // Fluid spring state — same as CropToolPill
  const sp         = React.useRef({x:0,w:0,tx:0,tw:0,vx:0,vw:0,sx:0,vsx:0,opacity:0,to:0});
  const rafId      = React.useRef(null);
  const hoverIdx   = React.useRef(-1);
  const mouseVelRef= React.useRef(0);
  const lastMouseX = React.useRef(null);

  // Same spring constants as CropToolPill for identical feel
  const S=520, D=26, SS=280, SD=18;

  const buttons = [
    { key:'info', title:'Info (I)',
      icon:<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="8.5" r="1" fill="currentColor" stroke="none"/><line x1="12" y1="12" x2="12" y2="16"/></svg> },
    { key:'crop', title:'Crop',
      icon:<svg width="18" height="18" viewBox="2 2 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 2v14a2 2 0 002 2h14"/><path d="M18 22V8a2 2 0 00-2-2H2"/></svg> },
    ...(teacherMode?[{ key:'edit', title:'Adjustments',
      icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round"><path d="M10 5H3"/><path d="M12 19H3"/><path d="M14 3v4"/><path d="M16 17v4"/><path d="M21 12h-9"/><path d="M21 19h-5"/><path d="M21 5h-7"/><path d="M8 10v4"/><path d="M8 12H3"/></svg> }]:[]),
  ];

  function getBtnRect(idx){
    const el=btnRefs.current[idx], wrap=el&&el.parentElement;
    if(!el||!wrap) return null;
    const pr=wrap.getBoundingClientRect(), br=el.getBoundingClientRect();
    return {x:br.left-pr.left, w:br.width};
  }

  function updateDividers(idx){
    divRefs.current.forEach((d,i)=>{
      if(!d) return;
      const hide = i===idx || i===idx-1
                || i===activeControlIdx()-1 || i===activeControlIdx();
      d.style.opacity = hide ? '0' : '1';
    });
  }

  function activeControlIdx(){
    return buttons.findIndex(b=>b.key===activeControl);
  }

  function tick(){
    const s=sp.current;
    const dt=0.016, STEPS=4, ddt=dt/STEPS;

    for(let i=0;i<STEPS;i++){
      s.vx+=(-S*(s.x-s.tx)-D*s.vx)*ddt;
      s.vw+=(-S*(s.w-s.tw)-D*s.vw)*ddt;
      s.x+=s.vx*ddt; s.w+=s.vw*ddt;
      // Balloon stretch
      const targetSx=Math.max(-18,Math.min(18,mouseVelRef.current*1.4));
      s.vsx+=(-SS*(s.sx-targetSx)-SD*s.vsx)*ddt;
      s.sx+=s.vsx*ddt;
    }
    mouseVelRef.current*=0.82;
    s.opacity+=(s.to-s.opacity)*0.18;

    const pill=pillRef.current;
    if(pill&&s.to>0){
      const stretchW=Math.abs(s.sx)*0.5;
      const offsetX=s.sx>0?-s.sx*0.15:-s.sx*0.15;
      pill.style.transform='translateX('+(s.x+offsetX)+'px)';
      pill.style.width=Math.max(4,s.w+stretchW)+'px';
      pill.style.opacity=s.opacity;
      const sc=0.85+0.15*s.opacity;
      pill.style.transform='translateX('+(s.x+offsetX)+'px) scaleY('+sc+')';
    } else if(pill){
      const sc=0.85+0.15*s.opacity;
      pill.style.opacity=s.opacity;
      pill.style.transform='translateX('+s.x+'px) scaleY('+sc+')';
    }

    const settled=
      Math.abs(s.vx)<0.3&&Math.abs(s.vw)<0.3&&Math.abs(s.vsx)<0.3&&
      Math.abs(s.x-s.tx)<0.3&&Math.abs(s.w-s.tw)<0.3&&
      Math.abs(s.sx)<0.3&&Math.abs(s.opacity-s.to)<0.002;
    if(!settled) rafId.current=requestAnimationFrame(tick);
    else rafId.current=null;
  }

  function startTick(){
    if(!rafId.current) rafId.current=requestAnimationFrame(tick);
  }

  function onMouseMove(e){
    if(lastMouseX.current!==null) mouseVelRef.current=e.clientX-lastMouseX.current;
    lastMouseX.current=e.clientX;
  }

  function onEnter(idx){
    hoverIdx.current=idx;
    const r=getBtnRect(idx); if(!r) return;
    const s=sp.current;
    if(s.to===0){ s.x=r.x; s.w=r.w; } // snap on first entry
    s.tx=r.x; s.tw=r.w; s.to=1;
    updateDividers(idx);
    startTick();
  }

  function onLeave(){
    hoverIdx.current=-1;
    lastMouseX.current=null;
    mouseVelRef.current=0;
    sp.current.to=0;
    divRefs.current.forEach(d=>{if(d) d.style.opacity='1';});
    startTick();
  }

  const btnBase={
    background:'transparent',border:'none',cursor:'pointer',
    paddingLeft:12,paddingRight:12,height:34,borderRadius:100,lineHeight:1,
    display:'flex',alignItems:'center',justifyContent:'center',
    flexShrink:0,position:'relative',zIndex:2,
  };

  return (
    <div className="tb-pill-wrap lb-glass-panel"
      style={{position:'relative',display:'flex',alignItems:'center',gap:0,
        background:'rgba(7,7,8,0.87)',backdropFilter:'blur(6px) saturate(200%)',
        WebkitBackdropFilter:'blur(6px) saturate(200%)',borderRadius:100,
        border:'1px solid rgba(255,255,255,0.15)',boxShadow:'0 4px 20px rgba(0,0,0,0.35)'}}
      onMouseLeave={onLeave}
      onMouseMove={onMouseMove}>

      {/* Travelling blue bubble */}
      <div ref={pillRef} style={{
        position:'absolute',top:0,left:0,height:'100%',
        background:'rgb(0,116,240)',borderRadius:100,
        pointerEvents:'none',zIndex:1,opacity:0,
        willChange:'transform,width,opacity',
      }}/>

      {buttons.map((b,i)=>{
        const isActive=activeControl===b.key;
        const leftNeighbourActive=i>0&&activeControl===buttons[i-1].key;
        return (
          <React.Fragment key={b.key}>
            {i>0&&<div
              ref={el=>divRefs.current[i-1]=el}
              style={{
                width:(leftNeighbourActive||isActive)?0:1,
                height:(leftNeighbourActive||isActive)?34:18,
                background:(leftNeighbourActive||isActive)?'rgb(0,116,240)':'rgba(255,255,255,0.12)',
                borderRadius:100,flexShrink:0,
                transition:'width .22s cubic-bezier(0.34,1.56,0.64,1),height .22s cubic-bezier(0.34,1.56,0.64,1),background .18s,opacity .12s',
              }}/>}
            <button
              ref={el=>btnRefs.current[i]=el}
              onClick={()=>onSetControl(b.key)}
              title={b.title}
              onMouseEnter={()=>onEnter(i)}
              style={{...btnBase,
                color:isActive?'#fff':'rgba(255,255,255,0.55)',
                background:isActive?'rgb(0,116,240)':'transparent',
                animation:isActive?'pill-pop .22s cubic-bezier(0.34,1.56,0.64,1) forwards':undefined,
              }}>
              <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:20,height:20}}>
                {b.icon}
              </span>
            </button>
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ── ZoomSlider ───────────────────────────────────────────────────────────────
function ZoomSlider({value,active,onChange,onActiveChange}){
  const trackWrapRef=React.useRef(null);
  const dragging=React.useRef(false);
  const grabOffset=React.useRef(0);

  const MIN=100,MAX=400;
  const THUMB_H=active?33:30;
  const frac=(value-MIN)/(MAX-MIN);

  function valueFromClientY(clientY){
    const r=trackWrapRef.current.getBoundingClientRect();
    const raw=1-(clientY-r.top)/r.height;
    return Math.min(MAX,Math.max(MIN,Math.min(1,Math.max(0,raw))*(MAX-MIN)+MIN));
  }

  function thumbTopPx(){
    const wrapH=trackWrapRef.current?trackWrapRef.current.getBoundingClientRect().height:150;
    const topMin=-4,topMax=wrapH+4-THUMB_H;
    return topMax-frac*(topMax-topMin);
  }

  function onDown(e){
    e.preventDefault();e.stopPropagation();
    dragging.current=true;onActiveChange(true);
    trackWrapRef.current.setPointerCapture(e.pointerId);
    // Calculate grab offset from computed thumb position (before re-render changes size)
    const r=trackWrapRef.current.getBoundingClientRect();
    const topMin=-4,topMax=r.height+4-THUMB_H;
    const thumbTop=r.top+(topMax-frac*(topMax-topMin));
    grabOffset.current=e.clientY-(thumbTop+THUMB_H/2);
    onChange(valueFromClientY(e.clientY-grabOffset.current));
  }
  function onMove(e){ if(dragging.current) onChange(valueFromClientY(e.clientY-grabOffset.current)); }
  function onUp(){ dragging.current=false;grabOffset.current=0;onActiveChange(false); }

  return (
    <div className="zs-wrap" onClick={e=>e.stopPropagation()}>
      <button className="zs-btn" title="Zoom in"
        onMouseDown={e=>{e.stopPropagation();onChange(Math.min(MAX,value+20));}}>+</button>
      <div ref={trackWrapRef} className="zs-track-wrap"
        onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}>
        <div className="zs-track">
          <div className="zs-fill" style={{height:(frac*100)+'%'}}/>
        </div>
        <div className={'zs-thumb'+(active?' active':'')} style={{top:thumbTopPx()+'px'}}/>
      </div>
      <button className="zs-btn" title="Zoom out"
        onMouseDown={e=>{e.stopPropagation();onChange(Math.max(MIN,value-20));}}>−</button>
      <div style={{fontSize:10,fontFamily:"'DM Sans',sans-serif",fontWeight:600,marginTop:2,
        color:'rgba(255,255,255,0.25)',letterSpacing:'0.03em',width:44,textAlign:'center',
        cursor:value>100?'pointer':'default'}}
        onClick={()=>onChange(100)}>
        {Math.round(value/100*10)/10}×
      </div>
    </div>
  );
}

// ── EditPanel ────────────────────────────────────────────────────────────────
function EditPanel({imgRef,onClose,onApply,initialFilters,onFilterChange,panelBg}){
  const bg=panelBg||'rgba(7,7,8,0.87)';
  const panelRef  = React.useRef(null);
  const filtersRef= React.useRef(initialFilters||{brightness:50,contrast:50,saturation:50,sharpness:50,warmth:50,vertical:50,horizontal:50});
  const rotRef    = React.useRef(0);
  const flipXRef  = React.useRef(1);
  const flipYRef  = React.useRef(1);
  const histRef   = React.useRef([{rotation:0,flipX:1,flipY:1}]);
  const histIdxRef= React.useRef(0);
  const posRef    = React.useRef(null);
  const F2        = "'DM Sans',sans-serif";

  function buildFilterStr(){
    const st=filtersRef.current;
    const bFinal=100+(st.brightness-50)*1.5;
    const cFinal=100+(st.contrast-50)*1.0;
    const sFinal=100+(st.saturation-50)*3.0;
    const w=(st.warmth-50)*0.7;
    const sepia=Math.max(0,w),hue=w<0?Math.round(w*1.5):0;
    return `brightness(${bFinal}%) contrast(${cFinal}%) saturate(${sFinal}%)`
      +(sepia>0?` sepia(${sepia}%) hue-rotate(-15deg)`:'')
      +(hue<0?` hue-rotate(${hue}deg)`:'');
  }
  function applySharpness(amount,src,callback){
    // amount: 0-100, 50=neutral. Only run convolution if amount != 50
    if(amount===50){callback(null);return;}
    const el=src||imgRef&&imgRef.current;
    if(!el){callback(null);return;}
    const strength=(amount-50)/50; // -1 to +1
    const cv=document.createElement('canvas');
    cv.width=el.naturalWidth||el.width||el.offsetWidth;
    cv.height=el.naturalHeight||el.height||el.offsetHeight;
    const cx=cv.getContext('2d');
    cx.drawImage(el,0,0,cv.width,cv.height);
    try{
      const imgData=cx.getImageData(0,0,cv.width,cv.height);
      const d=imgData.data,w=cv.width,h=cv.height;
      const out=new Uint8ClampedArray(d);
      const k=strength>0?strength*2:0; // only sharpen, not blur, via CSS unsharp
      // Laplacian sharpen kernel scaled by strength
      for(let y=1;y<h-1;y++){
        for(let x=1;x<w-1;x++){
          const i=(y*w+x)*4;
          for(let c=0;c<3;c++){
            const center=d[i+c];
            const neighbors=d[((y-1)*w+x)*4+c]+d[((y+1)*w+x)*4+c]+d[(y*w+x-1)*4+c]+d[(y*w+x+1)*4+c];
            out[i+c]=Math.min(255,Math.max(0,Math.round(center*(1+4*k)-neighbors*k)));
          }
        }
      }
      cx.putImageData(new ImageData(out,w,h),0,0);
      callback(cv.toDataURL('image/jpeg',0.92));
    }catch(e){callback(null);}
  }
  function applyFilters(){
    const filterStr=buildFilterStr();
    const el=imgRef&&imgRef.current;
    if(!el) return;
    const sharpness=filtersRef.current.sharpness||50;
    if(sharpness===50){
      el.style.filter=filterStr;
      if(onFilterChange) onFilterChange({...filtersRef.current},filterStr);
    } else {
      // Load fresh CORS-safe image for pixel access if needed
      const doSharp=(src)=>{
        applySharpness(sharpness,src,(dataUrl)=>{
          if(dataUrl) el.src=dataUrl;
          el.style.filter=filterStr;
          if(onFilterChange) onFilterChange({...filtersRef.current},filterStr);
        });
      };
      if(el.complete&&el.naturalWidth>0){
        doSharp(el);
      } else {
        const fresh=new Image();fresh.crossOrigin='anonymous';
        fresh.onload=()=>doSharp(fresh);
        fresh.src=el.src;
      }
    }
  }

  function applyTransformImg(){
    if(imgRef&&imgRef.current)
      imgRef.current.style.transform=`rotate(${rotRef.current}deg) scale(${flipXRef.current},${flipYRef.current})`;
  }

  function saveHist(){
    histRef.current.splice(histIdxRef.current+1);
    histRef.current.push({rotation:rotRef.current,flipX:flipXRef.current,flipY:flipYRef.current});
    histIdxRef.current=histRef.current.length-1;
    updateUndoBtns();
  }

  function updateUndoBtns(){
    const p=panelRef.current; if(!p) return;
    const u=p.querySelector('#ep-undo'),r=p.querySelector('#ep-redo');
    if(u){u.style.opacity=histIdxRef.current>0?'1':'0.4';u.style.pointerEvents=histIdxRef.current>0?'auto':'none';}
    if(r){const canRedo=histIdxRef.current<histRef.current.length-1;r.style.opacity=canRedo?'1':'0.4';r.style.pointerEvents=canRedo?'auto':'none';}
  }

  // Slider interaction — grab-offset aware, direct DOM writes
  function makeSliderHandler(key, fillEl, knobEl, iconEl, nameEl){
    let dragging=false, grabOffset=0;
    function pct(clientX){
      const r=fillEl.parentElement.getBoundingClientRect();
      return Math.max(0,Math.min(100,((clientX-r.left)/r.width)*100));
    }
    function setVal(p){
      filtersRef.current[key]=p;
      fillEl.style.width=p+'%'; knobEl.style.left=p+'%';
      applyFilters();
    }
    fillEl.parentElement.addEventListener('mousedown',e=>{
      e.stopPropagation(); dragging=true;
      fillEl.classList.add('ep-active'); knobEl.classList.add('ep-active');
      if(iconEl) iconEl.classList.add('ep-active');
      if(nameEl) nameEl.classList.add('ep-active');
      const kr=knobEl.getBoundingClientRect();
      const mid=kr.left+kr.width/2;
      grabOffset=e.clientX-mid;
      const clickedKnob=e.clientX>=kr.left&&e.clientX<=kr.right;
      if(!clickedKnob){grabOffset=0;setVal(pct(e.clientX));}
      function move(ev){if(dragging)setVal(pct(ev.clientX-grabOffset));}
      function up(){
        dragging=false;grabOffset=0;
        fillEl.classList.remove('ep-active');knobEl.classList.remove('ep-active');
        if(iconEl)iconEl.classList.remove('ep-active');
        if(nameEl)nameEl.classList.remove('ep-active');
        window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);
      }
      window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
    });
  }

  React.useEffect(()=>{
    const p=panelRef.current; if(!p) return;
    // Wire up all sliders
    [
      {key:'brightness'},{key:'contrast'},{key:'saturation'},
      {key:'sharpness'},{key:'warmth'},{key:'vertical'},{key:'horizontal'},
    ].forEach(({key})=>{
      const fill=p.querySelector('#ep-fill-'+key);
      const knob=p.querySelector('#ep-knob-'+key);
      const icon=p.querySelector('#ep-icon-'+key);
      const name=p.querySelector('#ep-name-'+key);
      if(fill&&knob) makeSliderHandler(key,fill,knob,icon,name);
      // Set initial position
      const v=filtersRef.current[key];
      if(fill) fill.style.width=v+'%';
      if(knob) knob.style.left=v+'%';
    });
    updateUndoBtns();
    // Panel drag
    const header=p.querySelector('#ep-header');
    if(header){
      let pdrag=false,px=0,py=0,pl=0,pt=0;
      header.addEventListener('mousedown',e=>{
        pdrag=true;
        const r=p.getBoundingClientRect();
        px=e.clientX;py=e.clientY;pl=r.left;pt=r.top;
        p.style.right='auto';p.style.left=pl+'px';p.style.top=pt+'px';
      });
      window.addEventListener('mousemove',e=>{if(!pdrag)return;p.style.left=(pl+e.clientX-px)+'px';p.style.top=(pt+e.clientY-py)+'px';});
      window.addEventListener('mouseup',()=>{pdrag=false;});
    }
    // Transform buttons
    const btn=(id,fn)=>{const el=p.querySelector(id);if(el)el.addEventListener('click',fn);};
    btn('#ep-rotateCCW',()=>{rotRef.current-=90;saveHist();applyTransformImg();});
    btn('#ep-rotateCW', ()=>{rotRef.current+=90;saveHist();applyTransformImg();});
    btn('#ep-flipH',    ()=>{flipXRef.current*=-1;saveHist();applyTransformImg();});
    btn('#ep-flipV',    ()=>{flipYRef.current*=-1;saveHist();applyTransformImg();});
    btn('#ep-straighten',()=>{
      const el=imgRef&&imgRef.current;
      if(!el) return;
      const SIZE=80;
      const applyVals=(r2,g2,b2,rms)=>{
        const lum=0.299*r2+0.587*g2+0.114*b2;
        // Brightness: target midtone 128
        const bTarget=50+(128-lum)*0.18;
        // Contrast: flat histogram = low rms → boost
        const cTarget=50+(80-rms)*0.12;
        // Gray World colour cast: if avg channel deviates from neutral, correct warmth
        const avg=(r2+g2+b2)/3;
        const castR=r2-avg,castB=b2-avg;
        // Positive castR = warm cast → pull warmth down; positive castB = cool cast → push warmth up
        const wTarget=50+(castR-castB)*0.09;
        // Saturation: boost slightly if image looks desaturated (low channel variance)
        const chVar=((r2-avg)**2+(g2-avg)**2+(b2-avg)**2)/3;
        const sTarget=chVar<200?60:57; // if channels are similar (grey) boost sat more
        const vals={
          brightness:Math.round(Math.min(85,Math.max(20,bTarget))),
          contrast:Math.round(Math.min(75,Math.max(35,cTarget))),
          saturation:sTarget,sharpness:54,
          warmth:Math.round(Math.min(65,Math.max(38,wTarget))),
        };
        Object.assign(filtersRef.current,vals);
        Object.keys(vals).forEach(k=>{
          const f=p.querySelector('#ep-fill-'+k),kn=p.querySelector('#ep-knob-'+k);
          const v=filtersRef.current[k];
          if(f)f.style.width=v+'%';if(kn)kn.style.left=v+'%';
        });
        applyFilters();
      };
      const analyse=(src)=>{
        const SIZE=80;const cv=document.createElement('canvas');cv.width=SIZE;cv.height=SIZE;
        const cx=cv.getContext('2d');
        try{
          cx.drawImage(src,0,0,SIZE,SIZE);
          const px=cx.getImageData(0,0,SIZE,SIZE).data;
          let r2=0,g2=0,b2=0,n=0,rms=0;
          for(let i=0;i<px.length;i+=4){
            const rv=px[i],gv=px[i+1],bv=px[i+2];
            r2+=rv;g2+=gv;b2+=bv;
            rms+=(0.299*rv+0.587*gv+0.114*bv)**2;n++;
          }
          applyVals(r2/n,g2/n,b2/n,Math.sqrt(rms/n));
        }catch(e){applyVals(128,128,128,100);}
      };
      if(el.complete&&el.naturalWidth>0){
        analyse(el);
      } else {
        const fresh=new Image();fresh.crossOrigin='anonymous';
        fresh.onload=()=>analyse(fresh);
        fresh.onerror=()=>applyVals(128,128,128,100);
        fresh.src=el.src;
      }
    });
    btn('#ep-undo',()=>{if(histIdxRef.current<=0)return;histIdxRef.current--;const h=histRef.current[histIdxRef.current];rotRef.current=h.rotation;flipXRef.current=h.flipX;flipYRef.current=h.flipY;updateUndoBtns();applyTransformImg();});

    btn('#ep-apply',()=>{

    btn('#ep-resetAll',()=>{

      });
      applyFilters();
    });
  },[]);

  const tBtn=(id,title,icon)=>(

// ── SHARED LIGHTBOX LAYOUT HELPER ──────────────────────────────────────────
function resolveLessonLabel(raw){
  if(raw===null||raw===undefined) return null;
  const str=String(raw).trim();
  if(!str||str==='null'||str==='undefined'||str==='[object Object]') return null;
  const key=str.startsWith('L')&&str.length>1&&str[1]!==':'?str.slice(1):str;
  if(key.includes(':')&&!key.startsWith('custom:')){
    const [phaseId,sessN]=key.split(':');
    const ph=PHASES.find(p=>p.id===phaseId);
    const sess=ph&&ph.sessions.find(s=>String(s.n)===sessN);
    return sess?'S'+sess.n+': '+sess.title:key;
  }
  if(key.startsWith('custom:')){
    const cl=getCustomLessons().find(c=>'custom:'+c.id===key||c.id===key.replace('custom:',''));
    return cl?(cl.title||cl.label||'Custom Lesson'):'Custom Lesson';
  }
  return key;
}

// ── InfoDropdownList — spring-physics list inside expanded pill ───────────────
function InfoDropdownList({items,filterEnabled}){
  const containerRef=React.useRef(null);
  const bubbleRef=React.useRef(null);
  const rowRefs=React.useRef([]);
  const sp=React.useRef({y:0,h:0,ty:0,th:0,vy:0,vh:0,opacity:0,to:0});
  const rafRef=React.useRef(null);
  const [query,setQuery]=React.useState('');
  const S=900,D=42;

  const filteredItems=React.useMemo(()=>{
    if(!filterEnabled||!query.trim()) return items;
    const q=query.trim().toLowerCase();
    return items.filter(it=>it.isDivider||it.isHeader||it.label.toLowerCase().includes(q));
  },[items,query,filterEnabled]);

  function getRowRect(i){
    const row=rowRefs.current[i];
    const wrap=containerRef.current;
    if(!row||!wrap) return null;
    const wr=wrap.getBoundingClientRect();
    const rr=row.getBoundingClientRect();
    return{y:rr.top-wr.top+wrap.scrollTop,h:rr.height};
  }

  function tick(){
    const s=sp.current;
    const dt=0.016,STEPS=4,ddt=dt/STEPS;
    for(let i=0;i<STEPS;i++){
      s.vy+=(-S*(s.y-s.ty)-D*s.vy)*ddt;
      s.vh+=(-S*(s.h-s.th)-D*s.vh)*ddt;
      s.y+=s.vy*ddt; s.h+=s.vh*ddt;
    }
    s.opacity+=(s.to-s.opacity)*0.18;
    const b=bubbleRef.current;
    if(b){b.style.top=s.y+'px';b.style.height=s.h+'px';b.style.opacity=s.opacity;}
    const done=Math.abs(s.vy)<0.3&&Math.abs(s.vh)<0.3&&
      Math.abs(s.y-s.ty)<0.3&&Math.abs(s.h-s.th)<0.3&&Math.abs(s.opacity-s.to)<0.002;
    if(!done) rafRef.current=requestAnimationFrame(tick);
    else rafRef.current=null;
  }

  function startTick(){if(!rafRef.current) rafRef.current=requestAnimationFrame(tick);}

  function onEnter(i){
    const r=getRowRect(i); if(!r) return;
    const s=sp.current;
    if(s.to===0){s.y=r.y;s.h=r.h;}
    s.ty=r.y; s.th=r.h; s.to=1;
    startTick();
  }
  function onLeave(){sp.current.to=0;startTick();}

  // Scroll to current item on mount
  React.useEffect(()=>{
    const currentIdx=filteredItems.findIndex(it=>it.isCurrent);
    if(currentIdx<0||!containerRef.current) return;
    const row=rowRefs.current[currentIdx];
    if(row) row.scrollIntoView({block:'nearest'});
  },[]);

  return(
    <div data-dropdown="1" style={{marginTop:4,background:'rgba(7,7,8,0.97)',border:'1px solid rgba(255,255,255,0.12)',
      borderRadius:10,boxShadow:'0 8px 32px rgba(0,0,0,0.7)'}}>
      {filterEnabled&&(
        <div style={{padding:'8px 10px 6px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
          <input
            autoFocus
            value={query}
            onChange={e=>setQuery(e.target.value)}
           onClick={e=>e.stopPropagation()}
            placeholder="Type to search…"
            style={{width:'100%',background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',
              borderRadius:6,padding:'5px 9px',fontSize:12,color:'#fff',outline:'none',
              fontFamily:"'DM Sans',sans-serif"}}/>
        </div>
      )}
      <div ref={containerRef}
        data-scrollable="1"
        style={{position:'relative',maxHeight:220,overflowY:'auto',scrollbarWidth:'thin',
          scrollbarColor:'rgba(255,255,255,0.15) transparent'}}
        onMouseLeave={onLeave}>
        {/* Spring bubble */}
        <div ref={bubbleRef} style={{position:'absolute',left:3,right:3,borderRadius:6,
          background:'rgb(0,116,240)',pointerEvents:'none',zIndex:0,opacity:0,
          willChange:'top,height,opacity'}}/>
        {filteredItems.map((item,i)=>{
          if(item.isDivider) return(
            <div key={item.id||i} style={{height:1,background:'rgba(255,255,255,0.10)',margin:'3px 0'}}/>
          );
          if(item.isHeader) return(
            <div key={item.id||i} style={{padding:'6px 12px 3px',fontSize:9,fontWeight:700,
              letterSpacing:'0.08em',color:'rgba(255,255,255,0.3)',textTransform:'uppercase',
              userSelect:'none'}}>
              {item.label}
            </div>
          );
          return(
            <div key={item.id}
              ref={el=>rowRefs.current[i]=el}
              onMouseEnter={e=>{onEnter(i);e.currentTarget.style.color='#fff';}}
              onMouseLeave={e=>{e.currentTarget.style.color=item.isCurrent?'rgb(0,116,240)':'rgba(255,255,255,0.72)';}}
              onClick={item.onSelect}
              style={{position:'relative',zIndex:1,padding:'7px 12px',fontSize:12,
                color:item.isCurrent?'rgb(0,116,240)':'rgba(255,255,255,0.72)',
                fontFamily:"'DM Sans',sans-serif",cursor:'pointer',
                display:'flex',alignItems:'center',gap:8,userSelect:'none'}}>
              <span style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
                background:item.isCurrent?'rgb(0,116,240)':'transparent',
                border:item.isCurrent?'none':'1.5px solid rgba(255,255,255,0.15)',
                transition:'background .15s'}}/>
              <span style={{flex:1,minWidth:0}}>{item.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── PhotoLightbox ────────────────────────────────────────────────────────────
function PhotoLightbox({photo,allPhotos,onClose,onNavigate,teacherMode,zIndex,onPhotoEdit,onPhotoReassign,editedUrls}){
  if(!photo) return null;

  const containerRef=React.useRef(null);
  const imgRef=React.useRef(null);
  const zoomRef=React.useRef(1);
  const panXRef=React.useRef(0);
  const panYRef=React.useRef(0);
  const rafRef=React.useRef(null);
  const isPanningRef=React.useRef(false);
  const panStartRef=React.useRef(null);
  const hSwipeRef=React.useRef(0);
  const onNavigateRef=React.useRef(onNavigate);
  React.useEffect(()=>{onNavigateRef.current=onNavigate;},[onNavigate]);
  const onCloseRef=React.useRef(onClose);
  React.useEffect(()=>{onCloseRef.current=onClose;},[onClose]);

  const [isZoomed,setIsZoomed]=React.useState(false);
  const [sliderVal,setSliderVal]=React.useState(100);
  const [sliderActive,setSliderActive]=React.useState(false);
  const [activeControl,setActiveControl]=React.useState(null);
  const [infoVisible,setInfoVisible]=React.useState(false);
  const [infoPos,setInfoPos]=React.useState(null);
  const [lessonOverlayOpen,setLessonOverlayOpen]=React.useState(false);
  const [currentUrl,setCurrentUrl]=React.useState(photo.url);
  const [filterStyle,setFilterStyle]=React.useState('');
  const originalUrl=React.useRef(photo.url);
  const croppedSrcRef=React.useRef(null);
  const photoFiltersRef=React.useRef({});
  const photoFilterStrRef=React.useRef({});
  const infoPanelRef=React.useRef(null);
  const [panelBg,setPanelBg]=React.useState('rgba(7,7,8,0.87)');
  // E: inline reassign state
  const [infoEditMode,setInfoEditMode]=React.useState(false); // pencil toggle
  const [reassignField,setReassignField]=React.useState(null); // which pill is open: 'student'|'lesson'|'section'|null
  const [reassignSaving,setReassignSaving]=React.useState(false);
  const customLessons=useCustomLessons();

  // Close open pill on outside click (but keep edit mode on)
  React.useEffect(()=>{
    if(!reassignField) return;
    function handle(e){
      if(e.target.closest('[data-scrollable],[data-dropdown]')) return;
      if(!infoPanelRef.current||!infoPanelRef.current.contains(e.target)) setReassignField(null);
    }
    document.addEventListener('mousedown',handle);
    return()=>document.removeEventListener('mousedown',handle);
  },[reassignField]);

  // Exit edit mode resets everything
  function exitEditMode(){setInfoEditMode(false);setReassignField(null);}

  // C3 — Adaptive tone: sample image brightness, adjust panel opacity
  React.useEffect(()=>{
    const img=imgRef.current;
    if(!img||!img.complete) return;
    try{
      const cv=document.createElement('canvas');
      cv.width=32;cv.height=32;
      const ctx=cv.getContext('2d');
      ctx.drawImage(img,0,0,32,32);
      const d=ctx.getImageData(0,0,32,32).data;
      let lum=0;
      for(let i=0;i<d.length;i+=4) lum+=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);
      lum/=(d.length/4*255);
      // Light bg (lum>0.55) → darker panel; dark bg → slightly lighter
      const alpha=lum>0.55?0.92:0.84;
      setPanelBg('rgba(7,7,8,'+alpha+')');
    }catch(e){/* CORS — keep default */}
  },[currentUrl]);

  const isDoc=(photo.type||'artwork')==='documentation';
  const rawLesson=photo.lessons&&photo.lessons[0];
  const lessonTitle=resolveLessonLabel(rawLesson);
  const lessonSession=React.useMemo(()=>{
    const raw=photo.lessons&&photo.lessons[0];
    if(raw===null||raw===undefined) return null;
    const str=String(raw).trim();
    if(!str||str==='null'||str==='undefined'||str==='[object Object]') return null;
    const key=str.startsWith('L')&&str.length>1&&str[1]!==':'?str.slice(1):str;
    if(key.includes(':')&&!key.startsWith('custom:')){
      const [phaseId,sessN]=key.split(':');
      const ph=PHASES.find(p=>p.id===phaseId);
      return (ph&&ph.sessions.find(s=>String(s.n)===sessN))||null;
    }
    return null;
  },[photo.lessons]);
  const lessonOverview=lessonSession?lessonSession.overview:null;
  const lessonKws=lessonSession?lessonSession.kws||[]:[];
  const lessonN=lessonSession?lessonSession.n:null;

  function applyTransform(){
    if(!imgRef.current) return;
    imgRef.current.style.transform='scale('+zoomRef.current+') translate('+panXRef.current/zoomRef.current+'px,'+panYRef.current/zoomRef.current+'px)';
    const r=Math.max(0,12*(1-(zoomRef.current-1)/0.5));
    imgRef.current.style.borderRadius=r+'px';
  }
  function applyZoom(val,cursorX,cursorY){
    const prev=zoomRef.current;
    const clamped=Math.min(4,Math.max(1,val));
    if(clamped===1){panXRef.current=0;panYRef.current=0;}
    else if(cursorX!==undefined&&cursorY!==undefined&&containerRef.current){
      const r=containerRef.current.getBoundingClientRect();
      const cx=cursorX-r.left-r.width/2;
      const cy=cursorY-r.top-r.height/2;
      const scale=clamped/prev;
      panXRef.current=(panXRef.current-cx)*scale+cx;
      panYRef.current=(panYRef.current-cy)*scale+cy;
    }
    zoomRef.current=clamped;
    setIsZoomed(clamped>1.005);
    setSliderVal(Math.round(clamped*100));
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(applyTransform);
  }
  function softReset(){
    if(imgRef.current){imgRef.current.style.transition='transform 0.28s ease';setTimeout(()=>{if(imgRef.current)imgRef.current.style.transition='none';},280);}
    zoomRef.current=1;panXRef.current=0;panYRef.current=0;
    setIsZoomed(false);setSliderVal(100);
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(applyTransform);
  }

  React.useEffect(()=>{
    zoomRef.current=1;panXRef.current=0;panYRef.current=0;
    hSwipeRef.current=0;setIsZoomed(false);setSliderVal(100);
    originalUrl.current=photo.url;
    // Restore edited version if available, else original
    const restored=(editedUrls&&editedUrls[photo.url])||photo.url;
    croppedSrcRef.current=restored===photo.url?null:restored;
    setCurrentUrl(restored);
    if(imgRef.current){
      imgRef.current.style.transition='none';
      imgRef.current.style.transform='scale(1) translate(0px,0px)';
    }
    // Restore this photo's filter via React state
    const hasBakedBlob=(editedUrls&&editedUrls[photo.url]&&editedUrls[photo.url]!==photo.url);
    const fs=(!hasBakedBlob&&photoFilterStrRef.current[photo.url])||'';
    setFilterStyle(fs);
  },[photo.url]);

  const activeControlRef=React.useRef(activeControl);
  React.useEffect(()=>{
    activeControlRef.current=activeControl;
    // Sync filterStyle state with stored filter for this photo
    const hasBakedBlob=(editedUrls&&editedUrls[photo.url]&&editedUrls[photo.url]!==photo.url);
    const fs=(!hasBakedBlob&&photoFilterStrRef.current[photo.url])||'';
    setFilterStyle(fs);
  },[activeControl]);

  React.useEffect(()=>{
    const el=containerRef.current;if(!el) return;
    function onWheel(e){
      if(activeControlRef.current==='crop'){e.preventDefault();return;}
      const inScroll=e.target&&e.target.closest&&e.target.closest('[data-scrollable]');
      if(inScroll) return;
      e.preventDefault();
      const absDX=Math.abs(e.deltaX),absDY=Math.abs(e.deltaY);
      if(e.ctrlKey){applyZoom(zoomRef.current-e.deltaY*0.022);}
      else if(absDX>absDY&&absDX>2){
        if(zoomRef.current>1.08) return;
        hSwipeRef.current+=e.deltaX;
        if(hSwipeRef.current>45){hSwipeRef.current=0;onNavigateRef.current(1);}
        else if(hSwipeRef.current<-45){hSwipeRef.current=0;onNavigateRef.current(-1);}
      } else if(absDY>1){applyZoom(zoomRef.current-e.deltaY*0.003,e.clientX,e.clientY);}
    }
    el.addEventListener('wheel',onWheel,{passive:false});
    return ()=>el.removeEventListener('wheel',onWheel);
  },[]);

  function onMouseDown(e){
    if(!isZoomed) return;
    e.preventDefault();
    isPanningRef.current=true;
    panStartRef.current={x:e.clientX-panXRef.current,y:e.clientY-panYRef.current};
  }
  function onMouseMove(e){
    if(!isPanningRef.current||!panStartRef.current) return;
    panXRef.current=e.clientX-panStartRef.current.x;
    panYRef.current=e.clientY-panStartRef.current.y;
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(applyTransform);
  }
  function onMouseUp(){isPanningRef.current=false;}

  React.useEffect(()=>{
    function onKey(e){
      if(e.key==='Escape'){onCloseRef.current();return;}
      const tag=(e.target&&e.target.tagName)||'';
      if(tag==='INPUT'||tag==='TEXTAREA') return;
      if(e.key==='i'||e.key==='I'){
        const next=!infoVisible;
        setInfoVisible(next);
        setActiveControl(next?'info':null);
        return;
      }
      if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
        const ac=activeControlRef.current;
        if(ac==='crop'||ac==='edit')return;
        const dir=e.key==='ArrowLeft'?-1:1;
        softReset();onNavigateRef.current(dir);
      }
    }
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[infoVisible]);

  function startInfoDrag(e){
    if(e.target.closest('[data-scrollable],button,input')) return;
    e.stopPropagation();
    const panel=infoPanelRef.current;if(!panel) return;
    const rect=panel.getBoundingClientRect();
    const sx=e.clientX,sy=e.clientY,sl=rect.left,st=rect.top;
    function move(ev){setInfoPos({x:sl+(ev.clientX-sx),y:st+(ev.clientY-sy)});}
    function up(){window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);}
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  }

  const infoPanelStyle=infoPos?{position:'fixed',left:infoPos.x+'px',top:infoPos.y+'px'}:{position:'absolute',top:'8vh',right:'2.5vw'};
  const idx=allPhotos?allPhotos.findIndex(p=>p.url===photo.url):-1;
  const F="'DM Sans',sans-serif";

  function setControl(name){
    const next=activeControl===name?null:name;
    setActiveControl(next);
    setInfoVisible(next==='info');
  }

  return [
  ReactDOM.createPortal(
    <div key="lb" ref={containerRef} style={{position:'fixed',inset:0,zIndex:zIndex||4000,background:'#000',cursor:isZoomed?'grab':'default',userSelect:'none'}}
      onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
      onDoubleClick={()=>{
        // Double-tap: reset zoom/pan to default
        zoomRef.current=1;panXRef.current=0;panYRef.current=0;
        setIsZoomed(false);setSliderVal(100);
        if(rafRef.current)cancelAnimationFrame(rafRef.current);
        rafRef.current=requestAnimationFrame(applyTransform);
      }}>

      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <img ref={imgRef} src={currentUrl} alt="" draggable={false}
          style={{maxWidth:`${(1-_CROP_MARGIN_H*2)*100}vw`,maxHeight:`${(1-_CROP_MARGIN_V*2)*100}vh`,objectFit:'contain',display:'block',imageRendering:'high-quality',WebkitImageRendering:'crisp-edges',transformOrigin:'center center',willChange:'transform',borderRadius:12,transition:'border-radius 0.4s ease',filter:filterStyle||undefined}}/>
      </div>

      {/* ZOOM SLIDER */}
      <ZoomSlider value={sliderVal} active={sliderActive}
        onChange={v=>{const f=v/100;zoomRef.current=f;if(f===1){panXRef.current=0;panYRef.current=0;}setIsZoomed(f>1.005);setSliderVal(v);if(rafRef.current)cancelAnimationFrame(rafRef.current);rafRef.current=requestAnimationFrame(applyTransform);}}
        onActiveChange={setSliderActive}/>

      {/* COUNTER */}
      {allPhotos&&allPhotos.length>1&&(
        <div style={{position:'absolute',top:'2.5vh',left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,0.15)',fontSize:'clamp(9px,1.1vh,11px)',fontFamily:F,pointerEvents:'none',whiteSpace:'nowrap'}}>
          {idx>=0?idx+1:'—'} / {allPhotos.length}
        </div>
      )}

      {/* INFO PANEL */}
      {activeControl==='info'&&infoVisible&&(
        <div className="lb-glass-panel" ref={infoPanelRef}
          style={{...infoPanelStyle,zIndex:20,width:'clamp(220px,20vw,280px)',
            background:panelBg,backdropFilter:'blur(6px) saturate(200%)',
            WebkitBackdropFilter:'blur(6px) saturate(200%)',borderRadius:15,
            border:'1px solid rgba(255,255,255,0.15)',overflow:'visible',
            boxShadow:'0 12px 40px rgba(0,0,0,0.65)',
            animation:'panel-in .22s cubic-bezier(0.34,1.56,0.64,1) forwards',
            transition:'border-color .2s'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>

          {/* Header: name + section dot + edit/tick button */}
          <div style={{padding:'12px 12px 12px',cursor:'grab',position:'relative'}} onMouseDown={startInfoDrag}>

            {/* Pencil / green tick button — teacher only */}
            {teacherMode&&onPhotoReassign&&(
              <button
                onClick={e=>{e.stopPropagation();infoEditMode?exitEditMode():setInfoEditMode(true);}}
                onMouseEnter={e=>{if(!infoEditMode){e.currentTarget.style.color='rgb(0,116,240)';e.currentTarget.style.transform='translateY(-1px) scale(1.05)';}}}
                onMouseLeave={e=>{if(!infoEditMode){e.currentTarget.style.color='rgba(255,255,255,0.4)';e.currentTarget.style.transform='translateY(0) scale(1)';}}}
                style={{position:'absolute',top:10,right:10,width:28,height:28,
                  borderRadius:'50%',border:'none',
                  background:infoEditMode?'rgb(34,197,94)':'transparent',
                  color:infoEditMode?'#fff':'rgba(255,255,255,0.4)',
                  cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                  transition:'background .18s,color .18s,transform .18s',flexShrink:0,padding:0}}>
                {infoEditMode
                  ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
                }
              </button>
            )}

            {/* Student name (artwork) */}
            {!isDoc&&(
              <>
                <div style={{fontSize:'clamp(13px,1.5vh,16px)',fontWeight:700,color:'#fff',
                  fontFamily:F,letterSpacing:'0.01em',marginBottom:3,lineHeight:1.2,
                  paddingRight:teacherMode&&onPhotoReassign?34:0}}>
                  {photo.studentName||'—'}
                </div>
                <div style={{fontSize:'clamp(10px,1.1vh,12px)',color:'rgba(255,255,255,0.42)',
                  fontFamily:F,display:'flex',alignItems:'center',gap:5}}>
                  <SectionDot sectionId={photo.sectionId} size={5}/>{photo.sectionName||''}
                </div>
                {/* Student pill — only in edit mode, all sections */}
                {infoEditMode&&teacherMode&&onPhotoReassign&&(
                  <InfoPill
                    label={photo.studentName||'Unknown student'}
                    open={reassignField==='student'}
                    onToggle={()=>setReassignField(reassignField==='student'?null:'student')}>
                    <InfoDropdownList
                      filterEnabled={true}
                      items={G4_SECTIONS.flatMap((sec,si)=>[
                        ...(si>0?[{id:'__div_'+sec.id,isDivider:true,label:'',isCurrent:false,onSelect:()=>{}}]:[]),
                        {id:'__h_'+sec.id,label:sec.name,isHeader:true,isCurrent:false,onSelect:()=>{}},
                        ...sec.students.map((name,idx)=>({
                          id:sec.id+'-'+idx,
                          label:name,
                          isCurrent:name===photo.studentName&&sec.id===photo.sectionId,
                          onSelect:async()=>{
                            if(reassignSaving) return;
                            setReassignSaving(true);
                            await onPhotoReassign(photo,{newStudentIdx:idx,newSectionId:sec.id});
                            setReassignSaving(false);
                            setReassignField(null);
                          }
                        }))
                      ])}                    />
                  </InfoPill>
                )}
              </>
            )}

            {/* Doc title (documentation) */}
            {isDoc&&(
              <>
                <div style={{fontSize:'clamp(13px,1.5vh,16px)',fontWeight:700,color:'#fff',
                  fontFamily:F,letterSpacing:'0.01em',lineHeight:1.3,
                  paddingRight:teacherMode&&onPhotoReassign?34:0}}>
                  {lessonN?('L'+lessonN+': '+lessonSession.title):(lessonTitle||'Documentation')}
                </div>
                {/* Section pill — only in edit mode, docs only */}
                {infoEditMode&&teacherMode&&onPhotoReassign&&(
                  <InfoPill
                    label={photo.sectionName||'Section'}
                    open={reassignField==='section'}
                    onToggle={()=>setReassignField(reassignField==='section'?null:'section')}>
                    <InfoDropdownList
                      filterEnabled={false}
                      items={G4_SECTIONS.map(sec=>({
                        id:sec.id,label:sec.name,
                        isCurrent:sec.id===photo.sectionId,
                        onSelect:async()=>{
                          if(reassignSaving) return;
                          setReassignSaving(true);
                          await onPhotoReassign(photo,{newSectionId:sec.id,newStudentIdx:0});
                          setReassignSaving(false);
                          setReassignField(null);
                        }
                      }))}
                    />
                  </InfoPill>
                )}
              </>
            )}
          </div>

          <div style={{height:1,background:'rgba(255,255,255,0.15)',margin:'0 12px'}}/>

          {/* Lesson row — always visible in edit mode, otherwise only if lesson exists */}
          {(lessonN||lessonTitle||(infoEditMode&&teacherMode&&onPhotoReassign&&!isDoc))&&(
            <div style={{padding:'6px 12px 8px',overflow:'visible'}}>
              {!isDoc&&(
                <>
                  {/* Read mode: click opens lesson overlay */}
                  {!infoEditMode&&(
                    <div
                      onClick={lessonSession?()=>setLessonOverlayOpen(true):undefined}
                      style={{fontSize:'clamp(11px,1.3vh,13px)',fontWeight:600,
                        color:lessonSession?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.75)',
                        fontFamily:F,marginBottom:lessonOverview?7:0,lineHeight:1.3,
                        paddingTop:3,
                        cursor:lessonSession?'pointer':'default'}}>
                      {lessonN?('L'+lessonN+': '+lessonSession.title):lessonTitle}
                    </div>
                  )}
                  {/* Edit mode: lesson pill */}
                  {infoEditMode&&teacherMode&&onPhotoReassign&&(
                    <InfoPill
                      label={lessonN?('L'+lessonN+': '+lessonSession.title):(lessonTitle||'No lesson')}
                      open={reassignField==='lesson'}
                      onToggle={()=>setReassignField(reassignField==='lesson'?null:'lesson')}>
                      <InfoDropdownList
                        filterEnabled={true}
                        items={[
                          {id:'__h_lessons__',label:'Lessons',isHeader:true,isCurrent:false,onSelect:()=>{}},
                          ...PHASES.flatMap(ph=>ph.sessions.map(s=>{
                            const key=ph.id+':'+s.n;
                            const currentKey=(photo.lessons&&photo.lessons[0])||'';
                            return{
                              id:key,
                              label:'S'+s.n+': '+s.title,
                              isCurrent:currentKey===key||currentKey==='L'+key,
                              onSelect:async()=>{
                                if(reassignSaving) return;
                                setReassignSaving(true);
                                await onPhotoReassign(photo,{newLesson:key});
                                setReassignSaving(false);
                                setReassignField(null);
                              }
                            };
                          })),
                          ...(customLessons.length>0?[
                            {id:'__div__',isDivider:true,label:'',isCurrent:false,onSelect:()=>{}},
                            {id:'__h_custom__',label:'Custom Lessons',isHeader:true,isCurrent:false,onSelect:()=>{}},
                            ...customLessons.map(cl=>{
                              const key='custom:'+cl.id;
                              return{
                                id:cl.id,
                                label:'★ '+(cl.title||cl.label),
                                isCurrent:(photo.lessons&&photo.lessons[0])===key,
                                onSelect:async()=>{
                                  if(reassignSaving) return;
                                  setReassignSaving(true);
                                  await onPhotoReassign(photo,{newLesson:key});
                                  setReassignSaving(false);
                                  setReassignField(null);
                                }
                              };
                            })
                          ]:[])
                        ]}
                      />
                    </InfoPill>
                  )}
                  {lessonOverview&&<div style={{fontSize:'clamp(10px,1.1vh,12px)',color:'rgba(255,255,255,0.38)',fontFamily:F,lineHeight:1.6,fontStyle:'italic',marginTop:6}}>{lessonOverview}</div>}
                </>
              )}
              {isDoc&&lessonOverview&&<div style={{fontSize:'clamp(10px,1.1vh,12px)',color:'rgba(255,255,255,0.38)',fontFamily:F,lineHeight:1.6,fontStyle:'italic'}}>{lessonOverview}</div>}
            </div>
          )}

          {photo.date&&isDoc&&(<><div style={{height:1,background:'rgba(255,255,255,0.15)',margin:'0 12px'}}/><div style={{padding:'10px 12px',fontSize:'clamp(11px,1.2vh,13px)',color:'rgba(255,255,255,0.45)',fontFamily:F}}>{photo.date}</div></>)}
          {lessonKws.length>0&&(
            <>
              <div style={{height:1,background:'rgba(255,255,255,0.15)',margin:'0 12px'}}/>
              <div style={{padding:'12px 12px 10px',display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                {lessonKws.map(k=><span key={k} style={{fontSize:'clamp(9px,1vh,11px)',color:'rgba(255,255,255,0.52)',background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:100,padding:'3px 10px',fontFamily:F}}>{k}</span>)}
              </div>
            </>
          )}
          {(photo.artTags||[]).length>0&&(
            <>
              <div style={{height:1,background:'rgba(255,255,255,0.15)',margin:'0 12px'}}/>
              <div style={{padding:'12px 12px 12px',display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                {(photo.artTags||[]).map(t=><span key={t} style={{fontSize:'clamp(9px,1vh,11px)',color:'rgba(255,255,255,0.52)',background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:100,padding:'3px 10px',fontFamily:F}}>{t}</span>)}
              </div>
            </>
          )}

          {/* Artwork / Documentation toggle — edit mode only */}
          {infoEditMode&&teacherMode&&onPhotoReassign&&(
            <>
              <div style={{height:1,background:'rgba(255,255,255,0.15)',margin:'0 12px'}}/>
              <div style={{padding:'10px 12px',display:'flex',alignItems:'center',gap:6}}>
                {['artwork','documentation'].map(type=>{
                  const active=(photo.type||'artwork')===type;
                  return(
                    <button key={type}
                      onClick={async()=>{
                        if(active||reassignSaving) return;
                        setReassignSaving(true);
                        await onPhotoReassign(photo,{newType:type});
                        setReassignSaving(false);
                      }}
                      style={{flex:1,padding:'6px 0',borderRadius:100,border:'1px solid',
                        borderColor:active?'rgb(0,116,240)':'rgba(255,255,255,0.13)',
                        background:active?'rgb(0,116,240)':'rgba(255,255,255,0.05)',
                        color:active?'#fff':'rgba(255,255,255,0.45)',
                        fontSize:11,fontWeight:600,fontFamily:F,cursor:active?'default':'pointer',
                        transition:'all .15s',textTransform:'capitalize'}}>
                      {type}
                    </button>
                  );
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* LESSON OVERLAY — opens full SessionCard when lesson title tapped in info card */}
      {lessonOverlayOpen&&lessonSession&&ReactDOM.createPortal(
        <div style={{position:'fixed',inset:0,zIndex:4500,display:'flex',alignItems:'center',justifyContent:'center',padding:'5vh 4vw'}}
          onClick={()=>setLessonOverlayOpen(false)}>
          <div className="lb-glass-panel" style={{width:'min(680px,92vw)',maxHeight:'88vh',borderRadius:15,boxShadow:'0 12px 40px rgba(0,0,0,0.65)',border:'1px solid rgba(255,255,255,0.15)',background:'rgba(7,7,8,0.87)',backdropFilter:'blur(6px) saturate(200%)',WebkitBackdropFilter:'blur(6px) saturate(200%)'}}
            onClick={e=>e.stopPropagation()}>
            <style>{'.lesson-overlay .sc.open-card{background:rgba(18,18,22,0.0)!important;border:none!important;box-shadow:none!important;transform:none!important;}.lesson-overlay .sc-panel{background:transparent!important;}.lesson-overlay .sc-tabs{background:rgba(255,255,255,0.04)!important;border-bottom-color:rgba(255,255,255,0.08)!important;}.lesson-overlay .sc-hdr{cursor:default!important;}.lesson-overlay .sc-title{font-size:16px!important;}.lesson-overlay .pbox{background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.07)!important;}.lesson-overlay .recap-box{background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.07)!important;}.lesson-overlay .tn{background:rgba(255,255,255,0.04)!important;}.lesson-overlay .step{background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.07)!important;}'}</style>
            <div className="lesson-overlay" style={{overflowY:'auto',maxHeight:'88vh',scrollbarWidth:'none'}}>
            {(()=>{
              const ph=PHASES.find(p=>p.sessions.find(s=>s.n===lessonSession.n));
              if(!ph) return null;
              return React.createElement(SessionCard,{
                s:lessonSession,
                color:ph.color,
                phaseId:ph.id,
                progress:{},
                toggle:()=>{},
                classView:false,
                openSession:lessonSession.n,
                setOpenSession:()=>{},
                isVisitor:false,
                hideControls:true
              });
            })()}
            </div>
          </div>
        </div>,
        document.body
      )}

      {/* CROP OVERLAY */}
      {activeControl==='crop'&&<CropOverlay imgSrc={croppedSrcRef.current||originalUrl.current} onCommit={(canvas,url)=>{croppedSrcRef.current=url;setCurrentUrl(url);if(onPhotoEdit)onPhotoEdit(url,photo);setActiveControl(null);}}/>}

      {/* EDIT PANEL */}
      {activeControl==='edit'&&<EditPanel imgRef={imgRef} panelBg={panelBg}
        initialFilters={photoFiltersRef.current[photo.url]}
        onFilterChange={(filters,filterStr)=>{
          photoFiltersRef.current[photo.url]=filters;
          photoFilterStrRef.current[photo.url]=filterStr;
        }}
        onClose={()=>setActiveControl(null)}
        onApply={(filterStr)=>{
          // Store filterStr as source of truth, apply via React state
          photoFilterStrRef.current[photo.url]=filterStr;
          setFilterStyle(filterStr);
          // Try to bake into blob for hosted env (same-origin only)
          const el=imgRef.current;
          if(el){
            const natW=el.naturalWidth||el.offsetWidth;
            const natH=el.naturalHeight||el.offsetHeight;
            const cv=document.createElement('canvas');cv.width=natW;cv.height=natH;
            const ctx=cv.getContext('2d');
            ctx.filter=filterStr||'none';
            try{
              ctx.drawImage(el,0,0,natW,natH);
              cv.toBlob(blob=>{
                const url=URL.createObjectURL(blob);
                croppedSrcRef.current=url;
                setCurrentUrl(url);
                if(onPhotoEdit)onPhotoEdit(url,photo);
                // Blob is baked — clear CSS filter (it's in image data now)
                setFilterStyle('');
              },'image/jpeg',0.97);
            }catch(e){
              // CORS/file:// — CSS filter already applied above, stays on element
            }
          }
          setActiveControl(null);
        }}
      />}

    </div>,
    document.body
  ),

  // Toolbar — own portal so it always sits above all other portals
  ReactDOM.createPortal(
    <div style={{position:'fixed',top:'2.5vh',right:'2.5vw',display:'flex',alignItems:'center',gap:10,zIndex:(zIndex||4000)+2,pointerEvents:'auto'}}
      onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <ToolbarPill activeControl={activeControl} teacherMode={teacherMode} onSetControl={setControl}/>
      <button onClick={e=>{e.stopPropagation();onClose();}}
        style={{background:'rgba(7,7,8,0.87)',backdropFilter:'blur(6px) saturate(200%)',WebkitBackdropFilter:'blur(6px) saturate(200%)',border:'1px solid rgba(255,255,255,0.15)',cursor:'pointer',width:34,height:34,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.55)',fontSize:16,fontWeight:300,lineHeight:1,flexShrink:0,boxShadow:'0 4px 20px rgba(0,0,0,0.35)',transition:'background .18s,border-color .18s,color .18s'}}
        onMouseEnter={e=>{e.currentTarget.style.background='rgba(220,50,40,0.85)';e.currentTarget.style.borderColor='rgba(220,50,40,0.6)';e.currentTarget.style.color='#fff';}}
        onMouseLeave={e=>{e.currentTarget.style.background='rgba(15,15,20,0.45)';e.currentTarget.style.borderColor='rgba(255,255,255,0.1)';e.currentTarget.style.color='rgba(255,255,255,0.55)';}}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
      </button>
    </div>,
    document.body
  )
  ];
}

function GalleryView({isVisitor}){
  const SECTION_IDS=G4_SECTIONS.map(s=>s.id);
  const [allData,setAllData]=React.useState({});
  const [loading,setLoading]=React.useState(true);
  const [filterType,setFilterType]=React.useState('all');
  // Visitors can only see artworks — force filter
  const effectiveFilterType=isVisitor?'artwork':filterType;

  // ── Gallery edit mode ──
  const [galleryEditMode,setGalleryEditMode]=React.useState(false);
  const [selectedPhotos,setSelectedPhotos]=React.useState(new Set()); // Set of "sectionId-studentIdx-photoIdx"
  const [bulkEditOpen,setBulkEditOpen]=React.useState(false);
  const [bulkEditType,setBulkEditType]=React.useState('');
  const [bulkEditLesson,setBulkEditLesson]=React.useState('');
  const [bulkEditSection,setBulkEditSection]=React.useState('');
  const [bulkEditSaving,setBulkEditSaving]=React.useState(false);
  const [confirmDelete,setConfirmDelete]=React.useState(false);
  const [filterSections,setFilterSections]=React.useState(new Set());
  const [filterLessons,setFilterLessons]=React.useState(new Set());
  const [filterTags,setFilterTags]=React.useState(new Set());
  const [showFilter,setShowFilter]=React.useState(false);
  const [showUpload,setShowUpload]=React.useState(false);
  const [lightbox,setLightbox]=React.useState(null);
  const [studentPopup,setStudentPopup]=React.useState(null);
  const [editedUrls,setEditedUrls]=React.useState({}); // {originalUrl: editedUrl}
  const {teacherMode}=React.useContext(KWContext);

  function photoKey(p){return`${p.sectionId}-${p.studentIdx}-${p.photoIdx}`;}
  function toggleSelect(p){
    const k=photoKey(p);
    setSelectedPhotos(prev=>{const n=new Set(prev);n.has(k)?n.delete(k):n.add(k);return n;});
  }
  function exitEditMode(){setGalleryEditMode(false);setSelectedPhotos(new Set());setBulkEditOpen(false);setConfirmDelete(false);}

  async function bulkSave(){
    if(bulkEditSaving) return;
    setBulkEditSaving(true);
    // Group selected by sectionId for batch writes
    const bySid={};
    filtered.filter(p=>selectedPhotos.has(photoKey(p))).forEach(p=>{
      if(!bySid[p.sectionId]) bySid[p.sectionId]=[];
      bySid[p.sectionId].push(p);
    });
    for(const sid of Object.keys(bySid)){
      try{
        const snap=await window._db.collection('sections').doc('shared-'+sid).get();
        if(!snap.exists) continue;
        const d=snap.data();
        bySid[sid].forEach(p=>{
          const port=d.students[p.studentIdx].portfolio||[];
          if(port[p.photoIdx]){
            if(bulkEditType) port[p.photoIdx].type=bulkEditType;
            if(bulkEditLesson!==undefined) port[p.photoIdx].lessons=bulkEditLesson?[bulkEditLesson]:[];
          }
        });
        await window._db.collection('sections').doc('shared-'+sid).set(d);
      }catch(e){console.error('bulk save failed',e);}
    }
    setBulkEditSaving(false);setBulkEditOpen(false);setSelectedPhotos(new Set());
  }

  async function bulkDelete(){
    setBulkEditSaving(true);
    const bySid={};
    filtered.filter(p=>selectedPhotos.has(photoKey(p))).forEach(p=>{
      if(!bySid[p.sectionId]) bySid[p.sectionId]=[];
      bySid[p.sectionId].push(p);
    });
    for(const sid of Object.keys(bySid)){
      try{
        const snap=await window._db.collection('sections').doc('shared-'+sid).get();
        if(!snap.exists) continue;
        const d=snap.data();
        // Delete in reverse index order so splicing doesn't shift indices
        const groups={};
        bySid[sid].forEach(p=>{if(!groups[p.studentIdx])groups[p.studentIdx]=[];groups[p.studentIdx].push(p.photoIdx);});
        Object.keys(groups).forEach(si=>{
          const idxs=groups[si].sort((a,b)=>b-a);
          const port=d.students[si].portfolio||[];
          idxs.forEach(pi=>port.splice(pi,1));
          d.students[si].portfolio=port;
        });
        await window._db.collection('sections').doc('shared-'+sid).set(d);
      }catch(e){console.error('bulk delete failed',e);}
    }
    setBulkEditSaving(false);setConfirmDelete(false);setSelectedPhotos(new Set());
  }

  async function handlePhotoEdit(editedUrl,photo){
    // editedUrl is a blob URL or data URL from crop/filter apply
    setEditedUrls(prev=>({...prev,[photo.url]:editedUrl}));
    if(!photo.sectionId||photo.studentIdx===undefined||photo.photoIdx===undefined) return;
    try{
      // Fetch the blob from the object URL and upload to Firebase
      const res=await fetch(editedUrl);
      const blob=await res.blob();
      const ts=Date.now();
      const ref=window._storage.ref(`portfolio/${photo.sectionId}/${photo.studentIdx}/edited_${ts}.jpg`);
      await ref.put(blob,{contentType:'image/jpeg'});
      const url=await ref.getDownloadURL();
      // Write back to Firestore
      const snap=await window._db.collection('sections').doc('shared-'+photo.sectionId).get();
      if(!snap.exists) return;
      const d=snap.data();
      if(d.students[photo.studentIdx]&&d.students[photo.studentIdx].portfolio&&d.students[photo.studentIdx].portfolio[photo.photoIdx]){
        d.students[photo.studentIdx].portfolio[photo.photoIdx].url=url;
        await window._db.collection('sections').doc('shared-'+photo.sectionId).set(d);
      }
      // Update editedUrls with the permanent URL
      setEditedUrls(prev=>({...prev,[photo.url]:url}));
    }catch(e){console.error('Edit save failed',e);}
  }

  async function handlePhotoReassign(photo,{newStudentIdx,newSectionId,newLesson,newType}){
    // Reassign photo metadata in Firestore — no Storage move
    try{
      const oldSid=photo.sectionId;
      const oldStudentIdx=photo.studentIdx;
      const oldPhotoIdx=photo.photoIdx;

      // Determine new values (fall back to current if not changing)
      const targetSid=newSectionId||oldSid;
      const targetStudentIdx=newStudentIdx!==undefined?newStudentIdx:oldStudentIdx;

      // Read both sections (may be same)
      const oldSnap=await window._db.collection('sections').doc('shared-'+oldSid).get();
      if(!oldSnap.exists) return;
      const oldData=oldSnap.data();
      const photoEntry=oldData.students[oldStudentIdx]?.portfolio?.[oldPhotoIdx];
      if(!photoEntry) return;

      // Update lesson if provided
      if(newLesson!==undefined) photoEntry.lessons=newLesson?[newLesson]:[];
      // Update type if provided
      if(newType!==undefined) photoEntry.type=newType;

      if(targetSid===oldSid&&targetStudentIdx===oldStudentIdx){
        // Just updating lesson — write back in place
        oldData.students[oldStudentIdx].portfolio[oldPhotoIdx]=photoEntry;
        await window._db.collection('sections').doc('shared-'+oldSid).set(oldData);
      } else {
        // Moving to different student/section — remove from old, add to new
        oldData.students[oldStudentIdx].portfolio.splice(oldPhotoIdx,1);

        if(targetSid===oldSid){
          // Same section, different student
          if(!oldData.students[targetStudentIdx].portfolio) oldData.students[targetStudentIdx].portfolio=[];
          oldData.students[targetStudentIdx].portfolio.push(photoEntry);
          await window._db.collection('sections').doc('shared-'+oldSid).set(oldData);
        } else {
          // Different section
          await window._db.collection('sections').doc('shared-'+oldSid).set(oldData);
          const newSnap=await window._db.collection('sections').doc('shared-'+targetSid).get();
          if(!newSnap.exists) return;
          const newData=newSnap.data();
          if(!newData.students[targetStudentIdx].portfolio) newData.students[targetStudentIdx].portfolio=[];
          newData.students[targetStudentIdx].portfolio.push(photoEntry);
          await window._db.collection('sections').doc('shared-'+targetSid).set(newData);
        }
      }
      // Lightbox stays open — only green tick (exitEditMode) closes it
    }catch(e){console.error('Reassign failed',e);}
  }
  const artworkTags=getArtworkTags();
  const tagColors={green:'var(--teal)',yellow:'var(--yellow)',red:'var(--coral)'};
  const phaseColors={coral:'var(--coral)',yellow:'var(--yellow)',teal:'var(--teal)',violet:'var(--violet)'};
  const allLessons=React.useMemo(()=>PHASES.flatMap(ph=>ph.sessions.map(s=>({n:s.n,title:s.title,color:ph.color,phaseId:ph.id}))),[]);

  React.useEffect(()=>{
    let unsubs=[];
    setLoading(true);
    let loaded=0;
    SECTION_IDS.forEach(sid=>{
      const unsub=window._db.collection('sections').doc('shared-'+sid).onSnapshot(snap=>{
        if(snap.exists) setAllData(prev=>({...prev,[sid]:snap.data()}));
        loaded++;
        if(loaded>=SECTION_IDS.length) setLoading(false);
      },()=>{loaded++;if(loaded>=SECTION_IDS.length)setLoading(false);});
      unsubs.push(unsub);
    });
    return()=>unsubs.forEach(u=>u());
  },[]);

  // ── search-open-photo: fired by GlobalSearch when user clicks a photo result ──
  React.useEffect(()=>{
    function onSearchOpenPhoto(e){
      const photo=e.detail;
      if(!photo) return;
      setLightbox(photo);
    }
    window.addEventListener('search-open-photo',onSearchOpenPhoto);
    return()=>window.removeEventListener('search-open-photo',onSearchOpenPhoto);
  },[]);

  const allPhotos=React.useMemo(()=>{
    const photos=[];
    const customLessons=getCustomLessons();
    SECTION_IDS.forEach(sid=>{
      const sec=G4_SECTIONS.find(s=>s.id===sid);
      const data=allData[sid];
      if(!data||!data.students) return;
      data.students.forEach((st,idx)=>{
        (st.portfolio||[]).forEach((p,pIdx)=>{
          // For documentation: resolve a display name from the lesson key
          let displayName=st.name;
          let resolvedLesson='';
          if(p.type==='documentation'&&(p.lessons||[]).length>0){
            // Strip accidental leading 'L' prefix that can appear on some saved keys
            const rawLk=p.lessons[0];
            const lk=rawLk&&rawLk.startsWith('L')?rawLk.slice(1):rawLk;
            if(lk.startsWith('custom:')){
              const cl=customLessons.find(l=>l.id===lk.replace('custom:',''));
              resolvedLesson=cl?(cl.title||cl.label||lk):lk;
            } else {
              // phase lesson — find from PHASES
              const parts=lk.split(':');
              if(parts.length===2){
                const ph=PHASES.find(x=>x.id===parts[0]);
                const sess=ph&&ph.sessions.find(s=>String(s.n)===parts[1]);
                resolvedLesson=sess?`S${sess.n}: ${sess.title}`:lk;
              }
            }
            displayName=resolvedLesson||'Documentation';
          }
          photos.push({...p,studentName:st.name,displayName,resolvedLesson,studentIdx:idx,photoIdx:pIdx,sectionId:sid,sectionName:sec?sec.name:sid});
        });
      });
    });
    return photos.reverse();
  },[allData]);

  const filtered=React.useMemo(()=>{
    return allPhotos.filter(p=>{
      if(effectiveFilterType!=='all'&&(p.type||'artwork')!==effectiveFilterType) return false;
      if(filterSections.size>0&&!filterSections.has(p.sectionId)) return false;
      if(filterLessons.size>0&&!(p.lessons||[]).some(l=>filterLessons.has(l))) return false;
      if(filterTags.size>0&&!(p.artTags||[]).some(t=>filterTags.has(t))) return false;
      return true;
    });
  },[allPhotos,effectiveFilterType,filterSections,filterLessons,filterTags]);

  const activeFilterCount=[filterType!=='all',filterSections.size>0,filterLessons.size>0,filterTags.size>0].filter(Boolean).length;
  const clearFilters=()=>{setFilterType('all');setFilterSections(new Set());setFilterLessons(new Set());setFilterTags(new Set());};

  // filteredRef for navigate callback
  const filteredRef=React.useRef(filtered);
  React.useEffect(()=>{filteredRef.current=filtered;},[filtered]);

  const handleLightboxNavigate=React.useCallback((dir)=>{
    setLightbox(prev=>{
      if(!prev) return null;
      const idx=filteredRef.current.findIndex(p=>p.url===prev.url);
      const next=filteredRef.current[idx+dir];
      return next||prev;
    });
  },[]);

  return(
    <div style={{padding:'24px 28px',height:'100%',overflowY:'auto',display:'flex',flexDirection:'column',gap:16}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <div style={{fontSize:22,fontWeight:800,fontFamily:"'Bricolage Grotesque',sans-serif",color:'var(--tx)'}}>Gallery</div>
          <div style={{fontSize:12,color:'var(--tx3)',marginTop:2}}>{filtered.length} photo{filtered.length!==1?'s':''} across all sections</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {/* Upload button — teacher only */}
          {teacherMode&&!isVisitor&&(
            <button onClick={()=>setShowUpload(true)}
              style={{display:'flex',alignItems:'center',gap:7,fontSize:12,fontWeight:700,
                padding:'7px 16px',borderRadius:10,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",
                border:'1px solid var(--teal)',background:'rgba(59,191,160,0.12)',color:'var(--teal)'}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Upload
            </button>
          )}
          {/* Edit mode toggle — teacher only */}
          {teacherMode&&!isVisitor&&(
            <button onClick={()=>galleryEditMode?exitEditMode():setGalleryEditMode(true)}
              style={{display:'flex',alignItems:'center',gap:7,fontSize:12,fontWeight:700,
                padding:'7px 16px',borderRadius:10,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",
                border:galleryEditMode?'1px solid var(--yellow)':'1px solid var(--glass-border)',
                background:galleryEditMode?'rgba(251,191,36,0.15)':'var(--glass-bg)',
                color:galleryEditMode?'var(--yellow)':'var(--tx2)'}}>
              {galleryEditMode?(
                <>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                  Done
                </>
              ):(
                <>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  Edit
                </>
              )}
            </button>
          )}
          {/* ⚙ Filter button */}
