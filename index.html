/* ─────────────────────────────── HELPERS ─────────────────────────────── */

function useLocalStorage(key,init){
  const [val,setVal]=React.useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  // Re-read from storage if key changes (e.g. switching sessions)
  React.useEffect(()=>{
    try{const s=localStorage.getItem(key);setVal(s?JSON.parse(s):init);}catch{setVal(init);}
  },[key]);
  const set=React.useCallback((v)=>{
    setVal(prev=>{
      const next=typeof v==='function'?v(prev):v;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      return next;
    });
  },[key]);
  return[val,set];
}

// ── Global custom lessons store — Firestore backed ──────────────────────────
// Stored at customLessons/sns/{lessonId}
// Shape: {id, title, overview, keywords[], createdBy, createdAt, schoolId}
// Legacy localStorage key kept for one-time migration only.
const CUSTOM_LESSONS_KEY='g4-custom-lessons';
const CUSTOM_LESSONS_SCHOOL='sns';
const CUSTOM_LESSONS_PATH=()=>window._db.collection('customLessons').doc(CUSTOM_LESSONS_SCHOOL).collection('lessons');

// In-memory cache so getCustomLessons() (sync, used in non-React contexts) works
let _customLessonsCache=[];

// One-time migration from localStorage → Firestore
async function migrateCustomLessonsIfNeeded(){
  try{
    const raw=localStorage.getItem(CUSTOM_LESSONS_KEY);
    if(!raw) return;
    const old=JSON.parse(raw);
    if(!Array.isArray(old)||old.length===0) return;
    const col=CUSTOM_LESSONS_PATH();
    for(const l of old){
      const id=l.id||('custom_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
      await col.doc(id).set({
        id,
        title:l.label||l.title||'Untitled',
        overview:l.overview||'',
        keywords:l.keywords||[],
        createdBy:'sanket',
        createdAt:l.createdAt||Date.now(),
        schoolId:CUSTOM_LESSONS_SCHOOL,
      },{merge:true});
    }
    localStorage.removeItem(CUSTOM_LESSONS_KEY);
    console.log('[CustomLessons] Migrated',old.length,'lessons from localStorage to Firestore');
  }catch(e){console.warn('[CustomLessons] Migration failed',e);}
}

// Sync getter — uses in-memory cache (populated by useCustomLessons listener)
function getCustomLessons(){return _customLessonsCache;}

// React hook — listens to Firestore, keeps cache in sync
function useCustomLessons(){
  const [lessons,setLessons]=React.useState(_customLessonsCache);
  React.useEffect(()=>{
    migrateCustomLessonsIfNeeded();
    const unsub=CUSTOM_LESSONS_PATH().onSnapshot(snap=>{
      const data=snap.docs.map(d=>({...d.data(),id:d.id}));
      // Sort client-side by createdAt
      data.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
      _customLessonsCache=data;
      setLessons(data);
    },e=>console.warn('[CustomLessons] listener error',e));
    return unsub;
  },[]);
  return lessons;
}

async function addCustomLesson({title,overview='',keywords=[]}){
  const trimmed=(title||'').trim();
  if(!trimmed) return null;
  const id='custom_'+Date.now();
  const doc={id,title:trimmed,overview:overview.trim(),keywords:Array.isArray(keywords)?keywords:[],
    createdBy:'sanket',createdAt:Date.now(),schoolId:CUSTOM_LESSONS_SCHOOL};
  await CUSTOM_LESSONS_PATH().doc(id).set(doc);
  return doc;
}

async function updateCustomLesson(id,{title,overview,keywords}){
  const updates={};
  if(title!==undefined) updates.title=title.trim();
  if(overview!==undefined) updates.overview=overview.trim();
  if(keywords!==undefined) updates.keywords=keywords;
  await CUSTOM_LESSONS_PATH().doc(id).update(updates);
}

async function deleteCustomLesson(id){
  await CUSTOM_LESSONS_PATH().doc(id).delete();
}

// ── Firestore hook — replaces useLocalStorage for section data only ──
// Reads/writes Firestore doc at sections/shared-[sectionId].
// Accessible to all users (authenticated or sub PIN). Falls back to localStorage.
// On first load, migrates data from old userId-sectionId doc if needed.
// ── Upload a photo file to Firebase Storage, return download URL ──────────────
// sectionId : e.g. '4gir'
// studentIdx : integer index in the students array
// file       : File object from <input type="file">
// ── Upload a photo to Firebase Storage, return download URL ──────────────────
// Compresses to max 800px, uploads to Storage, returns a permanent https URL.
// sectionId and studentIdx are used to name the file in Storage.
async function uploadPhotoToStorage(file, sectionId, studentIdx) {
  const isPng = file.type === 'image/png';
  // Compress on canvas first
  const blob = await new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      const MAX = 1600;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      const mime = isPng ? 'image/png' : 'image/jpeg';
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('Canvas toBlob failed')), mime, isPng ? 1 : 0.92);
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); reject(new Error('Could not read image file.')); };
    img.src = objectUrl;
  });
  const ext = isPng ? 'png' : 'jpg';
  const ref = window._storage.ref(`photos/${sectionId}/${studentIdx}.${ext}`);
  await ref.put(blob, { contentType: isPng ? 'image/png' : 'image/jpeg' });
  return await ref.getDownloadURL();
}

// Legacy base64 compress — kept for backward compat with old data paths
function compressPhoto(file) {
  return new Promise((resolve, reject) => {
    const isPng = file.type === 'image/png';
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      const MAX = 1600;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      resolve(isPng ? canvas.toDataURL('image/png') : canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); reject(new Error('Could not read image file.')); };
    img.src = objectUrl;
  });
}

// ── Migrate any base64 photos still in a Firestore section doc ────────────────
// Runs once per load when old data is detected; updates Firestore in place.
function dataURLtoBlob(dataUrl) {
  const [header, base64] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const binary = atob(base64);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function migrateBase64Photos(sectionId, data, sharedRef) {
  const storage = window._storage;
  if (!data.students) return data;
  let changed = false;
  const updatedStudents = await Promise.all(data.students.map(async (st, idx) => {
    if (st.photo && st.photo.startsWith('data:')) {
      try {
        const blob = dataURLtoBlob(st.photo);
        const ref = storage.ref(`photos/${sectionId}/${idx}-migrated`);
        await ref.put(blob);
        const url = await ref.getDownloadURL();
        changed = true;
        return { ...st, photo: url };
      } catch (e) {
        console.warn('Photo migration failed for student', idx, e);
        return st;
      }
    }
    return st;
  }));
  if (changed) {
    const migrated = { ...data, students: updatedStudents };
    await sharedRef.set(migrated);
    return migrated;
  }
  return data;
}

function useFirestore(sectionId, userId, init) {
  const sharedDocId = 'shared-' + sectionId;
  const lsKey = 'g4-section-' + sectionId;
  const [val, setVal] = React.useState(init);
  const [loading, setLoading] = React.useState(true);
  // Cache resolved photo URLs per student index so onSnapshot re-fires don't re-fetch
  const photoCache = React.useRef({});

  React.useEffect(() => {
    if (!sectionId) return;
    photoCache.current = {}; // clear cache when section changes
    const db = window._db;
    const sharedRef = db.collection('sections').doc(sharedDocId);
    let cancelled = false;
    let migratingOld = false;

    async function resolvePhotos(fsData) {
      const students = fsData.students || [];
      // For each student: if photo is already an https URL, use it as-is.
      // If it's __photo_ref__ or missing, fetch from the legacy -photo-{i} doc.
      const photoPromises = students.map((st, i) => {
        // Storage URL — cache and use directly
        if (st.photo && st.photo.startsWith('http')) {
          photoCache.current[i] = st.photo;
          return Promise.resolve(st.photo);
        }
        // Already resolved this student's photo — use cache, no re-fetch
        if (photoCache.current[i]) return Promise.resolve(photoCache.current[i]);
        if (st.photo === '__photo_ref__' || !st.photo) {
          return db.collection('sections').doc(sharedDocId + '-photo-' + i).get()
            .then(s => {
              if (!s.exists) return null;
              const p = s.data().photo;
              if (p && p.startsWith('data:')) {
                const blob = dataURLtoBlob(p);
                const ext = p.startsWith('data:image/png') ? 'png' : 'jpg';
                const ref = window._storage.ref(`photos/${sectionId}/${i}.${ext}`);
                return ref.put(blob, { contentType: ext === 'png' ? 'image/png' : 'image/jpeg' })
                  .then(() => ref.getDownloadURL())
                  .then(url => {
                    photoCache.current[i] = url;
                    sharedRef.get().then(snap => {
                      if (!snap.exists) return;
                      const d = snap.data();
                      if (d.students && d.students[i]) {
                        d.students[i].photo = url;
                        sharedRef.set(d).catch(() => {});
                      }
                    }).catch(() => {});
                    return url;
                  })
                  .catch(() => { photoCache.current[i] = p; return p; });
              }
              photoCache.current[i] = p || null;
              return p || null;
            })
            .catch(() => null);
        }
        return Promise.resolve(null);
      });
      const photos = await Promise.all(photoPromises);
      return {
        ...fsData,
        students: students.map((st, i) => ({ ...st, photo: photos[i] || null }))
      };
    }

    const unsubscribe = sharedRef.onSnapshot(async snap => {
      if (cancelled) return;
      if (snap.exists && snap.data() && snap.data().students) {
        let fsData = snap.data();
        try { fsData = await resolvePhotos(fsData); } catch(e) { console.warn('Could not resolve photos:', e); }
        if (cancelled) return;
        setVal(fsData);
        try { localStorage.setItem(lsKey, JSON.stringify(fsData)); } catch {}
        setLoading(false);
      } else if (!migratingOld) {
        // Shared doc empty — try migrating from old userId-sectionId doc
        migratingOld = true;
        const tryMigrate = async () => {
          let migrated = false;
          if (userId) {
            try {
              const oldRef = db.collection('sections').doc(userId + '-' + sectionId);
              const oldSnap = await oldRef.get();
              if (oldSnap.exists && oldSnap.data() && oldSnap.data().students) {
                const oldData = oldSnap.data();
                await sharedRef.set(oldData);
                oldRef.delete().catch(() => {});
                migrated = true;
              }
            } catch {}
          }
          if (!migrated && !cancelled) {
            try {
              const lsRaw = localStorage.getItem(lsKey);
              if (lsRaw) {
                const lsData = JSON.parse(lsRaw);
                sharedRef.set(lsData).catch(() => {});
                if (!cancelled) { setVal(lsData); setLoading(false); }
              } else {
                if (!cancelled) { setVal(init); setLoading(false); }
              }
            } catch { if (!cancelled) { setVal(init); setLoading(false); } }
          }
        };
        tryMigrate();
      }
    }, () => {
      if (cancelled) return;
      try {
        const lsRaw = localStorage.getItem(lsKey);
        setVal(lsRaw ? JSON.parse(lsRaw) : init);
      } catch { setVal(init); }
      setLoading(false);
    });

    return () => {
      cancelled = true;
      unsubscribe();
      // Flush any pending debounced save before unmounting so in-flight
      // changes aren't lost when switching sections
      if (saveTimerRef.current) {
        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = null;
        const toSave = latestValRef.current;
        if (toSave) {
          const db2 = window._db;
          const mainRef2 = db2.collection('sections').doc(sharedDocId);
          const changedNow2 = new Set(changedPhotosRef.current);
          changedPhotosRef.current.clear();
          const payload = {
            ...toSave,
            students: (toSave.students || []).map((st, i) => {
              if (st.photo && st.photo.startsWith('http')) return { ...st };
              if (changedNow2.has(i) && st.photo) {
                db2.collection('sections').doc(sharedDocId + '-photo-' + i)
                  .set({ photo: st.photo }).catch(() => {});
              }
              return { ...st, photo: '__photo_ref__' };
            })
          };
          mainRef2.set(payload).catch(() => {});
        }
      }
    };
  }, [sectionId, userId]);

  const saveTimerRef = React.useRef(null);
  const latestValRef = React.useRef(null);

  const changedPhotosRef = React.useRef(new Set());

  const set = React.useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      // Track which student indices have a new/changed photo
      (next.students || []).forEach((st, i) => {
        const prevPhoto = prev && prev.students && prev.students[i] ? prev.students[i].photo : undefined;
        if (st.photo !== prevPhoto) changedPhotosRef.current.add(i);
      });
      // Always save to localStorage immediately
      try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch {}
      // Keep a ref to the latest value so the debounced save always writes current state
      latestValRef.current = next;
      // Debounce Firestore writes — wait 1.5s after last change before writing
      if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
      saveTimerRef.current = setTimeout(() => {
        const toSave = latestValRef.current;
        if (!toSave) return;
        const db = window._db;
        const mainRef = db.collection('sections').doc(sharedDocId);
        // Only write photo docs for students whose photo actually changed this debounce window
        const changedNow = new Set(changedPhotosRef.current);
        changedPhotosRef.current.clear();
        const nextWithoutPhotos = {
          ...toSave,
          students: (toSave.students || []).map((st, i) => {
            // Storage URL — save directly in main doc, no photo sub-doc needed
            if (st.photo && st.photo.startsWith('http')) {
              return { ...st };
            }
            // Base64 photo that changed — write to legacy photo sub-doc
            if (changedNow.has(i) && st.photo) {
              db.collection('sections').doc(sharedDocId + '-photo-' + i)
                .set({ photo: st.photo })
                .catch(e => console.error('Photo save failed for student', i, e));
            }
            return { ...st, photo: '__photo_ref__' };
          })
        };
        mainRef.set(nextWithoutPhotos).catch(e => console.error('Firestore save failed:', e));
      }, 1500);
      return next;
    });
  }, [sectionId]);

  return [val, set, loading];
}

function useNoteLog(key){
  const [entries,setEntries]=useLocalStorage(key,[]);
  const add=React.useCallback((text)=>{
    if(!text.trim()) return;
    setEntries(prev=>[{text,time:new Date().toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'})},...prev]);
  },[setEntries]);
  const del=React.useCallback((i)=>{setEntries(prev=>prev.filter((_,idx)=>idx!==i));},[setEntries]);
  return[entries,add,del];
}

// Global keyword popup context — ensures only one popup open at a time
const KWContext=React.createContext({activeKw:null,setActiveKw:()=>{},teacherMode:true,setTeacherMode:()=>{}});


function KWPopup({word,color,stu,tch,anchorRect,onClose}){
  const col=KW_COLORS[color]||KW_COLORS.sky;
  const popupRef=React.useRef(null);
  const popW=256;
  const left=Math.max(8,Math.min(anchorRect.left+anchorRect.width/2-popW/2, window.innerWidth-popW-8));
  const spaceAbove=anchorRect.top-16;
  const top=spaceAbove>180?anchorRect.top-8:anchorRect.bottom+8;
  const above=spaceAbove>180;

  // Close on outside click — but not when clicking another pill/tag (let that pill handle it)
  React.useEffect(()=>{
    const handle=(e)=>{
      if(popupRef.current&&popupRef.current.contains(e.target)) return;
      // Walk up from target — if it's a pill or tag, don't close here; the pill's handler will fire next
      let node=e.target;
      while(node&&node!==document.body){
        if(node.classList&&(node.classList.contains('kw-pill')||node.classList.contains('kw-popup-wrap')||node.classList.contains('sc-tag'))) return;
        node=node.parentNode;
      }
      onClose();
    };
    const t=setTimeout(()=>document.addEventListener('mousedown',handle),50);
    return()=>{clearTimeout(t);document.removeEventListener('mousedown',handle);};
  },[onClose]);

  return(
    <div ref={popupRef} className="kw-popup"
      style={{position:'fixed',left,top,transform:above?'translateY(-100%)':'none',width:popW,zIndex:500}}
      onMouseDown={e=>e.stopPropagation()}>
      <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10}}>
        <div style={{flex:1}}>
          <div className="kw-popup-word" style={{color:col.text,fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:700,marginBottom:2}}>{word}</div>
          <div style={{height:2,width:32,background:col.text,borderRadius:1,opacity:0.4}}></div>
        </div>
        <div className="kw-icon-wrap" style={{background:col.bg,borderColor:col.border}}>
          <KWIcon word={word} color={color} size={28}/>
        </div>
        <button className="kw-popup-x" onMouseDown={e=>{e.stopPropagation();onClose();}}>✕</button>
      </div>
      {stu&&<><div className="kw-popup-label">For Students</div><div className="kw-popup-text">{stu}</div></>}
      {tch&&<><div className="kw-popup-label" style={{marginTop:8}}>Teacher Note</div><div className="kw-popup-text">{tch}</div></>}
    </div>
  );
}

function KWPill({w,c,s,t,size='normal'}){
  const {activeKw,setActiveKw}=React.useContext(KWContext);
  const pillRef=React.useRef(null);
  const uid=React.useRef(Math.random().toString(36).slice(2));
  const col=KW_COLORS[c]||KW_COLORS.sky;
  const isOpen=activeKw&&activeKw.id===uid.current;

  const handleMouseDown=React.useCallback((e)=>{
    e.stopPropagation();
    e.preventDefault();
    // Always set directly — document listener handles closing when clicking outside
    // If same pill clicked while open, close it; if different pill, switch directly
    if(isOpen){
      setActiveKw(null);
    } else {
      setActiveKw({id:uid.current,word:w,color:c,stu:s,tch:t,rect:pillRef.current.getBoundingClientRect()});
    }
  },[isOpen,w,c,s,t,setActiveKw]);

  return(
    <span className="kw-popup-wrap">
      <span ref={pillRef} className="kw-pill"
        onMouseDown={handleMouseDown}
        onClick={e=>{e.stopPropagation();e.preventDefault();}}
        style={{background:col.bg,borderColor:col.border,color:col.text,
          fontSize:size==='small'?'11px':'12px',
          padding:size==='small'?'3px 9px':'5px 10px',
          gap:size==='small'?0:'5px',

          outline:isOpen?`2px solid ${col.text}`:'none',

        {size==='normal'&&<KWIcon word={w} color={c} size={16}/>}
        {w}
      </span>
    </span>
  );
}

function Lightbox({items,startIndex,onClose}){
  const [idx,setIdx]=React.useState(startIndex||0);
  const item=items[idx];
  const prev=()=>setIdx(i=>Math.max(0,i-1));
  const next=()=>setIdx(i=>Math.min(items.length-1,i+1));

  React.useEffect(()=>{
    const handle=(e)=>{
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft') prev();
      if(e.key==='ArrowRight') next();
    };
    window.addEventListener('keydown',handle);
    return()=>window.removeEventListener('keydown',handle);
  },[onClose,idx]);

  return(
    <div className="lb-overlay" onClick={onClose}>
      <div className="lb-inner" onClick={e=>e.stopPropagation()}>
        <button className="lb-close" onClick={onClose} style={{display:"flex",alignItems:"center",justifyContent:"center"}}>{IC.close}</button>
        {item.type==='image'&&<img className="lb-img" src={item.src} alt={item.caption}/>}
        {item.type==='video'&&<iframe className="lb-video" src={item.src+'?autoplay=1'} allow="autoplay;encrypted-media" allowFullScreen title={item.caption}/>}
        {item.caption&&<div className="lb-caption">{item.caption}</div>}
        {items.length>1&&(
          <div className="lb-nav">
            <button className="lb-nav-btn" onClick={prev} disabled={idx===0}>←</button>
            <span className="lb-counter">{idx+1} / {items.length}</span>
            <button className="lb-nav-btn" onClick={next} disabled={idx===items.length-1}>→</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Compress a ref image to max 1200px, returns a Blob ──
function compressRefImage(file){
  return new Promise((resolve,reject)=>{
    const isPng=file.type==='image/png';
    const img=new Image();
    const objectUrl=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(objectUrl);
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.clearRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      const mime=isPng?'image/png':'image/jpeg';
      canvas.toBlob(b=>b?resolve(b):reject(new Error('toBlob failed')),mime,isPng?1:0.88);
    };
    img.onerror=()=>{URL.revokeObjectURL(objectUrl);reject(new Error('Could not read image'));};
    img.src=objectUrl;
  });
}

// ── Firestore hook for refs panel data (artist uploads + manual cards) ──
// Stores {artistUploads:{}, manualCards:[]} in refs/{sessionKey} Firestore doc.
// All image sources are https:// Firebase Storage URLs — never base64.
function useRefsFirestore(sessionKey){
  const INIT={artistUploads:{},manualCards:[]};
  const [val,setVal]=React.useState(INIT);
  const saveTimerRef=React.useRef(null);
  const latestRef=React.useRef(null);
  const writePendingRef=React.useRef(false);

  React.useEffect(()=>{
    if(!sessionKey)return;
    const db=window._db;
    const docRef=db.collection('refs').doc(sessionKey);
    const unsub=docRef.onSnapshot(snap=>{
      if(writePendingRef.current) return; // local write in flight — ignore remote snapshot
      if(snap.exists){
        setVal(snap.data()||INIT);
      } else {
        setVal(INIT);
      }
    },()=>{setVal(INIT);});
    return()=>unsub();
  },[sessionKey]);

  const set=React.useCallback(updater=>{
    setVal(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      latestRef.current=next;
      writePendingRef.current=true;
      if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
      saveTimerRef.current=setTimeout(()=>{
        const toSave=latestRef.current;
        if(!toSave){writePendingRef.current=false;return;}
        window._db.collection('refs').doc(sessionKey).set(toSave)
          .then(()=>{writePendingRef.current=false;})
          .catch(e=>{console.warn('refs save failed',e);writePendingRef.current=false;});
      },800);
      return next;
    });
  },[sessionKey]);

  return[val,set];
}

// ── Upload a ref image to Firebase Storage, return https URL ──
// Uses compressRefImage first so large phone photos are handled.
async function uploadRefImage(file,sessionKey,name){
  const blob=await compressRefImage(file);
  const ext=file.type==='image/png'?'png':'jpg';
  const ts=Date.now();
  const ref=window._storage.ref('refs/'+sessionKey+'/'+name+'_'+ts+'.'+ext);
  await ref.put(blob,{contentType:file.type==='image/png'?'image/png':'image/jpeg'});
  return await ref.getDownloadURL();
}

              <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/>
              <path d="M3.51 15a9 9 0 0 0 14.85 3.36L23 14"/>
            </svg>
            Replace image
            <input type="file" accept="image/*" style={{display:'none'}}
              onChange={e=>{e.stopPropagation();onReplaceImg(card,e);onCancelEdit();}}/>
          </label>
          <div style={{display:'flex',gap:7,marginTop:2}}>
            <button onClick={e=>{e.stopPropagation();onSaveEdit(card,editLinkUrl);}}
              style={{flex:1,fontSize:11,fontWeight:700,padding:'6px 0',borderRadius:7,
                border:'none',background:'var(--teal)',color:'#fff',cursor:'pointer'}}>Save</button>
            <button onClick={e=>{e.stopPropagation();onCancelEdit();}}
              style={{fontSize:11,padding:'6px 12px',borderRadius:7,
                border:'1px solid rgba(255,255,255,0.15)',background:'transparent',
                color:'rgba(255,255,255,0.5)',cursor:'pointer'}}>Cancel</button>
            <button onClick={e=>{e.stopPropagation();onCancelEdit();onDelete(card);}}
              style={{fontSize:11,padding:'6px 10px',borderRadius:7,border:'none',
                background:'rgba(232,112,90,0.18)',color:'var(--coral)',cursor:'pointer',fontWeight:700}}>Delete</button>
          </div>
        </div>
      )}

      {/* Curriculum: upload prompt if no image — centred */}
      {card.isCurriculum&&!card.src&&teacherMode&&!isEditing&&(
        <label style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
          background:'rgba(0,0,0,0.65)',borderRadius:8,padding:'8px 18px',
          fontSize:10,color:'rgba(255,255,255,0.85)',fontWeight:700,cursor:'pointer',
          whiteSpace:'nowrap',zIndex:2,textAlign:'center'}}
          onClick={e=>e.stopPropagation()}>
          + Add image
          <input type="file" accept="image/*"
            onChange={e=>onArtUpload(card.curriculumIdx,e)} style={{display:'none'}}/>
        </label>
      )}

      {/* Pencil icon — appears on hover in teacher mode, not while editing */}
      {teacherMode&&!isEditing&&(
        <div
          onClick={e=>{
            e.stopPropagation();
            if(!isActive) onSetActive(i); // activate card first
            onEdit(card.isCurriculum?('curriculum:'+card.curriculumIdx):card.manualIdx,card);
          }}
          style={{position:'absolute',top:8,right:8,width:30,height:30,borderRadius:8,
            background:'rgba(0,0,0,0.55)',border:'1px solid rgba(255,255,255,0.18)',
            display:'flex',alignItems:'center',justifyContent:'center',
            cursor:'pointer',zIndex:10,
            opacity:hovered?1:0,
            transition:'opacity .2s',pointerEvents:hovered?'auto':'none'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.9)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
      )}

      {/* Video play */}
      {card.isVideo&&isActive&&(
        <div style={{position:'absolute',top:'50%',left:'50%',
          transform:'translate(-50%,-65%)',width:48,height:48,borderRadius:'50%',
          background:'rgba(255,50,30,0.9)',display:'flex',alignItems:'center',
          justifyContent:'center',fontSize:18,color:'#fff',paddingLeft:3,
          pointerEvents:'none'}}>▶</div>
      )}
    </div>
  );
}

function RefsPanel({refs,sessionKey}){
  const CARD=350;

  // ── Lightbox ──
  const [lbIdx,setLbIdx]=React.useState(null);
  const [metaVisible,setMetaVisible]=React.useState(true);
  const zoomRef=React.useRef(1);
  const [sliderVal,setSliderVal]=React.useState(100);
  const [sliderActive,setSliderActive]=React.useState(false);
  const panXRef=React.useRef(0);
  const panYRef=React.useRef(0);
  const lbImgRef=React.useRef(null);
  const lbRafRef=React.useRef(null);
  const [dragging,setDragging]=React.useState(false);
  const dragStart=React.useRef(null);

  function applyLbTransform(){
    if(!lbImgRef.current) return;
    lbImgRef.current.style.transform='scale('+zoomRef.current+') translate('+panXRef.current/zoomRef.current+'px,'+panYRef.current/zoomRef.current+'px)';
  }
  function setLbZoom(v){
    const clamped=Math.min(4,Math.max(1,v));
    if(clamped===1){panXRef.current=0;panYRef.current=0;}
    zoomRef.current=clamped;
    setSliderVal(Math.round(clamped*100));
    if(lbRafRef.current) cancelAnimationFrame(lbRafRef.current);
    lbRafRef.current=requestAnimationFrame(applyLbTransform);
  }
  function resetLbZoom(){zoomRef.current=1;panXRef.current=0;panYRef.current=0;setSliderVal(100);if(lbRafRef.current)cancelAnimationFrame(lbRafRef.current);lbRafRef.current=requestAnimationFrame(applyLbTransform);}

  // ── Carousel state ──
  const [activeIdx,setActiveIdx]=React.useState(0);
  const carouselRef=React.useRef(null);
  const scrollAccum=React.useRef(0);

  // ── Storage — Firestore-backed so images survive refresh & sync across browsers ──
  const [refsData,setRefsData]=useRefsFirestore(sessionKey);
  const artistUploads=refsData.artistUploads||{};
  const manualCards=refsData.manualCards||[];
  const curriculumOverrides=refsData.curriculumOverrides||{};
  const setArtistUploads=React.useCallback(updater=>{
    setRefsData(prev=>{
      const next=typeof updater==='function'?updater(prev.artistUploads||{}):updater;
      return{...prev,artistUploads:next};
    });
  },[setRefsData]);
  const setManualCards=React.useCallback(updater=>{
    setRefsData(prev=>{
      const next=typeof updater==='function'?updater(prev.manualCards||[]):updater;
      return{...prev,manualCards:next};
    });
  },[setRefsData]);
  const [uploads]=useLocalStorage('uploads-'+sessionKey,[]);

  // Live refs for fanCards
  const fanCardsRef=React.useRef(fanCards);
  React.useEffect(()=>{fanCardsRef.current=fanCards;},[fanCards]);

  // Attach wheel listener with passive:false so preventDefault works
  const carouselCallbackRef=React.useCallback(node=>{
    if(!node) return;
    carouselRef.current=node;
    node.addEventListener('wheel', handleCarouselWheel, {passive:false});
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);



  // ── Add card state ──
  const [addingCard,setAddingCard]=React.useState(false);
  // ── Add link / YouTube card ──
  const [addType,setAddType]=React.useState(null); // null | 'image' | 'link' | 'video'
  const [linkUrl,setLinkUrl]=React.useState('');
  const [linkTitle,setLinkTitle]=React.useState('');
  const [linkSubtitle,setLinkSubtitle]=React.useState('');
  const [videoUrl,setVideoUrl]=React.useState('');
  const [videoTitle,setVideoTitle]=React.useState('');

  const [linkFetching,setLinkFetching]=React.useState(false);
  async function submitLinkCard(){
    if(!linkUrl.trim()) return;
    // Add card immediately — show domain name, no waiting
    const cardUrl=linkUrl.trim();
    const cardTitle_=linkTitle.trim()||cardUrl;
    const cardSubtitle_=linkSubtitle.trim();
    setManualCards(prev=>[...prev,{src:null,title:cardTitle_,subtitle:cardSubtitle_,why:'',isLink:true,linkUrl:cardUrl}]);
    const insertedAt=manualCards.length; // will be this index after the set above resolves
    setLinkUrl('');setLinkTitle('');setLinkSubtitle('');setAddType(null);
    // Background fetch for OG image — update card if found
    setLinkFetching(true);
    let ogImg=null;
    try{
      const res=await fetch(`https://jsonlink.io/api/extract?url=${encodeURIComponent(cardUrl)}`);
      if(res.ok){const data=await res.json();ogImg=data.images?.[0]||data.image||null;}
    }catch(e){}
    if(!ogImg){
      try{
        const res=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(cardUrl)}`);
        if(res.ok){
          const data=await res.json();
          const html=data.contents||'';
          const m=html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
            ||html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
          if(m) ogImg=m[1];
        }
      }catch(e){}
    }
    setLinkFetching(false);
    if(ogImg){
      // Patch the card we just added with the found image
      setManualCards(prev=>prev.map((c,i)=>
        i===insertedAt&&c.isLink&&c.linkUrl===cardUrl&&!c.src?{...c,src:ogImg}:c
      ));
    }
  }
  function submitVideoCard(){
    const vid=ytId(videoUrl.trim());
    if(!vid) return alert('Please enter a valid YouTube URL');
    const thumb=`https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
    setManualCards(prev=>[...prev,{src:thumb,title:videoTitle.trim()||'Video',subtitle:'',why:'',isVideo:true,videoUrl:videoUrl.trim()}]);
    setVideoUrl('');setVideoTitle('');setAddType(null);
  }
  const [pendingFile,setPendingFile]=React.useState(null);
  const [cardTitle,setCardTitle]=React.useState('');
  const [cardSubtitle,setCardSubtitle]=React.useState('');
  const [uploadingCard,setUploadingCard]=React.useState(false);

  // ── Edit state ──
  const [editingCard,setEditingCard]=React.useState(null);
  const [editTitle,setEditTitle]=React.useState('');
  const [editSubtitle,setEditSubtitle]=React.useState('');
  const [editWhy,setEditWhy]=React.useState('');
  const [editLinkUrl,setEditLinkUrl]=React.useState('');

  const {teacherMode}=React.useContext(KWContext);
  const slideRefs=(refs||[]).filter(r=>r.type==='slide');
  const nonSlideRefs=(refs||[]).filter(r=>r.type!=='slide');

  // ── Fan cards ──
  const fanCards=React.useMemo(()=>{
    const cards=[];
    nonSlideRefs.forEach((r,i)=>{
      const artImg=artistUploads[i]||null;
      const vid=r.videoUrl?ytId(r.videoUrl):null;
      const thumb=vid?`https://img.youtube.com/vi/${vid}/mqdefault.jpg`:null;
      const ov=curriculumOverrides[i]||{};
      cards.push({
        src:artImg?artImg.src:(thumb||null),
        title:ov.title!==undefined?ov.title:r.name,
        subtitle:ov.subtitle!==undefined?ov.subtitle:(r.work||''),
        why:ov.why!==undefined?ov.why:(r.why||''),
        badge:r.videoUrl?'video':r.type,
        isVideo:!!r.videoUrl&&!artImg,
        isCurriculum:true,curriculumIdx:i,manualIdx:null,
      });
    });
    manualCards.forEach((c,i)=>{
      const isVid=!!(c.isVideo&&c.videoUrl);
      const vidSrc=isVid?`https://www.youtube.com/embed/${ytId(c.videoUrl||'')}`:null;
      cards.push({
        src:c.src||null,title:c.title||'',subtitle:c.subtitle||'',why:c.why||'',
        badge:isVid?'video':c.isLink?'link':'added',
        isVideo:isVid,videoSrc:vidSrc,
        isLink:!!(c.isLink),linkUrl:c.linkUrl||'',
        isCurriculum:false,curriculumIdx:null,manualIdx:i,
      });
    });
    return cards;
  },[nonSlideRefs,artistUploads,manualCards,curriculumOverrides]);

  const n=fanCards.length;

  // Clamp activeIdx when cards change
  React.useEffect(()=>{
    setActiveIdx(i=>Math.min(i,Math.max(0,n-1)));
  },[n]);

  // ── Lightbox items (only cards with images) ──
  const lbItems=React.useMemo(()=>
    fanCards.filter(c=>c.src).map(c=>{
      const isVid=c.isVideo;
      const videoSrc=isVid
        ?(c.videoSrc||( c.curriculumIdx!=null
            ?`https://www.youtube.com/embed/${ytId(nonSlideRefs[c.curriculumIdx]?.videoUrl||'')}`
            :null))
        :null;
      return{
        type:isVid?'video':'image',
        src:isVid?videoSrc:c.src,
        thumb:c.src,
        title:c.title,subtitle:c.subtitle,why:c.why,badge:c.badge,
      };
    })
  ,[fanCards]);

  // Preload all lightbox images in the background as soon as they're available
  // so clicking a card opens instantly from browser cache
  React.useEffect(()=>{
    lbItems.forEach(item=>{
      if(item.type==='image'&&item.src){
        const img=new Image();
        img.src=item.src;
      }
    });
  },[lbItems]);

  // ── Keyboard nav ──
  React.useEffect(()=>{
    if(lbIdx===null) return;
    const fn=e=>{
      if(e.key==='Escape') closeLb();
      if(e.key==='ArrowLeft') setLbIdx(i=>Math.max(0,i-1));
      if(e.key==='ArrowRight') setLbIdx(i=>Math.min(lbItems.length-1,i+1));
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[lbIdx,lbItems.length]);

  // ── Carousel scroll handler — RAF-throttled ──
  const rafRef=React.useRef(null);
  function handleCarouselWheel(e){
    e.preventDefault();
    scrollAccum.current+=(e.deltaX||e.deltaY);
    const threshold=35;
    if(scrollAccum.current>threshold){
      if(!rafRef.current)rafRef.current=requestAnimationFrame(()=>{
        setActiveIdx(i=>Math.min(n-1,i+1));
        scrollAccum.current=0;rafRef.current=null;
      });
    } else if(scrollAccum.current<-threshold){
      if(!rafRef.current)rafRef.current=requestAnimationFrame(()=>{
        setActiveIdx(i=>Math.max(0,i-1));
        scrollAccum.current=0;rafRef.current=null;
      });
    }
  }

  // Touch swipe
  const touchStart=React.useRef(null);
  function handleTouchStart(e){touchStart.current=e.touches[0].clientX;}
  function handleTouchEnd(e){
    if(touchStart.current===null) return;
    const diff=touchStart.current-e.changedTouches[0].clientX;
    if(Math.abs(diff)>40){
      if(diff>0) setActiveIdx(i=>Math.min(n-1,i+1));
      else setActiveIdx(i=>Math.max(0,i-1));
    }
    touchStart.current=null;
  }

  function openLb(cardIdx){
    const card=fanCards[cardIdx];
    if(!card?.src) return;
    // lbItems stores embed src for videos but thumb src for lookup — match by thumb
    const lbI=lbItems.findIndex(it=>it.thumb===card.src);
    if(lbI>=0){setLbIdx(lbI);setMetaVisible(true);setZoom(1);setPanX(0);setPanY(0);}
  }
  function closeLb(){setLbIdx(null);setZoom(1);setPanX(0);setPanY(0);}

  // ── Artist upload ──
  const handleArtUpload=async(i,e)=>{
    const file=e.target.files[0];if(!file)return;
    e.target.value='';
    try{
      const url=await uploadRefImage(file,sessionKey,'art'+i);
      setArtistUploads(prev=>({...prev,[i]:{src:url,name:file.name}}));
    }catch(err){
      alert('Image upload failed. Please check your internet connection and try again.\n\n'+err.message);
    }
  };
  const removeArtImg=i=>setArtistUploads(prev=>{const n={...prev};delete n[i];return n;});

  // ── Replace image (curriculum or manual) ──
  const handleReplaceImg=async(card,e)=>{
    const file=e.target.files[0];if(!file)return;
    e.target.value='';
    try{
      const name=card.isCurriculum?('art'+card.curriculumIdx):('manual_r'+card.manualIdx);
      const url=await uploadRefImage(file,sessionKey,name);
      if(card.isCurriculum){
        setArtistUploads(prev=>({...prev,[card.curriculumIdx]:{src:url,name:file.name}}));
      } else {
        setManualCards(prev=>prev.map((c,i)=>i===card.manualIdx?{...c,src:url}:c));
      }
    }catch(err){
      alert('Image upload failed. Please check your internet connection and try again.\n\n'+err.message);
    }
  };

  // ── Manual card upload ──
  function onAddFileChange(e){
    const file=e.target.files[0];if(!file)return;
    e.target.value='';
    setPendingFile({file,localUrl:URL.createObjectURL(file)});
    setCardTitle('');setCardSubtitle('');
    setAddingCard(true);
  }

  async function submitCard(skip){
    if(!pendingFile||uploadingCard) return;
    setUploadingCard(true);
    try{
      const url=await uploadRefImage(pendingFile.file,sessionKey,'manual');
      setManualCards(prev=>[...prev,{src:url,title:skip?'':cardTitle.trim(),subtitle:skip?'':cardSubtitle.trim()}]);
    }catch(err){
      alert('Image upload failed. Please check your internet connection and try again.\n\n'+err.message);
    }
    setUploadingCard(false);setAddingCard(false);setAddType(null);
    setPendingFile(null);setCardTitle('');setCardSubtitle('');
  }

  function removeManualCard(i){setManualCards(prev=>prev.filter((_,idx)=>idx!==i));}
  function handleDelete(card){
    if(card.isCurriculum) removeArtImg(card.curriculumIdx);
    else removeManualCard(card.manualIdx);
  }

  function startEdit(key,card){
    setEditingCard(key);
    if(card.isCurriculum){
      const ov=curriculumOverrides[card.curriculumIdx]||{};
      setEditTitle(ov.title!==undefined?ov.title:(nonSlideRefs[card.curriculumIdx]?.name||card.title||''));
      setEditSubtitle(ov.subtitle!==undefined?ov.subtitle:(nonSlideRefs[card.curriculumIdx]?.work||card.subtitle||''));
      setEditWhy(ov.why!==undefined?ov.why:(nonSlideRefs[card.curriculumIdx]?.why||card.why||''));
      setEditLinkUrl('');
    } else {
      setEditTitle(manualCards[card.manualIdx]?.title||'');
      setEditSubtitle(manualCards[card.manualIdx]?.subtitle||'');
      setEditWhy(manualCards[card.manualIdx]?.why||'');
      setEditLinkUrl(manualCards[card.manualIdx]?.linkUrl||'');
    }
  }
  function saveEdit(card,newLinkUrl){
    if(card&&card.isCurriculum){
      setRefsData(prev=>{
        const overrides={...(prev.curriculumOverrides||{})};
        overrides[card.curriculumIdx]={title:editTitle,subtitle:editSubtitle,why:editWhy};
        return{...prev,curriculumOverrides:overrides};
      });
    } else {
      setManualCards(prev=>prev.map((c,i)=>i===editingCard
        ?{...c,title:editTitle,subtitle:editSubtitle,why:editWhy,
            ...(c.isLink&&newLinkUrl!==undefined?{linkUrl:newLinkUrl}:{})}
        :c));
    }
    setEditingCard(null);
  }

  const curItem=lbIdx!==null?lbItems[lbIdx]:null;
  const containerHeight=CARD+40;

  return(
    <div>
      {/* ── COVERFLOW CAROUSEL ── */}
      {fanCards.length>0&&(
        <div style={{marginBottom:20}}>
          <div className="pl" style={{marginBottom:16}}>Artists & References</div>
          {/* Carousel container */}
          <div ref={carouselCallbackRef}
            style={{position:'relative',height:containerHeight+'px',width:'100%',
              overflow:'hidden',userSelect:'none'}}
            onTouchStart={handleTouchStart}
            onTouchEnd={handleTouchEnd}>
            {fanCards.map((card,i)=>(
              <RefCard_
                key={i} card={card} i={i} activeIdx={activeIdx} n={n}
                onOpen={openLb}
                onSetActive={setActiveIdx}
                onEdit={startEdit}
                onDelete={handleDelete}
                onArtUpload={handleArtUpload}
                onReplaceImg={handleReplaceImg}
                teacherMode={teacherMode}
                editingCard={editingCard}
                editTitle={editTitle} setEditTitle={setEditTitle}
                editSubtitle={editSubtitle} setEditSubtitle={setEditSubtitle}
                editWhy={editWhy} setEditWhy={setEditWhy}
                editLinkUrl={editLinkUrl} setEditLinkUrl={setEditLinkUrl}
                onSaveEdit={saveEdit}
                onCancelEdit={()=>setEditingCard(null)}
              />
            ))}
            {/* Left arrow */}
            {activeIdx>0&&(
              <button onClick={()=>setActiveIdx(i=>i-1)}
                style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',
                  background:'rgba(0,0,0,0.5)',border:'1px solid rgba(255,255,255,0.15)',
                  borderRadius:10,color:'#fff',fontSize:24,padding:'5px 13px',
                  cursor:'pointer',zIndex:300,lineHeight:1}}>&#8249;</button>
            )}
            {/* Right arrow */}
            {activeIdx<n-1&&(
              <button onClick={()=>setActiveIdx(i=>i+1)}
                style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
                  background:'rgba(0,0,0,0.5)',border:'1px solid rgba(255,255,255,0.15)',
                  borderRadius:10,color:'#fff',fontSize:24,padding:'5px 13px',
                  cursor:'pointer',zIndex:300,lineHeight:1}}>&#8250;</button>
            )}
          </div>
          {/* Dot indicators */}
          {n>1&&(
            <div style={{display:'flex',gap:5,justifyContent:'center',marginTop:8}}>
              {fanCards.map((_,i)=>(
                <div key={i} onClick={()=>setActiveIdx(i)}
                  style={{width:i===activeIdx?16:6,height:6,borderRadius:3,cursor:'pointer',
                    background:i===activeIdx?'var(--teal)':'rgba(255,255,255,0.2)',
                    transition:'all .25s'}}/>
              ))}
            </div>
          )}
          <div style={{fontSize:10,color:'var(--tx3)',marginTop:6,textAlign:'center'}}>
            Scroll or use arrows · click to view
          </div>
        </div>
      )}

      {/* ── ADD CARD ── */}
      {teacherMode&&(
        <div style={{marginBottom:20}}>
          {/* Option picker */}
          {!addType&&!addingCard&&(
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <label style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11,
                fontWeight:700,color:'var(--tx2)',cursor:'pointer',padding:'7px 14px',
                borderRadius:8,border:'1px dashed var(--glass-border2)',background:'var(--glass-bg)'}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Image
                <input type="file" accept="image/*" onChange={e=>{setAddType('image');onAddFileChange(e);}} style={{display:'none'}}/>
              </label>
              <button onClick={()=>{setAddType('link');setLinkUrl('');setLinkTitle('');setLinkSubtitle('');}}
                style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11,
                  fontWeight:700,color:'var(--tx2)',cursor:'pointer',padding:'7px 14px',
                  borderRadius:8,border:'1px dashed var(--glass-border2)',background:'var(--glass-bg)'}}>
                🔗 Link
              </button>
              <button onClick={()=>{setAddType('video');setVideoUrl('');setVideoTitle('');}}
                style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11,
                  fontWeight:700,color:'var(--tx2)',cursor:'pointer',padding:'7px 14px',
                  borderRadius:8,border:'1px dashed var(--glass-border2)',background:'var(--glass-bg)'}}>
                ▶ YouTube
              </button>
            </div>
          )}

          {/* Image card form */}
          {addingCard&&addType==='image'&&pendingFile&&(

            panYRef.current=e.clientY-dragStart.current.y;

                <div style={{
                  position:'absolute',inset:0,
                  display:'flex',flexDirection:'column',
                  alignItems:'center',justifyContent:'center',
                  padding:'24px 32px',
                  pointerEvents:'none',
                  opacity:metaVisible?1:0,
                  transition:'opacity .3s ease'}}>
                  <div style={{maxWidth:520,textAlign:'center'}}>
                    {curItem.title&&<div style={{fontSize:22,fontWeight:700,color:'#fff',
                      fontFamily:"'DM Sans',sans-serif",letterSpacing:'-.01em',
                      marginBottom:6,textShadow:'0 2px 12px rgba(0,0,0,0.5)'}}>{curItem.title}</div>}
                    {curItem.subtitle&&<div style={{fontSize:15,color:'rgba(255,255,255,0.82)',
                      fontFamily:"'DM Sans',sans-serif",marginBottom:curItem.why?10:0,
                      textShadow:'0 1px 8px rgba(0,0,0,0.5)'}}>{curItem.subtitle}</div>}
                    {curItem.why&&<div style={{fontSize:13,color:'rgba(255,255,255,0.65)',
                      fontFamily:"'DM Sans',sans-serif",lineHeight:1.6,
                      textShadow:'0 1px 6px rgba(0,0,0,0.5)'}}>{curItem.why}</div>}
                    {curItem.badge&&<div style={{marginTop:12,display:'inline-block',fontSize:9,
                      fontWeight:700,padding:'3px 10px',borderRadius:5,
                      background:'rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.7)',
                      border:'1px solid rgba(255,255,255,0.2)',
                      letterSpacing:'.08em',textTransform:'uppercase',fontFamily:"'DM Sans',sans-serif"}}>{curItem.badge}</div>}
                  </div>
                </div>
              )}
            </div>
          )}

          {curItem.type==='video'&&(
            <div style={{width:'min(820px,90vw)',aspectRatio:'16/9'}} onClick={e=>e.stopPropagation()}>
              <iframe src={curItem.src+'?autoplay=1'} allow="autoplay;encrypted-media"
                allowFullScreen title={curItem.title}

          )}

          {/* Close */}
          <button onClick={e=>{e.stopPropagation();closeLb();}}
            style={{position:'absolute',top:14,right:14,background:'rgba(255,255,255,0.1)',
              border:'1px solid rgba(255,255,255,0.2)',borderRadius:8,color:'#fff',
              fontSize:13,padding:'0 14px',height:32,cursor:'pointer',
              fontFamily:"'DM Sans',sans-serif",fontWeight:700}}>✕</button>

          {/* Arrows */}
          {lbIdx>0&&<button onClick={e=>{e.stopPropagation();setLbIdx(i=>i-1);
            resetLbZoom();setMetaVisible(true);}}
            style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',

          {lbIdx<lbItems.length-1&&<button onClick={e=>{e.stopPropagation();setLbIdx(i=>i+1);

            style={{position:'absolute',right:70,top:'50%',transform:'translateY(-50%)',
              background:'rgba(0,0,0,0.5)',border:'1px solid rgba(255,255,255,0.15)',
              borderRadius:10,color:'#fff',fontSize:26,padding:'6px 14px',cursor:'pointer'}}>&#8250;</button>}

          {/* Counter */}
          {lbItems.length>1&&<div style={{position:'absolute',top:14,left:'50%',
            transform:'translateX(-50%)',background:'rgba(0,0,0,0.5)',
            color:'rgba(255,255,255,0.6)',fontSize:11,padding:'4px 14px',
            borderRadius:12,pointerEvents:'none'}}>
            {lbIdx+1} / {lbItems.length}
          </div>}

          {/* Zoom slider — same as Gallery lightbox */}
          {curItem.type==='image'&&(
            <ZoomSlider value={sliderVal} active={sliderActive}
              onChange={v=>{setLbZoom(v/100);}}
              onActiveChange={setSliderActive}/>
          )}
          {sliderVal>100&&<div style={{position:'fixed',bottom:56,left:'50%',
            transform:'translateX(-50%)',background:'rgba(0,0,0,0.55)',
            color:'rgba(255,255,255,0.5)',fontSize:10,padding:'3px 12px',
            borderRadius:10,pointerEvents:'none',zIndex:5011}}>{Math.round(sliderVal)}% · drag to pan</div>}
        </div>,
        document.body
      )}
    </div>
  );
}

/* ── STEP LIGHTBOX COMPONENT ── */
function StepLightbox({steps,startIndex,pm,tickedSteps,onTick,onClose}){
  const [idx,setIdx]=React.useState(startIndex||0);
  const step=steps[idx];
  const isTicked=!!tickedSteps[idx];
  const prev=()=>setIdx(i=>Math.max(0,i-1));
  const next=()=>setIdx(i=>Math.min(steps.length-1,i+1));

  React.useEffect(()=>{
    const handle=(e)=>{
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft') prev();
      if(e.key==='ArrowRight') next();
    };
    window.addEventListener('keydown',handle);
    return()=>window.removeEventListener('keydown',handle);
  },[onClose]);

  if(!step) return null;
  return(
    <div className="slb-overlay" onClick={onClose}>
      <div className="slb-card" onClick={e=>e.stopPropagation()}>
        <div className="slb-meta">
          <div className="slb-num" style={{background:pm.s,color:pm.l}}>{idx+1}</div>
          <span className="slb-of">Step {idx+1} of {steps.length}</span>
        </div>
        {step.t&&<div className="slb-title">{step.t}</div>}
        <div className="slb-text">{step.s}</div>
        <div className="slb-tick-row">
          <button className={`slb-tick-btn ${isTicked?'ticked':'unticked'}`} onClick={()=>onTick(idx)}
            style={{
              width:36,height:36,borderRadius:'50%',padding:0,
              display:'flex',alignItems:'center',justifyContent:'center',
              border:`2px solid ${isTicked?'var(--teal)':'var(--glass-border2)'}`,
              background:isTicked?'transparent':'var(--glass-bg)',
              position:'relative',flexShrink:0,
            }}>
            {isTicked&&<div style={{width:14,height:14,borderRadius:'50%',background:'var(--teal)',boxShadow:'0 0 8px rgba(59,191,160,0.6)'}}/>}
          </button>
          <span style={{fontSize:'12px',fontWeight:700,color:isTicked?'var(--teal)':'var(--tx3)'}}>
            {isTicked?'Done':'Mark done'}
          </span>
        </div>
        <div className="slb-nav-row">
          <button className="slb-nav-btn" onClick={prev} disabled={idx===0}>← Previous</button>
          <span style={{fontSize:11,color:'var(--tx3)',fontWeight:600}}>{idx+1} / {steps.length}</span>
          <button className="slb-nav-btn" onClick={next} disabled={idx===steps.length-1}>Next →</button>
        </div>
      </div>
      <button className="slb-close" onClick={onClose} style={{display:"flex",alignItems:"center",justifyContent:"center"}}>{IC.close}</button>
    </div>
  );
}

  const [tickedSteps,setTickedSteps]=useLocalStorage(stepKey,{});

  const toggleStepTick=React.useCallback((i)=>{
    setTickedSteps(prev=>({...prev,[i]:!prev[i]}));

                  <div className="pl">Key Words — click any word to see its meaning</div>
                  <div className="kw-mini-wrap">
                    {s.kws.map((k,i)=>{
                      const kobj=KWS.find(kw=>kw.w===k);
                      return kobj?<KWPill key={i} {...kobj} size="small"/>:<span key={i} style={{padding:'3px 9px',borderRadius:'6px',background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',fontSize:'11px',fontWeight:700,color:'var(--tx2)'}}>{k}</span>;

                </div>
              </div>
              {s.tn&&!classView&&(
                <div className="tn" style={{background:pm.s,borderLeftColor:pm.l}}>
                  <div className="tn-lbl" style={{color:pm.l}}>📋 Teacher Note</div>
                  <div className="tn-tx">{s.tn}</div>
                </div>
              )}
              {s.bridge&&!classView&&(
                <div className="tn" style={{background:'rgba(91,174,232,0.08)',borderLeftColor:'var(--sky)',marginTop:8}}>
                  <div className="tn-lbl" style={{color:'var(--sky)'}}>↪ Bridge to next class</div>
                  <div className="tn-tx">{s.bridge}</div>
                </div>
              )}

          {tab==='activity'&&(
            <div className="sc-panel active">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div className="pl" style={{margin:0}}>Step by Step — click any step to expand</div>
                <div className="step-controls">
                  {anyDone&&<button className="step-ctrl-btn" onClick={uncheckAll}>Uncheck all</button>}
                  {!allDone&&<button className="step-ctrl-btn" onClick={tickAll}>Tick all</button>}
                </div>
              </div>
              {s.activity.map((step,i)=>(
                <div key={i} className={`step ${tickedSteps[i]?'step-done':''}`}
                  onClick={()=>{setSlbStart(i);setSlbOpen(true);}}>
                  <span className="step-n" style={{background:pm.s,color:pm.l}}>{i+1}</span>
                  <div style={{flex:1,minWidth:0}}>
                    {step.t&&<div style={{fontSize:'12px',fontWeight:800,color:tickedSteps[i]?'var(--teal)':'var(--tx)',marginBottom:'3px'}}>{step.t}</div>}
                    <span className="step-t">{step.s}</span>
                  </div>
                  <div className="step-tick"/>
                </div>
              ))}
              {slbOpen&&<StepLightbox steps={s.activity} startIndex={slbStart} pm={pm} tickedSteps={tickedSteps} onTick={toggleStepTick} onClose={()=>setSlbOpen(false)}/>}
            </div>
          )}

          {tab==='references'&&(
            <div className="sc-panel active">
              <RefsPanel refs={s.refs} sessionKey={phaseId+'-'+s.n}/>
            </div>
          )}

          {tab==='notes'&&!classView&&(
            <div className="sc-panel active">
              <NotesTab noteKey={'notes-'+phaseId+'-'+s.n}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

                  background:'var(--popup-bg)',border:'1px solid var(--glass-border2)',

                  boxShadow:'var(--glass-shadow2)',backdropFilter:'blur(24px)'}}>
                  {/* User info */}

      </div>
    </div>
    </React.Fragment>

}

function CustomLessonsPanel({teacherMode}){
  const lessons=useCustomLessons();
  const [editing,setEditing]=React.useState(null); // null | 'new' | lesson object
  const [form,setForm]=React.useState({title:'',overview:'',keywords:''});
  const [saving,setSaving]=React.useState(false);

  function openNew(){setEditing('new');setForm({title:'',overview:'',keywords:''});}
  function openEdit(l){setEditing(l);setForm({title:l.title||'',overview:l.overview||'',keywords:(l.keywords||[]).join(', ')});}
  function closeForm(){setEditing(null);setForm({title:'',overview:'',keywords:''});}

  async function handleSave(){
    if(!form.title.trim()) return;
    setSaving(true);
    const kws=form.keywords.split(',').map(k=>k.trim()).filter(Boolean);
    try{
      if(editing==='new'){
        await addCustomLesson({title:form.title,overview:form.overview,keywords:kws});
      } else {
        await updateCustomLesson(editing.id,{title:form.title,overview:form.overview,keywords:kws});
      }
      closeForm();
    }catch(e){console.error('Save custom lesson failed',e);}
    setSaving(false);
  }

  async function handleDelete(id){
    if(!window.confirm('Delete this custom lesson?')) return;
    try{await deleteCustomLesson(id);}catch(e){console.error(e);}
  }

  if(lessons.length===0&&!teacherMode) return null;

  return(
    <div style={{marginTop:24}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div className="sec-hed" style={{margin:0}}>My Custom Lessons</div>
        {teacherMode&&<button onClick={openNew}
          style={{fontSize:11,fontWeight:700,padding:'4px 12px',borderRadius:100,border:'1px solid var(--glass-border2)',
            background:'transparent',color:'var(--teal)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>+ New Lesson</button>}
      </div>

      {lessons.length===0&&teacherMode&&(
        <div style={{fontSize:12,color:'var(--tx3)',fontStyle:'italic',marginBottom:8}}>No custom lessons yet. Add one above.</div>
      )}

      {lessons.map(l=>(
        <CustomLessonCard key={l.id} lesson={l} teacherMode={teacherMode} onEdit={openEdit} onDelete={handleDelete}/>
      ))}

      {/* Create / Edit form */}
      {editing&&(
        <div style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border2)',borderRadius:12,padding:'14px 16px',marginTop:8}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--tx2)',marginBottom:10,fontFamily:"'DM Sans',sans-serif"}}>
            {editing==='new'?'New Custom Lesson':'Edit Lesson'}
          </div>
          <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}
            placeholder="Lesson title (e.g. Field Trip, Guest Artist…)"
            style={{width:'100%',fontSize:13,padding:'7px 10px',borderRadius:8,border:'1px solid var(--glass-border2)',
              background:'var(--glass-bg2)',color:'var(--tx)',fontFamily:"'DM Sans',sans-serif",outline:'none',marginBottom:8}}/>
          <textarea value={form.overview} onChange={e=>setForm(f=>({...f,overview:e.target.value}))}
            placeholder="Overview (optional — what happens in this lesson?)"
            rows={3}
            style={{width:'100%',fontSize:12,padding:'7px 10px',borderRadius:8,border:'1px solid var(--glass-border2)',
              background:'var(--glass-bg2)',color:'var(--tx)',fontFamily:"'DM Sans',sans-serif",outline:'none',
              resize:'none',marginBottom:8,lineHeight:1.5}}/>
          <input value={form.keywords} onChange={e=>setForm(f=>({...f,keywords:e.target.value}))}
            placeholder="Keywords, comma separated (e.g. Texture, Collage, Observation)"
            style={{width:'100%',fontSize:12,padding:'7px 10px',borderRadius:8,border:'1px solid var(--glass-border2)',
              background:'var(--glass-bg2)',color:'var(--tx)',fontFamily:"'DM Sans',sans-serif",outline:'none',marginBottom:12}}/>
          <div style={{display:'flex',gap:8}}>
            <button onClick={handleSave} disabled={!form.title.trim()||saving}
              style={{fontSize:12,fontWeight:700,padding:'6px 18px',borderRadius:8,border:'none',
                background:form.title.trim()?'var(--teal)':'var(--glass-bg2)',
                color:form.title.trim()?'#fff':'var(--tx3)',cursor:form.title.trim()?'pointer':'default',
                fontFamily:"'DM Sans',sans-serif",opacity:saving?0.6:1}}>
              {saving?'Saving…':'Save'}
            </button>
            <button onClick={closeForm}
              style={{fontSize:12,padding:'6px 14px',borderRadius:8,border:'1px solid var(--glass-border)',
                background:'transparent',color:'var(--tx3)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}
