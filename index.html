function Timer(){
  const [open,setOpen]=React.useState(false);
  const [fullscreen,setFullscreen]=React.useState(false);
  const [total,setTotal]=React.useState(0);
  const [remaining,setRemaining]=React.useState(0);
  const [running,setRunning]=React.useState(false);
  const [customVal,setCustomVal]=React.useState('');
  const [customUnit,setCustomUnit]=React.useState('min');
  const [pos,setPos]=React.useState({x:null,y:null});
  const [dragging,setDragging]=React.useState(false);
  const dragRef=React.useRef(null);
  const fabRef=React.useRef(null);
  const iconBtnRef=React.useRef(null);
  const intervalRef=React.useRef(null);
  const audioCtxRef=React.useRef(null);

  const beep=React.useCallback((freq=880,dur=0.15,vol=0.35)=>{
    try{
      if(!audioCtxRef.current||audioCtxRef.current.state==='closed'){
        audioCtxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      }
      if(audioCtxRef.current.state==='suspended') audioCtxRef.current.resume();
      const ctx=audioCtxRef.current;
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(vol,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur+0.05);
    }catch(e){}
  },[]);

  React.useEffect(()=>{
    if(running&&remaining>0){
      intervalRef.current=setInterval(()=>{
        setRemaining(r=>{
          const next=r<=1?0:r-1;
          if(next===0){
            setRunning(false);
            // 5-second end fanfare — loud and clear
            setTimeout(()=>beep(523,0.25,0.7),0);
            setTimeout(()=>beep(659,0.25,0.7),250);
            setTimeout(()=>beep(784,0.25,0.7),500);
            setTimeout(()=>beep(1047,0.4,0.8),750);
            setTimeout(()=>beep(784,0.2,0.6),1100);
            setTimeout(()=>beep(1047,0.5,0.8),1350);
            setTimeout(()=>beep(1319,0.6,0.85),1700);
            setTimeout(()=>beep(1047,0.3,0.6),2200);
            setTimeout(()=>beep(1319,0.3,0.6),2500);
            setTimeout(()=>beep(1568,1.2,0.8),2800);
          } else if(next<=10){
            // Tick beep every second for last 10 seconds — clearly audible
            const freq=next<=3?1047:880;
            const vol=next<=3?0.6:0.4;
            beep(freq,0.1,vol);
          }
          return next;
        });
      },1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return()=>clearInterval(intervalRef.current);
  },[running,remaining,beep]);

  // Drag on the icon button only
  const onIconMouseDown=React.useCallback((e)=>{
    if(open) return; // don't drag when panel is open — click to toggle
    e.preventDefault();
    const fab=fabRef.current.getBoundingClientRect();
    dragRef.current={ox:e.clientX-fab.left,oy:e.clientY-fab.top,moved:false};
    setDragging(true);
  },[open]);

  React.useEffect(()=>{
    if(!dragging) return;
    const move=(e)=>{
      dragRef.current.moved=true;
      const nx=e.clientX-dragRef.current.ox;
      const ny=e.clientY-dragRef.current.oy;
      setPos({x:Math.max(0,Math.min(nx,window.innerWidth-56)),y:Math.max(0,Math.min(ny,window.innerHeight-56))});
    };
    const up=()=>setDragging(false);
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  },[dragging]);

  // ESC closes fullscreen
  React.useEffect(()=>{
    if(!fullscreen) return;
    const h=(e)=>{if(e.key==='Escape') setFullscreen(false);};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[fullscreen]);

  const setTimeSecs=(secs)=>{setTotal(secs);setRemaining(secs);setRunning(false);};
  const addTime=(secs)=>{setTotal(t=>t+secs);setRemaining(r=>r+secs);};
  const start=()=>{
    if(remaining>0){
      if(audioCtxRef.current?.state==='suspended') audioCtxRef.current.resume();
      setRunning(true);
    }
  };
  const pause=()=>setRunning(false);
  const reset=()=>{setRunning(false);setRemaining(total);};

  const handleSet=()=>{
    const n=Number(customVal);
    if(!n||n<=0) return;
    setTimeSecs(customUnit==='sec'?Math.round(n):Math.round(n*60));
    setCustomVal('');
  };

  const mm=Math.floor(remaining/60);
  const ss=remaining%60;
  const pct=total?Math.max(0,(total-remaining)/total):0;

  const timerColor=React.useMemo(()=>{
    if(!total||remaining===total) return '#3BBFA0';
    const ratio=remaining/total;
    if(ratio>0.6) return '#3BBFA0';
    if(ratio>0.35){const t=(0.6-ratio)/0.25;return `hsl(${Math.round(160-t*80)},72%,52%)`;}
    if(ratio>0.15){const t=(0.35-ratio)/0.2;return `hsl(${Math.round(80-t*50)},78%,52%)`;}
    return '#E8705A';
  },[remaining,total]);

  const fabStyle=pos.x!==null
    ?{position:'fixed',left:pos.x+'px',top:pos.y+'px',bottom:'auto',right:'auto'}
    :{};

  const displayTime=mm>0
    ?`${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
    :String(ss).padStart(2,'0');

  const doneLabel=remaining===0&&total>0?'Done!':running?'Running':'Ready';

  // Fullscreen overlay
  if(fullscreen) return(
    <div className="timer-fullscreen">
      <button className="tf-close" onClick={()=>setFullscreen(false)}>✕</button>
      {/* Arc */}
      <svg width={220} height={120} style={{display:'block'}}>
        <path d="M 10 110 A 100 100 0 0 1 210 110" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="8" strokeLinecap="round"/>
        {total>0&&<path d="M 10 110 A 100 100 0 0 1 210 110" fill="none" stroke={timerColor} strokeWidth="8" strokeLinecap="round"
          strokeDasharray="314" strokeDashoffset={314*(1-pct)} style={{transition:'stroke-dashoffset 1s linear,stroke .5s'}}/>}
      </svg>
      <div className="tf-time" style={{color:timerColor,marginTop:-30}}>{displayTime}</div>
      <div className="tf-label">{doneLabel}</div>
      {/* Add time */}
      {running&&(
        <div className="tf-add">
          <span style={{fontSize:'12px',color:'var(--tx3)',fontWeight:700,marginRight:4}}>+ Add</span>
          {[1,5].map(m=><button key={m} className="tf-add-btn" onClick={()=>addTime(m*60)}>+{m}m</button>)}
        </div>
      )}
      {/* Presets */}
      {!running&&<div className="tf-presets">
        {[5,10,15,20,30].map(m=><button key={m} className="tf-preset" onClick={()=>setTimeSecs(m*60)}>{m}m</button>)}
      </div>}
      {/* Custom set */}
      {!running&&(
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input className="tp-input" type="number" min="1" placeholder="Custom"
            value={customVal} onChange={e=>setCustomVal(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSet()}
            style={{width:90}}/>
          <select value={customUnit} onChange={e=>setCustomUnit(e.target.value)}
            style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:9,padding:'6px 8px',color:'var(--tx2)',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',fontWeight:700,outline:'none',cursor:'pointer'}}>
            <option value="min">min</option>
            <option value="sec">sec</option>
          </select>
          <button className="tp-set-btn" style={{padding:'7px 16px',fontSize:'13px'}} onClick={handleSet}>Set</button>
        </div>
      )}
      {/* Controls */}
      <div className="tf-btns">
        {!running
          ?<button className="tf-btn tf-btn-start" onClick={start}>▶ Start</button>
          :<button className="tf-btn tf-btn-pause" onClick={pause}>⏸ Pause</button>
        }
        <button className="tf-btn tf-btn-stop" onClick={reset} title="Reset">■</button>
      </div>
    </div>
  );

  return(
    <div className="timer-fab" ref={fabRef} style={{...fabStyle}}>
      {open&&(
        <div className="timer-panel">
          {/* Expand to fullscreen */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:'10px',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--tx3)'}}>Timer</span>
            <button onClick={()=>{setFullscreen(true);setOpen(false);}}
              style={{background:'none',border:'none',color:'var(--tx3)',cursor:'pointer',fontSize:'11px',fontWeight:800,padding:'2px 6px',borderRadius:6,transition:'color .15s'}}
              title="Fullscreen">⤢</button>
          </div>

          {/* Arc + time */}
          <div className="tp-display">
            <svg width={90} height={50} style={{display:'block',margin:'0 auto 2px'}}>
              <path d="M 8 46 A 38 38 0 0 1 82 46" fill="none" stroke="var(--glass-bg3)" strokeWidth="5" strokeLinecap="round"/>
              {total>0&&<path d="M 8 46 A 38 38 0 0 1 82 46" fill="none" stroke={timerColor} strokeWidth="5" strokeLinecap="round"
                strokeDasharray="119" strokeDashoffset={119*(1-pct)} style={{transition:'stroke-dashoffset 1s linear,stroke .5s'}}/>}
            </svg>
            <span className="tp-time" style={{color:timerColor,fontSize:mm>0?'36px':'44px',letterSpacing:'-1px'}}>{displayTime}</span>
            <div className="tp-label">{doneLabel}</div>
          </div>

          {/* Quick set */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:4,marginBottom:8}}>
            {[5,10,15,20].map(min=>(
              <button key={min} className="tp-preset" onClick={()=>setTimeSecs(min*60)}>{min}m</button>
            ))}
          </div>

          {/* Custom */}
          <div style={{display:'flex',gap:5,marginBottom:9,alignItems:'stretch'}}>
            <input className="tp-input" type="number" min="1" placeholder="Custom"
              value={customVal} onChange={e=>setCustomVal(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleSet()}
              style={{flex:1,minWidth:0}}/>
            <select value={customUnit} onChange={e=>setCustomUnit(e.target.value)}
              style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:9,
                padding:'0 6px',color:'var(--tx2)',fontFamily:"'DM Sans',sans-serif",
                fontSize:'11px',fontWeight:700,outline:'none',cursor:'pointer',flexShrink:0}}>
              <option value="min">min</option>
              <option value="sec">sec</option>
            </select>
            <button className="tp-set-btn" onClick={handleSet}>Set</button>
          </div>

          {/* Add time (visible while running) */}
          {running&&(
            <div style={{display:'flex',gap:4,marginBottom:8}}>
              <span style={{fontSize:'10px',fontWeight:800,color:'var(--tx3)',alignSelf:'center',marginRight:2}}>+</span>
              {[1,5].map(m=><button key={m} className="tp-preset" onClick={()=>addTime(m*60)}>+{m}m</button>)}
            </div>
          )}

          {/* Controls */}
          <div className="tp-btns">
            {!running
              ?<button className="tp-btn tp-btn-start" onClick={start}>▶ Start</button>
              :<button className="tp-btn tp-btn-pause" onClick={pause}>⏸ Pause</button>
            }
            <button className="tp-btn tp-btn-stop" onClick={reset} title="Reset">■</button>
          </div>
        </div>
      )}
      <button ref={iconBtnRef} className="timer-icon-btn"
        onMouseDown={onIconMouseDown}
        onClick={()=>{if(!dragging&&(!dragRef.current||!dragRef.current.moved)) setOpen(o=>!o);}}
        title="Class timer"
        style={{
          borderColor:running?timerColor:'var(--glass-border2)',
          boxShadow:running?`0 0 16px ${timerColor}55,var(--glass-shadow2)`:'var(--glass-shadow2),var(--inset)'
        }}>
        <span style={{color:'var(--tx2)',fontSize:20}}>⏱</span>
      </button>
    </div>
  );
}


// ── EXPORT: bake localStorage into a portable HTML file ──
function exportHTML(){
  const html=document.documentElement.outerHTML;
  // Collect all localStorage keys
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    data[k]=localStorage.getItem(k);
  }
  const injection=`<script id="__ls_seed__">
(function(){var d=${JSON.stringify(data)};Object.keys(d).forEach(function(k){try{localStorage.setItem(k,d[k]);}catch(e){}});var s=document.getElementById('__ls_seed__');if(s)s.parentNode.removeChild(s);})();
<\/script>`;
  // Insert injection right after <body>
  const out=html.replace(/<body>/,'<body>'+injection);
  const blob=new Blob([out],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const ts=new Date().toISOString().slice(0,10);
  a.download=`grade4-order-chaos-${ts}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── PDF: single session — Lesson Plan ──
function generateSessionPDF(s,phaseColor){
  const {jsPDF}=window.jspdf||{};
  if(!jsPDF){alert('jsPDF not loaded. Check your internet connection.');return;}
  // Null-guard all session fields so a missing field never crashes the PDF
  const safe={
    n:s.n||'',
    title:s.title||'Untitled Lesson',
    objective:s.objective||'',
    overview:s.overview||'',
    dur:s.dur||'',
    tn:s.tn||'',
    bridge:s.bridge||'',
    tags:Array.isArray(s.tags)?s.tags:[],
    mats:Array.isArray(s.mats)?s.mats:[],
    kws:Array.isArray(s.kws)?s.kws:[],
    bigQ:Array.isArray(s.bigQ)?s.bigQ:[],
    activity:Array.isArray(s.activity)?s.activity:[],
    refs:Array.isArray(s.refs)?s.refs:[],
  };
  s=safe;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210, M=20, CW=W-M*2;
  const accentMap={coral:[220,90,72],yellow:[200,150,50],teal:[46,175,140],violet:[140,110,220],sky:[70,155,215]};
  const ac=accentMap[phaseColor]||accentMap.coral;
  const phaseName=PHASES.find(p=>p.color===phaseColor)?.name||phaseColor;
  let y=0;

  // ── page check ──
  const chk=(n=10)=>{if(y+n>282){doc.addPage();y=M;drawPageHeader();}};

  // ── thin top accent rule (every page) ──
  const drawPageHeader=()=>{
    doc.setFillColor(ac[0],ac[1],ac[2]);
    doc.rect(0,0,W,1.2,'F');
  };
  drawPageHeader();

  // ── COVER HEADER ──
  y=16;
  // Eyebrow
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(170,175,190);
  doc.text('ORDER & CHAOS  ·  GRADE 4  ·  VISUAL ARTS',M,y);
  doc.text('LESSON PLAN',W-M,y,{align:'right'});
  y+=5;

  // Thin rule
  doc.setDrawColor(230,232,238);doc.setLineWidth(0.25);
  doc.line(M,y,W-M,y);
  y+=10;

  // Session number pill (left column)
  const pillW=14;
  // Just a coloured number
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(ac[0],ac[1],ac[2]);
  doc.text(String(s.n),M+3,y+1);

  // Title (right of number)
  doc.setFont('helvetica','bold');
  doc.setFontSize(20);
  doc.setTextColor(18,22,40);
  const titleLines=doc.splitTextToSize(s.title,CW-16);
  titleLines.forEach((l,i)=>{doc.text(l,M+14,y+(i*9));});
  y+=titleLines.length*9+3;

  // Meta row: phase · duration · tags
  doc.setFont('helvetica','normal');
  doc.setFontSize(8.5);
  doc.setTextColor(155,160,175);
  doc.text(`${phaseName}  ·  ${s.dur}  ·  ${s.tags.map(t=>t.l).join('  ·  ')}`,M+14,y);
  y+=10;

  // Full rule
  doc.setDrawColor(ac[0],ac[1],ac[2]);doc.setLineWidth(0.4);
  doc.line(M,y,W-M,y);
  y+=8;

  // ── section helper ──
  const section=(title)=>{
    chk(16);
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.setTextColor(ac[0],ac[1],ac[2]);
    doc.text(title.toUpperCase(),M,y);
    y+=3.5;
    doc.setDrawColor(ac[0],ac[1],ac[2]);doc.setLineWidth(0.2);
    doc.line(M,y,W-M,y);
    y+=5;
  };

  // ── body text ──
  const bodyTxt=(txt,indent=0,color=[55,60,80])=>{
    doc.setFont('helvetica','normal');
    doc.setFontSize(9.5);
    doc.setTextColor(color[0],color[1],color[2]);
    const lines=doc.splitTextToSize(txt,CW-indent);
    lines.forEach(l=>{chk(5);doc.text(l,M+indent,y);y+=5.2;});
  };

  // ── LEARNING OBJECTIVE ──
  section('Learning Objective');
  doc.setFont('helvetica','bold');
  doc.setFontSize(10.5);
  doc.setTextColor(18,22,40);
  const objL=doc.splitTextToSize(s.objective,CW);
  objL.forEach(l=>{chk(5);doc.text(l,M,y);y+=5.8;});
  y+=4;

  // ── OVERVIEW ──
  section('Lesson Overview');
  bodyTxt(s.overview);
  y+=4;

  // ── MATERIALS + KEYWORDS side by side ──
  chk(32);
  const half=(CW-8)/2;
  const rx=M+half+8;
  const sideY=y;

  // Left: Materials
  doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(ac[0],ac[1],ac[2]);
  doc.text('MATERIALS',M,y);y+=4;
  doc.setDrawColor(ac[0],ac[1],ac[2]);doc.setLineWidth(0.15);doc.line(M,y,M+half,y);y+=4;
  s.mats.forEach(m=>{
    chk(5);
    doc.setFillColor(ac[0],ac[1],ac[2]);
    doc.circle(M+1.2,y-0.8,0.9,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(55,60,80);
    doc.splitTextToSize(m,half-6).forEach(l=>{doc.text(l,M+5,y);y+=4.8;});
  });

  // Right: Keywords
  let ky=sideY;
  doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(ac[0],ac[1],ac[2]);
  doc.text('KEY WORDS',rx,ky);ky+=4;
  doc.setDrawColor(ac[0],ac[1],ac[2]);doc.setLineWidth(0.15);doc.line(rx,ky,rx+half,ky);ky+=4;
  s.kws.forEach(k=>{
    const kobj=KWS.find(kw=>kw.w===k);
    doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(ac[0],ac[1],ac[2]);
    doc.text(k,rx,ky);ky+=4.5;
    if(kobj){
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120,125,145);
      doc.splitTextToSize(kobj.s,half-2).forEach(l=>{doc.text(l,rx,ky);ky+=3.8;});
      ky+=1;
    }
  });

  y=Math.max(y,ky)+8;

  // ── BIG QUESTIONS ──
  section('Big Questions');
  s.bigQ.forEach((q,i)=>{
    chk(12);
    doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(80,85,108);
    // Number
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(ac[0],ac[1],ac[2]);
    doc.text(String(i+1)+'.',M,y);
    doc.setFont('helvetica','italic');doc.setFontSize(9.5);doc.setTextColor(70,75,100);
    doc.splitTextToSize(q,CW-7).forEach(l=>{doc.text(l,M+6,y);y+=5.2;});
    y+=2;
  });
  y+=2;

  // ── ACTIVITY STEPS ──
  section('Activity — Step by Step');
  s.activity.forEach((step,i)=>{
    chk(20);
    // Step number circle
    doc.setFillColor(ac[0],ac[1],ac[2]);
    doc.circle(M+3.5,y+0.5,3.5,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(255,255,255);
    doc.text(String(i+1),M+3.5,y+1.2,{align:'center'});

    // Step title
    if(step.t){
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(18,22,40);
      const tl=doc.splitTextToSize(step.t,CW-12);
      doc.text(tl[0],M+10,y+1.5);
      y+=tl.length>1?tl.length*5+1:6;
    } else {y+=6;}

    // Step detail
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(75,80,100);
    doc.splitTextToSize(step.s,CW-10).forEach(l=>{chk(5);doc.text(l,M+10,y);y+=4.8;});
    y+=5;
  });

  // ── TEACHER NOTE ──
  if(s.tn){
    chk(22);
    section('Teacher Note');
    const tnLines=doc.splitTextToSize(s.tn,CW-8);
    const tnH=tnLines.length*5+10;
    chk(tnH);
    doc.setFillColor(250,251,253);
    doc.roundedRect(M,y-2,CW,tnH,2,2,'F');
    doc.setFillColor(ac[0],ac[1],ac[2]);
    doc.rect(M,y-2,2,tnH,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(70,75,95);
    tnLines.forEach(l=>{doc.text(l,M+6,y);y+=5;});
    y+=8;
  }

  // ── BRIDGE ──
  if(s.bridge){
    chk(16);
    section('Bridge to Next Class');
    doc.setFont('helvetica','italic');doc.setFontSize(9.5);doc.setTextColor(100,105,125);
    doc.splitTextToSize(s.bridge,CW).forEach(l=>{chk(5);doc.text(l,M,y);y+=5.2;});
    y+=4;
  }

  // ── REFERENCES ──
  const nonSlide=(s.refs||[]).filter(r=>r.type!=='slide');
  if(nonSlide.length){
    chk(20);
    section('Artists & References');
    nonSlide.forEach(r=>{
      chk(14);
      doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(18,22,40);
      doc.text(r.name,M,y);
      if(r.work){
        doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(140,145,160);
        doc.text('  '+r.work,M+doc.getTextWidth(r.name),y);
      }
      y+=5;
      if(r.why){
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(95,100,120);
        doc.splitTextToSize(r.why,CW).forEach(l=>{chk(4);doc.text(l,M,y);y+=4.4;});
      }
      y+=5;
    });
  }

  // ── FOOTER ──
  const pages=doc.internal.getNumberOfPages();
  for(let p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setDrawColor(225,227,235);doc.setLineWidth(0.25);
    doc.line(M,287,W-M,287);
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(170,175,190);
    doc.text(`Order & Chaos  ·  Grade 4  ·  Lesson ${s.n}: ${s.title}`,M,292);
    doc.text(`${p} / ${pages}`,W-M,292,{align:'right'});
    if(p>1) drawPageHeader();
  }

  doc.save(`lesson-plan-session-${s.n}.pdf`);
}

   'What does it mean to see the world as a system?',

    doc.splitTextToSize(phase.sub,CW-2).forEach(l=>{chk(5);doc.text(l,M,y);y+=4.8;});

// ── RENDER MARKDOWN — converts AI markdown to clean styled HTML ──
function renderMarkdown(text, onJump){
  if(!text) return null;
  const lines=text.split('\n');
  const elements=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    // Skip empty lines between blocks
    if(!line.trim()){i++;continue;}
    // H3 ###
    if(line.startsWith('### ')){
      elements.push(<div key={i} style={{fontSize:11,fontWeight:800,color:'var(--violet)',textTransform:'uppercase',letterSpacing:'.07em',marginTop:10,marginBottom:3}}>{line.slice(4)}</div>);
      i++;continue;
    }
    // H2 ##
    if(line.startsWith('## ')){
      elements.push(<div key={i} style={{fontSize:12,fontWeight:800,color:'var(--tx)',marginTop:12,marginBottom:4,borderBottom:'1px solid var(--glass-border)',paddingBottom:3}}>{line.slice(3)}</div>);
      i++;continue;
    }
    // H1 #
    if(line.startsWith('# ')){
      elements.push(<div key={i} style={{fontSize:13,fontWeight:800,color:'var(--tx)',marginTop:12,marginBottom:5}}>{line.slice(2)}</div>);
      i++;continue;
    }
    // Bullet - or *
    if(line.match(/^[\-\*] /)){
      const bullets=[];
      while(i<lines.length&&lines[i].match(/^[\-\*] /)){
        bullets.push(<div key={i} style={{display:'flex',gap:7,marginBottom:3}}>
          <span style={{color:'var(--violet)',flexShrink:0,marginTop:1}}>◆</span>
          <span>{onJump?inlineWithJumps(lines[i].slice(2),onJump):inlineFormat(lines[i].slice(2))}</span>
        </div>);
        i++;
      }
      elements.push(<div key={'b'+i} style={{marginTop:4,marginBottom:4}}>{bullets}</div>);
      continue;
    }
    // Numbered list
    if(line.match(/^\d+\. /)){
      const items=[];
      let n=1;
      while(i<lines.length&&lines[i].match(/^\d+\. /)){
        items.push(<div key={i} style={{display:'flex',gap:7,marginBottom:3}}>
          <span style={{color:'var(--violet)',flexShrink:0,fontWeight:700,minWidth:14}}>{n}.</span>
          <span>{inlineFormat(lines[i].replace(/^\d+\. /,''))}</span>
        </div>);
        i++;n++;
      }
      elements.push(<div key={'n'+i} style={{marginTop:4,marginBottom:4}}>{items}</div>);
      continue;
    }
    // [NAVIGATE] prefix
    if(line.startsWith('[NAVIGATE]')){
      elements.push(<div key={i} style={{background:'rgba(155,127,232,0.12)',border:'1px solid rgba(155,127,232,0.3)',borderRadius:8,padding:'6px 10px',marginTop:6,marginBottom:6,fontSize:11}}>
        <span style={{fontWeight:700,color:'var(--violet)',marginRight:6}}>→ Nav</span>
        {line.replace('[NAVIGATE]','').trim()}
      </div>);
      i++;continue;
    }
    // Horizontal rule ---
    if(line.match(/^---+$/)){
      elements.push(<hr key={i} style={{border:'none',borderTop:'1px solid var(--glass-border)',margin:'8px 0'}}/>);
      i++;continue;
    }
    // Grounding sources block
    if(line.startsWith('__sources__')){
      i++;
      const srcs=[];
      while(i<lines.length&&lines[i].match(/^\[\d+\]/)){srcs.push(lines[i]);i++;}
      elements.push(
        <div key={'src'+i} style={{marginTop:10,padding:'7px 10px',borderRadius:8,background:'rgba(255,255,255,0.05)',border:'1px solid var(--glass-border)',fontSize:10,color:'var(--tx3)'}}>
          <div style={{fontWeight:700,marginBottom:4,color:'var(--tx2)',letterSpacing:'.04em',fontSize:9,textTransform:'uppercase'}}>🌐 Sources</div>
          {srcs.map((s,j)=>{
            const m=s.match(/^\[(\d+)\] (.+?)\|\|\|(.+)$/);
            if(!m) return <div key={j}>{s}</div>;
            const[,num,label,url]=m;
            return<div key={j} style={{marginBottom:3}}><span style={{color:'var(--violet)',fontWeight:700,marginRight:4}}>[{num}]</span><a href={url} target="_blank" rel="noreferrer" onClick={e=>{e.preventDefault();window.open(url,'_blank');}} style={{color:'var(--teal)',textDecoration:'none',cursor:'pointer'}}>{label}</a></div>;
          })}
        </div>
      );
      continue;
    }
    // Normal paragraph
    elements.push(<div key={i} style={{marginBottom:4,lineHeight:1.6}}>{onJump?inlineWithJumps(line,onJump):inlineFormat(line)}</div>);
    i++;
  }
  return elements;
}

// Inline formatting — bold, italic, code
function inlineFormat(text){
  if(!text||typeof text!=='string') return text;
  // Split on [text](url), **bold**, *italic*, `code`
  const parts=[];
  const regex=/(\[[^\]]+\]\(https?:\/\/[^)]+\)|\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g;
  let last=0,m,idx=0;
  while((m=regex.exec(text))!==null){
    if(m.index>last) parts.push(<span key={idx++}>{text.slice(last,m.index)}</span>);
    const raw=m[0];
    if(raw.startsWith('[')){ // markdown link [label](url)
      const lm=raw.match(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/);
      if(lm) parts.push(<a key={idx++} href={lm[2]} target="_blank" rel="noreferrer" onClick={e=>{e.preventDefault();window.open(lm[2],'_blank');}} style={{color:'var(--teal)',textDecoration:'underline',cursor:'pointer'}}>{lm[1]}</a>);
      else parts.push(<span key={idx++}>{raw}</span>);
    } else if(raw.startsWith('**')) parts.push(<strong key={idx++} style={{fontWeight:700,color:'var(--tx)'}}>{raw.slice(2,-2)}</strong>);
    else if(raw.startsWith('*')) parts.push(<em key={idx++} style={{fontStyle:'italic'}}>{raw.slice(1,-1)}</em>);
    else parts.push(<code key={idx++} style={{fontFamily:"'DM Mono',monospace",fontSize:'0.9em',background:'rgba(155,127,232,0.15)',borderRadius:3,padding:'1px 4px'}}>{raw.slice(1,-1)}</code>);
    last=m.index+raw.length;
  }
  if(last<text.length) parts.push(<span key={idx++}>{text.slice(last)}</span>);
  return parts.length>0?parts:text;
}

// ── JUMP LINK RENDERER — wraps Lesson N / Wave N in tappable chips ──
function inlineWithJumps(text, onJump){
  if(!text) return text;
  if(typeof text!=='string') return text; // already React elements — don't process
  // Match "Lesson 1-14" or "Wave 1/2/3" (case-insensitive)
  const regex=/(Lesson\s+(\d+)|Wave\s+([123]))/gi;
  const parts=[];
  let last=0, m, idx=0;
  while((m=regex.exec(text))!==null){
    if(m.index>last) parts.push(<span key={idx++}>{inlineFormat(text.slice(last,m.index))}</span>);
    const label=m[0];
    const isLesson=!!m[2];
    const num=isLesson?parseInt(m[2]):parseInt(m[3]);
    parts.push(
      <span key={idx++}
        onClick={()=>onJump&&onJump(isLesson?'lesson':'wave',num)}
        style={{display:'inline-block',padding:'0 5px',borderRadius:5,fontSize:'0.9em',fontWeight:700,
          background:isLesson?'rgba(59,191,160,0.15)':'rgba(155,127,232,0.15)',
          border:isLesson?'1px solid rgba(59,191,160,0.35)':'1px solid rgba(155,127,232,0.35)',
          color:isLesson?'var(--teal)':'var(--violet)',cursor:'pointer',lineHeight:1.6,
          textDecoration:'none',userSelect:'none',margin:'0 1px'}}
        title={isLesson?`Go to Lesson ${num}`:`Go to Wave ${num}`}>
        {label}
      </span>
    );
    last=m.index+label.length;
  }
  if(last<text.length) parts.push(<span key={idx++}>{inlineFormat(text.slice(last))}</span>);
  return parts.length>0?parts:text;
}

// ── AI CHATBOT COMPONENT ──

    function onMove(ev){
      const nx=ev.clientX-dragRef.current.ox;
      const ny=ev.clientY-dragRef.current.oy;

    function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}

    document.addEventListener('mouseup',onUp);

          allTags.forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1;});
          const topTags=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([t])=>t);
          const recentNotes=obs.filter(o=>o.note).slice(-2).map(o=>o.note);
          return `    ${st.name}: Attendance ${attCount}/${totalSess} | 👍${thumbsUp} 👎${thumbsDown}${escalations>0?` | ⚠️ ${escalations} escalation(s)`:''} | Tags: ${topTags.join(', ')||'none'}${recentNotes.length>0?` | Notes: ${recentNotes.join('; ')}`:''}`;
        }).join('\n');
        return `${sName} (${students.length} students, ${totalSess} sessions):\n${studentLines}`;
      }).join('\n\n');
    } else {
      // Fallback to just names from static sections
      studentContext=(sections||[]).map(sec=>
        `${sec.name}: ${sec.students.join(', ')}`
      ).join('\n');
    }

    return `You are a smart, warm teaching assistant embedded in a Grade 4 Visual Arts app called "Order & Chaos". You help the teacher Sanket with curriculum, lesson planning, student tracking, and app navigation.

CURRENT APP STATE:
${viewDesc} | Teacher mode: ${teacherMode?'ON':'OFF'}${dataLoading?' | Student data: loading…':liveData?' | Student data: live from Firebase':' | Student data: names only'}

STUDENT DATA (all 5 sections):
${studentContext}

CURRICULUM:
${curriculumSummary}

RESPONSE STYLE — VERY IMPORTANT:
- Write in clean, warm, conversational prose. You are talking to a teacher, not writing a report.
- Use markdown naturally: ## for section headings, bullet points for lists, **bold** for names or key info.
- Never use raw symbols like asterisks mid-sentence. Never write "**Sanket:**" or similar.
- For student reports or summaries, organise clearly with headings per section or per concern.
- Keep it concise. A busy teacher doesn't want walls of text.
- For navigation requests, prefix with [NAVIGATE].
- When flagging students of concern, be specific: name, section, what the data shows.`;
  }

  async function sendMessage(overrideText){
    const text=(overrideText||input).trim();
    if(!text||loading) return;
    const key=getGeminiKey();
    if(!key){
      const newKey=resetGeminiKey();
      if(newKey) sendMessage();

    // Build Gemini contents array (user/model alternating)

      role:m.role==='assistant'?'model':'user',
      parts:[{text:m.content}]
    }));

    const endpoint=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          systemInstruction:{parts:[{text:buildSystemPrompt()}]},
          contents,
          tools:[{google_search:{}}],
          generationConfig:{maxOutputTokens:1500,temperature:0.7}
        })
      });
      const data=await res.json();
      if(data.error){
        if(data.error.message&&(data.error.message.includes('API key')||data.error.message.includes('leaked')||data.error.message.includes('invalid'))){
          const newKey=resetGeminiKey();
          if(newKey) sendMessage();
          return;
        }
        setMessages(m=>[...m,{role:'assistant',content:`Error: ${data.error.message||'API call failed.'}`}]);
      } else {
        const parts=data.candidates?.[0]?.content?.parts||[];
        const reply=parts.map(p=>p.text||'').join('')||'No response.';
        // Extract grounding sources if present
        const groundingMeta=data.candidates?.[0]?.groundingMetadata;
        const sources=(groundingMeta?.groundingChunks||[])
          .map(c=>c.web).filter(Boolean)
          .filter(s=>s.uri&&!s.uri.includes('vertexaisearch')&&!s.uri.includes('google.com/search'))
          .filter((s,i,arr)=>arr.findIndex(x=>x.uri===s.uri)===i)// dedupe
          .slice(0,4);
        const sourceSuffix=sources.length>0
          ?'\n\n__sources__'+sources.map((s,i)=>{
            let domain=s.uri;
            try{const u=new URL(s.uri);domain=u.hostname.replace(/^www\./,'');}catch(e){}
            const label=s.title&&s.title.length<40?s.title:domain;
            return '['+(i+1)+'] '+label+'|||'+s.uri;
          }).join('\n')
          :'';
        setMessages(m=>[...m,{role:'assistant',content:reply+sourceSuffix}]);
        if(!open) setUnread(true);
      }
    }catch(err){
      if(err.message&&(err.message.includes('API key')||err.message.includes('leaked')||err.message.includes('invalid'))){
        const newKey=resetGeminiKey();
        if(newKey) sendMessage();
        return;
      }
      setMessages(m=>[...m,{role:'assistant',content:'Network error. Check your connection.'}]);
    }
    setLoading(false);
  }

          </div>

          {/* Messages */}
          <div className="ai-chat-messages">
            {messages.length===0&&(

function generatePIN(){return String(Math.floor(1000+Math.random()*9000));}
function getPINStorageKey(sectionId){return 'g4-sub-pin-'+sectionId;}
function getSubPIN(sectionId){
  try{
    const d=JSON.parse(localStorage.getItem(getPINStorageKey(sectionId))||'null');
    if(!d) return null;
    if(Date.now()>d.expires) {localStorage.removeItem(getPINStorageKey(sectionId));return null;}
    return d;
  }catch{return null;}
}
function saveSubPIN(sectionId,pin,linkedDate,durationHours){
  const hrs = durationHours||8;
  const d={pin,expires:Date.now()+hrs*60*60*1000,linkedDate,sectionId};
  localStorage.setItem(getPINStorageKey(sectionId),JSON.stringify(d));
}

        body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:2000}})
      });
      const data=await res.json();

      else{const reason=data.error?.message||data.promptFeedback?.blockReason||JSON.stringify(data);setProfile('API error: '+reason);}

                                <span style={{fontSize:9,fontWeight:700,color:'#0d7a60',letterSpacing:'.05em'}}>✨ AI Profile</span>
                                <button onClick={()=>onDeleteObs(realIdx)}
                                  style={{fontSize:10,lineHeight:1,padding:'2px 6px',borderRadius:5,background:'rgba(232,112,90,0.1)',border:'1px solid rgba(232,112,90,0.25)',color:'var(--coral)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>✕</button>
                              </div>
                              <div style={{fontSize:10,color:'#1a1a2e',fontStyle:'italic',lineHeight:1.5,fontFamily:"'DM Sans',sans-serif"}}>{o.note}</div>
                            </div>
                          ):(
                            <div key={realIdx} className="obs-history-entry" style={{position:'relative',flexShrink:0,background:'rgba(255,255,255,0.3)',borderRadius:8,padding:'6px 10px',border:'1px solid rgba(0,0,0,0.07)'}}>
                              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
                                <div style={{fontSize:9,color:'#6b6560',fontFamily:"'DM Sans',sans-serif"}}>{o.thumb?<span>{o.thumb==='up'?'👍':'👎'}</span>:null}</div>
                                <button onClick={()=>onDeleteObs(realIdx)}
                                  style={{fontSize:10,lineHeight:1,padding:'2px 6px',borderRadius:5,background:'rgba(232,112,90,0.1)',border:'1px solid rgba(232,112,90,0.25)',color:'var(--coral)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>✕</button>
                              </div>
                              {o.tags&&o.tags.length>0&&(
                                <div style={{display:'flex',flexWrap:'wrap',gap:3,marginBottom:3}}>
                                  {o.tags.map((t,j)=>{
                                    const tagDef=OBS_TAGS.find(td=>td.label===t);
                                    const colors={green:{bg:'rgba(59,191,160,0.15)',cl:'#0d7a60'},yellow:{bg:'rgba(212,168,67,0.15)',cl:'#8a6a00'},red:{bg:'rgba(232,112,90,0.15)',cl:'#c0392b'}};
                                    const c=colors[tagDef?tagDef.color:'yellow']||colors.yellow;
                                    return<span key={j} style={{fontSize:8,padding:'1px 6px',borderRadius:6,background:c.bg,color:c.cl,fontFamily:"'DM Sans',sans-serif"}}>{t}</span>;
                                  })}
                                </div>
                              )}
                              {o.note&&<div style={{fontSize:10,color:'#2a2520',fontStyle:'italic',lineHeight:1.4,fontFamily:"'DM Sans',sans-serif"}}>"{o.note}"</div>}
                              {o.escalation&&!o.escalationCleared&&<div style={{fontSize:9,color:'#c0392b',marginTop:2}}>⚠️ Escalation needed</div>}
                            </div>
                          )
                        ))}
                      </div>
                    </div>
                  ));
                })()
              }
            </div>
          </div>}{/* end back face */}

        </div>{/* end flip container */}
      </div>
    </div>
    </>
  );
}

// ── PHOTO EDITOR MODAL ──
function PhotoEditor({srcUrl, onSave, onClose, uploading, initialCrop, onCropChange, batchLabel, onPrev, onNext}){
  const canvasRef=React.useRef(null);
  const baseImg=React.useRef(null);
  const [rotation,setRotation]=React.useState(0);
  const [flipH,setFlipH]=React.useState(false);
  const [brightness,setBrightness]=React.useState(0);
  const [contrast,setContrast]=React.useState(0);
  const [saturation,setSaturation]=React.useState(0);
  // Crop in normalised 0-1 coords — init from parent so it persists on reopen
  const [crop,setCrop]=React.useState(()=>initialCrop||{x:0,y:0,w:1,h:1});
  function setCropAndNotify(v){
    setCrop(prev=>{
      const next=typeof v==='function'?v(prev):v;
      if(onCropChange) onCropChange(next);
      return next;
    });
  }
  const [cropMode,setCropMode]=React.useState(false); // will be set true below if saved crop exists
  const [fineRotation,setFineRotation]=React.useState(0); // -45 to +45 degrees
  const [imgReady,setImgReady]=React.useState(false);
  const [canvasRect,setCanvasRect]=React.useState(null);
  // Undo stack — each entry is a full state snapshot
  const [history,setHistory]=React.useState([]);
  // Draggable panel
  const [panelPos,setPanelPos]=React.useState({x:24,y:72});
  const AMBER='#f59e0b';

  function snapshot(){
    setHistory(h=>[...h,{rotation,fineRotation,flipH,brightness,contrast,saturation,crop:{...crop}}]);
  }
  function undo(){
    setHistory(h=>{
      if(!h.length) return h;
      const prev=h[h.length-1];
      setRotation(prev.rotation);setFineRotation(prev.fineRotation||0);setFlipH(prev.flipH);
      setBrightness(prev.brightness);setContrast(prev.contrast);setSaturation(prev.saturation);
      setCropAndNotify({...prev.crop});
      return h.slice(0,-1);
    });
  }

  // Load image with crossOrigin to allow toBlob export
  // Cache-bust with timestamp so browser doesn't serve cached non-CORS version
  React.useEffect(()=>{
    setImgReady(false);
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{baseImg.current=img;setImgReady(true);};
    img.onerror=()=>{
      // If CORS fails try fetching via blob URL to avoid taint
      fetch(srcUrl)
        .then(r=>r.blob())
        .then(blob=>{
          const blobUrl=URL.createObjectURL(blob);
          const img2=new Image();
          img2.onload=()=>{baseImg.current=img2;setImgReady(true);URL.revokeObjectURL(blobUrl);};
          img2.src=blobUrl;
        })
        .catch(()=>setImgReady(false));
    };
    const sep=srcUrl.includes('?')?'&':'?';
    img.src=srcUrl+sep+'t='+Date.now();
  },[srcUrl]);

  // Redraw canvas when params change
  React.useEffect(()=>{if(imgReady) redraw();},[imgReady,rotation,fineRotation,flipH]);
  // Auto-show crop overlay if a non-default crop was saved
  React.useEffect(()=>{
    if(imgReady&&initialCrop&&!(initialCrop.x===0&&initialCrop.y===0&&initialCrop.w===1&&initialCrop.h===1)){
      setCropMode(true);
    }
  },[imgReady]);

  // Update canvas rect when ready
  React.useEffect(()=>{
    if(imgReady){
      setTimeout(()=>{
        const c=canvasRef.current;
        if(c) setCanvasRect(c.getBoundingClientRect());
      },50);
    }
  },[imgReady,rotation]);

  function redraw(){
    const canvas=canvasRef.current;
    const img=baseImg.current;
    if(!canvas||!img) return;
    const maxW=window.innerWidth-20;
    const maxH=window.innerHeight-80;
    const totalRot=rotation+fineRotation;
    const rad=totalRot*Math.PI/180;
    // Canvas size is fixed to the crop region — image rotates within it (corners clip)
    const rot90=(rotation===90||rotation===270);
    const baseW=rot90?img.height:img.width;
    const baseH=rot90?img.width:img.height;
    const outNatW=baseW;
    const outNatH=baseH;
    const scale=Math.min(maxW/outNatW,maxH/outNatH,1);
    canvas.width=Math.round(outNatW*scale);
    canvas.height=Math.round(outNatH*scale);
    const ctx=canvas.getContext('2d');
    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    if(flipH) ctx.scale(-1,1);
    ctx.rotate(rad);
    ctx.drawImage(img,-Math.round(img.width*scale)/2,-Math.round(img.height*scale)/2,Math.round(img.width*scale),Math.round(img.height*scale));
    ctx.restore();
    // Update rect after draw — always fresh
    requestAnimationFrame(()=>{if(canvasRef.current) setCanvasRect(canvasRef.current.getBoundingClientRect());});
  }

  // CSS filter string for live preview — avoids canvas taint entirely
  function getCSSFilter(){
    const b=brightness!==0?`brightness(${1+brightness/100})`:'';
    const c=contrast!==0?`contrast(${1+contrast/100})`:'';
    const s=saturation!==0?`saturate(${1+saturation/100})`:'';
    return [b,c,s].filter(Boolean).join(' ')||'none';
  }

  // Crop overlay — positioned over the canvas element
  function cropHandleMouseDown(e,handle){
    if(!cropMode) return;
    e.preventDefault();
    e.stopPropagation();
    snapshot();
    const rect=canvasRef.current.getBoundingClientRect();
    function onMove(ev){
      const nx=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));
      const ny=Math.max(0,Math.min(1,(ev.clientY-rect.top)/rect.height));
      setCrop(prev=>{
        let {x,y,w,h}=prev;
        if(handle==='tl'){const nx2=Math.min(nx,x+w-0.05),ny2=Math.min(ny,y+h-0.05);w=x+w-nx2;h=y+h-ny2;x=nx2;y=ny2;}
        else if(handle==='tr'){w=Math.max(0.05,nx-x);const ny2=Math.min(ny,y+h-0.05);h=y+h-ny2;y=ny2;}
        else if(handle==='bl'){const nx2=Math.min(nx,x+w-0.05);w=x+w-nx2;x=nx2;h=Math.max(0.05,ny-y);}
        else if(handle==='br'){w=Math.max(0.05,nx-x);h=Math.max(0.05,ny-y);}
        else if(handle==='t'){const ny2=Math.min(ny,y+h-0.05);h=y+h-ny2;y=ny2;}
        else if(handle==='b'){h=Math.max(0.05,ny-y);}
        else if(handle==='l'){const nx2=Math.min(nx,x+w-0.05);w=x+w-nx2;x=nx2;}
        else if(handle==='r'){w=Math.max(0.05,nx-x);}
        else if(handle==='move'){
          x=Math.max(0,Math.min(1-w,prev._dx!==undefined?nx-prev._dx:x));
          y=Math.max(0,Math.min(1-h,prev._dy!==undefined?ny-prev._dy:y));
          const next={x,y,w,h,_dx:nx-x,_dy:ny-y};
          if(onCropChange) onCropChange(next);
          return next;
        }
        const next={x,y,w,h};
        if(onCropChange) onCropChange(next);
        return next;
      });
    }
    function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  }

  function rotate90(dir){snapshot();setRotation(r=>(r+dir*90+360)%360);}
  function doFlip(){snapshot();setFlipH(v=>!v);}
  function reset(){setHistory([]);setRotation(0);setFineRotation(0);setFlipH(false);setBrightness(0);setContrast(0);setSaturation(0);setCropAndNotify({x:0,y:0,w:1,h:1});setCropMode(false);}

  function onPanelDragStart(e){
    e.preventDefault();
    const sx=e.clientX-panelPos.x, sy=e.clientY-panelPos.y;
    function onMove(ev){setPanelPos({x:ev.clientX-sx,y:ev.clientY-sy});}
    function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  }

  function handleSave(){
    const img=baseImg.current;
    if(!img) return;
    const totalRot=(rotation+fineRotation)*Math.PI/180;
    const cosA=Math.abs(Math.cos(totalRot)), sinA=Math.abs(Math.sin(totalRot));
    const MAX=1400;
    // Step 1: render full rotated image
    const fullW=img.width*cosA+img.height*sinA;
    const fullH=img.width*sinA+img.height*cosA;
    const scaleF=Math.min(MAX/fullW,MAX/fullH,1);
    const fc=document.createElement('canvas');
    fc.width=Math.round(fullW*scaleF);fc.height=Math.round(fullH*scaleF);
    const ctx=fc.getContext('2d');
    ctx.save();ctx.translate(fc.width/2,fc.height/2);
    if(flipH) ctx.scale(-1,1);
    ctx.rotate(totalRot);
    ctx.drawImage(img,-Math.round(img.width*scaleF)/2,-Math.round(img.height*scaleF)/2,Math.round(img.width*scaleF),Math.round(img.height*scaleF));
    ctx.restore();
    // Step 2: apply crop from the rendered canvas
    const cx=Math.round(crop.x*fc.width);
    const cy=Math.round(crop.y*fc.height);
    const cw=Math.round(crop.w*fc.width)||fc.width;
    const ch=Math.round(crop.h*fc.height)||fc.height;
    const fc2=document.createElement('canvas');
    fc2.width=cw;fc2.height=ch;
    const ctx2=fc2.getContext('2d');
    // Step 3: apply colour filter
    const filterStr=getCSSFilter();
    if(filterStr!=='none') ctx2.filter=filterStr;
    ctx2.drawImage(fc,cx,cy,cw,ch,0,0,cw,ch);
    fc2.toBlob(blob=>{if(blob) onSave(blob);},'image/jpeg',0.88);
  }

  const sliders=[
    {label:'Brightness',val:brightness,set:(v)=>{snapshot();setBrightness(v);},icon:'☀',tip:'Adjusts the overall lightness or darkness of the image.'},
    {label:'Contrast',val:contrast,set:(v)=>{snapshot();setContrast(v);},icon:'◑'},
    {label:'Saturation',val:saturation,set:(v)=>{snapshot();setSaturation(v);},icon:'❋'},
  ];

  // Crop handle positions: corners + edge midpoints
  const cropHandles=[
    {id:'tl',x:crop.x,y:crop.y,cursor:'nw-resize'},
    {id:'tr',x:crop.x+crop.w,y:crop.y,cursor:'ne-resize'},
    {id:'bl',x:crop.x,y:crop.y+crop.h,cursor:'sw-resize'},
    {id:'br',x:crop.x+crop.w,y:crop.y+crop.h,cursor:'se-resize'},
    {id:'t',x:crop.x+crop.w/2,y:crop.y,cursor:'n-resize'},
    {id:'b',x:crop.x+crop.w/2,y:crop.y+crop.h,cursor:'s-resize'},
    {id:'l',x:crop.x,y:crop.y+crop.h/2,cursor:'w-resize'},
    {id:'r',x:crop.x+crop.w,y:crop.y+crop.h/2,cursor:'e-resize'},
  ];

  const CropIcon=()=>(
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
      <path d="M6 2v14a2 2 0 002 2h14"/><path d="M18 22V8a2 2 0 00-2-2H2"/>
    </svg>
  );

  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:9000,background:'#060606',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'DM Sans',sans-serif"}}
      onClick={e=>e.stopPropagation()}>

      {/* Canvas with CSS filter for live preview */}
      <div style={{position:'relative',display:'inline-block'}}>
        <canvas ref={canvasRef}
          style={{display:'block',borderRadius:3,filter:getCSSFilter(),maxWidth:'100%',maxHeight:'100%'}}/>

        {/* Crop overlay — only shown in crop mode */}
        {cropMode&&canvasRect&&(()=>{
          const cw=canvasRect.width, ch=canvasRect.height;
          const ol=canvasRef.current?canvasRef.current.offsetLeft:0;
          const ot=canvasRef.current?canvasRef.current.offsetTop:0;
          return(
            <div style={{position:'absolute',inset:0,zIndex:3,overflow:'visible'}}>
              {/* Dark overlay outside crop box */}
              <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
                <defs>
                  <mask id="cmask">
                    <rect width="100%" height="100%" fill="white"/>
                    <rect x={(crop.x*100)+'%'} y={(crop.y*100)+'%'} width={(crop.w*100)+'%'} height={(crop.h*100)+'%'} fill="black"/>
                  </mask>
                </defs>
                <rect width="100%" height="100%" fill="rgba(0,0,0,0.55)" mask="url(#cmask)"/>
                {/* Rule of thirds */}
                {[1/3,2/3].map(p=>(
                  <React.Fragment key={p}>
                    <line x1={(crop.x+crop.w*p)*100+'%'} y1={(crop.y*100)+'%'} x2={(crop.x+crop.w*p)*100+'%'} y2={((crop.y+crop.h)*100)+'%'} stroke="rgba(245,158,11,0.3)" strokeWidth="1"/>
                    <line x1={(crop.x*100)+'%'} y1={(crop.y+crop.h*p)*100+'%'} x2={((crop.x+crop.w)*100)+'%'} y2={(crop.y+crop.h*p)*100+'%'} stroke="rgba(245,158,11,0.3)" strokeWidth="1"/>
                  </React.Fragment>
                ))}
                {/* Crop border */}
                <rect x={(crop.x*100)+'%'} y={(crop.y*100)+'%'} width={(crop.w*100)+'%'} height={(crop.h*100)+'%'} fill="none" stroke={AMBER} strokeWidth="0.75"/>
              </svg>
              {/* Move handle (drag inside box) */}
              <div onMouseDown={e=>cropHandleMouseDown(e,'move')}
                style={{position:'absolute',left:(crop.x*100)+'%',top:(crop.y*100)+'%',width:(crop.w*100)+'%',height:(crop.h*100)+'%',cursor:'move',zIndex:4}}/>
              {/* Photoshop-style L-shaped corner marks + thin edge lines */}
              <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:5}} overflow="visible">
                {/* Corner L-marks */}
                {[
                  {x:crop.x,y:crop.y,dx:1,dy:1},
                  {x:crop.x+crop.w,y:crop.y,dx:-1,dy:1},
                  {x:crop.x,y:crop.y+crop.h,dx:1,dy:-1},
                  {x:crop.x+crop.w,y:crop.y+crop.h,dx:-1,dy:-1}
                ].map((c,i)=>{
                  const px=c.x*100+'%', py=c.y*100+'%';
                  const L=12;
                  return(
                    <g key={i}>
                      <line x1={px} y1={py} x2={'calc('+px+' + '+(c.dx*L)+'px)'} y2={py} stroke={AMBER} strokeWidth="2.5" strokeLinecap="round"/>
                      <line x1={px} y1={py} x2={px} y2={'calc('+py+' + '+(c.dy*L)+'px)'} stroke={AMBER} strokeWidth="2.5" strokeLinecap="round"/>
                    </g>
                  );
                })}
                {/* Edge midpoint lines */}
                {[
                  {x:(crop.x+crop.w/2)*100+'%',y:crop.y*100+'%',horiz:true},
                  {x:(crop.x+crop.w/2)*100+'%',y:(crop.y+crop.h)*100+'%',horiz:true},
                  {x:crop.x*100+'%',y:(crop.y+crop.h/2)*100+'%',horiz:false},
                  {x:(crop.x+crop.w)*100+'%',y:(crop.y+crop.h/2)*100+'%',horiz:false},
                ].map((e,i)=>(
                  <line key={'e'+i}
                    x1={e.horiz?'calc('+e.x+' - 8px)':e.x} y1={e.horiz?e.y:'calc('+e.y+' - 8px)'}
                    x2={e.horiz?'calc('+e.x+' + 8px)':e.x} y2={e.horiz?e.y:'calc('+e.y+' + 8px)'}
                    stroke={AMBER} strokeWidth="2" strokeLinecap="round"/>
                ))}
              </svg>
              {/* Invisible hit areas for handles */}
              {cropHandles.map(h=>(
                <div key={h.id} onMouseDown={e=>cropHandleMouseDown(e,h.id)}
                  style={{position:'absolute',left:(h.x*100)+'%',top:(h.y*100)+'%',
                    width:20,height:20,background:'transparent',
                    transform:'translate(-50%,-50%)',cursor:h.cursor,zIndex:6}}/>
              ))}
            </div>
          );
        })()}
      </div>

      {!imgReady&&<div style={{position:'absolute',color:'rgba(245,158,11,0.7)',fontSize:13,fontWeight:700,letterSpacing:'.06em'}}>Loading…</div>}

      {/* Floating draggable panel */}
      <div style={{position:'absolute',left:panelPos.x,top:panelPos.y,zIndex:10,width:288,
        background:'rgba(10,10,10,0.97)',border:'1px solid rgba(245,158,11,0.22)',
        borderRadius:14,boxShadow:'0 12px 48px rgba(0,0,0,0.9)',overflow:'hidden',userSelect:'none'}}>

        {/* Drag handle / header */}
        <div onMouseDown={onPanelDragStart}
          style={{display:'flex',alignItems:'center',justifyContent:'space-between',
            padding:'9px 12px',borderBottom:'1px solid rgba(245,158,11,0.12)',
            background:'rgba(245,158,11,0.06)',cursor:'grab'}}>
          <span style={{fontSize:10,fontWeight:800,letterSpacing:'.1em',color:AMBER}}>✦ PHOTO EDITOR{batchLabel?' · '+batchLabel:''}</span>
          <div style={{display:'flex',gap:5}}>
            {onPrev&&<button onClick={onPrev} style={{fontSize:9,padding:'2px 8px',borderRadius:6,border:'1px solid rgba(255,255,255,0.12)',background:'transparent',color:'rgba(255,255,255,0.5)',cursor:'pointer'}}>← Prev</button>}
            {onNext&&<button onClick={onNext} style={{fontSize:9,padding:'2px 8px',borderRadius:6,border:'1px solid rgba(255,255,255,0.12)',background:'transparent',color:'rgba(255,255,255,0.5)',cursor:'pointer'}}>Next →</button>}
            <button onClick={undo} disabled={!history.length}
              style={{fontSize:9,padding:'2px 8px',borderRadius:6,border:'1px solid rgba(255,255,255,0.12)',background:'transparent',color:history.length?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.15)',cursor:history.length?'pointer':'default'}}>
              ↩ Undo
            </button>
            <button onClick={onClose} disabled={uploading}
              style={{fontSize:9,padding:'2px 7px',borderRadius:6,border:'1px solid rgba(255,255,255,0.12)',background:'transparent',color:'rgba(255,255,255,0.4)',cursor:'pointer'}}>✕</button>
            <button onClick={handleSave} disabled={uploading}
              style={{fontSize:9,fontWeight:800,padding:'2px 10px',borderRadius:6,border:'none',background:uploading?'rgba(245,158,11,0.35)':AMBER,color:'#060606',cursor:uploading?'wait':'pointer'}}>
              {uploading?'…':'Save'}
            </button>
          </div>
        </div>

        <div style={{padding:'11px 13px',display:'flex',flexDirection:'column',gap:11}}>

          {/* Transform */}
          <div>
            <div style={{fontSize:8,fontWeight:700,color:'rgba(255,255,255,0.25)',letterSpacing:'.09em',textTransform:'uppercase',marginBottom:6}}>Transform</div>
            <div style={{display:'flex',gap:5}}>
              {[{label:'↺ 90°',fn:()=>rotate90(-1)},{label:'↻ 90°',fn:()=>rotate90(1)},{label:'⇄ Flip',fn:doFlip}].map(b=>(
                <button key={b.label} onClick={b.fn}
                  style={{flex:1,fontSize:10,fontWeight:700,padding:'7px 0',borderRadius:8,border:'1px solid rgba(255,255,255,0.09)',background:'rgba(255,255,255,0.03)',color:'rgba(255,255,255,0.6)',cursor:'pointer',transition:'all .12s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=AMBER;e.currentTarget.style.color=AMBER;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,0.09)';e.currentTarget.style.color='rgba(255,255,255,0.6)';}}>
                  {b.label}
                </button>
              ))}
            </div>
          </div>

          {/* Sliders */}
          <div>
            <div style={{fontSize:8,fontWeight:700,color:'rgba(255,255,255,0.25)',letterSpacing:'.09em',textTransform:'uppercase',marginBottom:8}}>Adjust</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {sliders.map(s=>(
                <div key={s.label}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>

                    onChange={e=>s.set(Number(e.target.value))}
                    style={{width:'100%',opacity:0,height:20,cursor:'pointer',position:'relative',zIndex:1,marginTop:-18,display:'block'}}/>
                </div>
              ))}
            </div>
          </div>

          {/* Crop toggle */}
          <div style={{borderTop:'1px solid rgba(255,255,255,0.05)',paddingTop:10,display:'flex',gap:5}}>
            <button onClick={()=>{if(!cropMode){snapshot();setCropAndNotify({x:0,y:0,w:1,h:1});}setCropMode(v=>!v);}}
              style={{flex:1,fontSize:10,fontWeight:700,padding:'7px 0',borderRadius:8,cursor:'pointer',transition:'all .15s',
                display:'flex',alignItems:'center',justifyContent:'center',gap:5,
                border:'1px solid',
                borderColor:cropMode?AMBER:'rgba(255,255,255,0.09)',
                background:cropMode?'rgba(245,158,11,0.1)':'rgba(255,255,255,0.03)',
                color:cropMode?AMBER:'rgba(255,255,255,0.5)'}}>
              <CropIcon/>{cropMode?'Crop active':'Crop'}
            </button>
            {cropMode&&<button onClick={()=>{setCropAndNotify({x:0,y:0,w:1,h:1});}}  
              style={{fontSize:9,padding:'6px 10px',borderRadius:8,border:'1px solid rgba(245,158,11,0.25)',background:'transparent',color:'rgba(245,158,11,0.7)',cursor:'pointer'}}>
              Reset
            </button>}
          </div>
          {/* Fine rotation slider — shown when crop is active */}
          {cropMode&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.04)'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:9,color:'rgba(255,255,255,0.45)'}}>↻ Straighten</span>
              <span style={{fontSize:9,fontWeight:700,color:fineRotation!==0?AMBER:'rgba(255,255,255,0.2)'}}>{fineRotation>0?'+':''}{fineRotation}°</span>
            </div>
            <div style={{position:'relative',height:6,borderRadius:6,background:'rgba(255,255,255,0.08)',marginBottom:2}}>
              <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:1,background:'rgba(255,255,255,0.15)'}}/>
              <div style={{position:'absolute',borderRadius:6,background:AMBER,
                left:fineRotation<0?(50+fineRotation/45*50)+'%':'50%',
                width:Math.abs(fineRotation)/45*50+'%',top:0,bottom:0,opacity:0.85}}/>
              <div style={{position:'absolute',top:'50%',
                left:'calc('+((fineRotation+45)/90*100)+'% - 8px)',
                width:16,height:16,borderRadius:'50%',
                background:AMBER,border:'2px solid #060606',
                transform:'translateY(-50%)',boxShadow:'0 1px 6px rgba(0,0,0,0.6)',
                pointerEvents:'none'}}/>
            </div>
            <input type="range" min={-45} max={45} value={fineRotation}
              onChange={e=>{snapshot();setFineRotation(Number(e.target.value));}}
              style={{width:'100%',opacity:0,height:20,cursor:'pointer',position:'relative',zIndex:1,marginTop:-18,display:'block'}}/>
          </div>}

          {/* Reset all */}
          <button onClick={reset}
            style={{fontSize:9,fontWeight:700,padding:'5px 0',borderRadius:8,border:'1px solid rgba(255,255,255,0.07)',background:'transparent',color:'rgba(255,255,255,0.2)',cursor:'pointer',letterSpacing:'.05em',textTransform:'uppercase'}}>
            ↺ Reset all
          </button>

        </div>
      </div>
    </div>,
    document.body
  );
}



// ── STUDENT PORTFOLIO LIGHTBOX ──
async function uploadPortfolioPhoto(file, sectionId, studentIdx){
  return new Promise(async(resolve,reject)=>{
    try{
      const img=new Image();
      const reader=new FileReader();
      reader.onload=e=>{
        img.onload=()=>{
          const MAX=1600;
          let w=img.width,h=img.height;
          if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
          const canvas=document.createElement('canvas');
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          canvas.toBlob(async blob=>{
            try{
              const ts=Date.now();
              const ref=window._storage.ref(`portfolio/${sectionId}/${studentIdx}/${ts}.jpg`);
              await ref.put(blob,{contentType:'image/jpeg'});
              const url=await ref.getDownloadURL();
              resolve(url);
            }catch(err){reject(err);}
          },'image/jpeg',0.92);
        };
        img.src=e.target.result;
      };
      reader.readAsDataURL(file);
    }catch(err){reject(err);}
  });
}

function StudentPortfolio({studentIdx,student,sectionId,updateData,onClose}){
  const portfolio=student.portfolio||[];
  const [active,setActive]=React.useState(portfolio.length>0?portfolio.length-1:0);
  const [fullscreen,setFullscreen]=React.useState(false);
  const [uploading,setUploading]=React.useState(false);
  const [editCaption,setEditCaption]=React.useState(null);
  const [photoEditorOpen,setPhotoEditorOpen]=React.useState(false);
  const [photoEditorUploading,setPhotoEditorUploading]=React.useState(false);
  const [savedCrop,setSavedCrop]=React.useState({x:0,y:0,w:1,h:1});
  const [captionVal,setCaptionVal]=React.useState('');
  const [artworkTags,setArtworkTagsState]=React.useState(getArtworkTags);
  const [showAddArtTag,setShowAddArtTag]=React.useState(false);
  const [editTagMode,setEditTagMode]=React.useState(false);
  const [newArtTagLabel,setNewArtTagLabel]=React.useState('');
  const [newArtTagColor,setNewArtTagColor]=React.useState('green');
  const fileInputRef=React.useRef(null);
  const overlayRef=React.useRef(null);
  const allLessons=React.useMemo(()=>PHASES.flatMap(ph=>ph.sessions.map(s=>({n:s.n,title:s.title,color:ph.color,phaseId:ph.id}))),[]);
  const fullscreenRef=React.useRef(fullscreen);
  const editCaptionRef=React.useRef(editCaption);
  const portfolioLenRef=React.useRef(portfolio.length);
  React.useEffect(()=>{fullscreenRef.current=fullscreen;},[fullscreen]);
  React.useEffect(()=>{editCaptionRef.current=editCaption;},[editCaption]);
  React.useEffect(()=>{portfolioLenRef.current=(student.portfolio||[]).length;},[student.portfolio]);

  React.useEffect(()=>{
    if(portfolio.length>0&&active>=portfolio.length) setActive(portfolio.length-1);
  },[portfolio.length]);

  React.useEffect(()=>{
    function onKey(e){
      if(editCaptionRef.current!==null) return;
      if(e.key==='ArrowLeft'){e.preventDefault();setActive(p=>Math.max(0,p-1));}
      if(e.key==='ArrowRight'){e.preventDefault();setActive(p=>Math.min(portfolioLenRef.current-1,p+1));}
      if(e.key==='Escape'){if(fullscreenRef.current)setFullscreen(false);else onClose();}
      if(e.key==='f'||e.key==='F') setFullscreen(v=>!v);
    }
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[onClose]);

  async function handlePhotoEdit(blob){
    const activeAtSave=active;
    const localUrl=URL.createObjectURL(blob);
    updateData(d=>{const p=d.students[studentIdx].portfolio;if(p&&p[activeAtSave]) p[activeAtSave].url=localUrl;});
    setPhotoEditorOpen(false);
    setPhotoEditorUploading(true);
    try{
      const ts=Date.now();
      const ref=window._storage.ref('portfolio/'+sectionId+'/'+studentIdx+'/edited_'+ts+'.jpg');
      await ref.put(blob,{contentType:'image/jpeg'});
      const url=await ref.getDownloadURL();
      updateData(d=>{const p=d.students[studentIdx].portfolio;if(p&&p[activeAtSave]) p[activeAtSave].url=url;});
    }catch(err){alert('Save failed: '+err.message);}
    setPhotoEditorUploading(false);
  }

  async function handleUpload(e){
    const files=Array.from(e.target.files||[]);
    if(!files.length) return;
    setUploading(true);
    try{
      for(const file of files){
        const url=await uploadPortfolioPhoto(file,sectionId,studentIdx);
        const date=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
        updateData(d=>{
          if(!d.students[studentIdx].portfolio) d.students[studentIdx].portfolio=[];
          d.students[studentIdx].portfolio.push({url,date,caption:'',type:'artwork',lessons:[],artTags:[],review:''});
        });
        setActive((student.portfolio||[]).length);
      }
    }catch(err){alert('Upload failed: '+err.message);}
    setUploading(false);
    e.target.value='';
  }

  function handleDelete(idx){
    if(!window.confirm('Delete this photo from the portfolio?')) return;
    updateData(d=>{d.students[studentIdx].portfolio.splice(idx,1);});
    setActive(p=>Math.max(0,p-1));
  }

  function saveCaption(idx){
    updateData(d=>{d.students[studentIdx].portfolio[idx].caption=captionVal;});
    setEditCaption(null);
  }

  function updateField(idx,field,val){
    updateData(d=>{d.students[studentIdx].portfolio[idx][field]=val;});
  }

  function toggleLesson(idx,lessonN){
    const curr=(portfolio[idx]&&portfolio[idx].lessons)||[];
    const next=curr.includes(lessonN)?curr.filter(l=>l!==lessonN):[...curr,lessonN];
    updateField(idx,'lessons',next);
  }

  function toggleArtTag(idx,label){
    const curr=(portfolio[idx]&&portfolio[idx].artTags)||[];
    const next=curr.includes(label)?curr.filter(t=>t!==label):[...curr,label];
    updateField(idx,'artTags',next);

    const next=[...artworkTags,{label:newArtTagLabel.trim(),color:newArtTagColor}];

    saveArtworkTags(next);
    setNewArtTagLabel('');setShowAddArtTag(false);

      </div>,

        {/* Header — name + close only, no add/fullscreen buttons here */}

          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:16}}>&#x1F5BC;</span>
            <span style={{fontFamily:"'Fraunces',serif",fontSize:14,fontWeight:700,color:'var(--tx)'}}>{student.name}</span>

// ── COMBINED OBSERVATION POPUP (history + add new) ──
function CombinedObsPopup({studentIdx,student,artfilePending,observations,totalSessions,attendanceCount,onSave,onDeleteObs,onToggleArtfile,onClearEscalation,onPhotoChange,onClose,editMode,customTags,onAddCustomTag,onDeleteCustomTag}){
  const [tab,setTab]=React.useState('add'); // 'add' | 'history' | 'profile'
  const [thumb,setThumb]=React.useState(null);
  const [selTags,setSelTags]=React.useState([]);
  const [note,setNote]=React.useState('');
  const [showAddTag,setShowAddTag]=React.useState(false);
  const [newTagLabel,setNewTagLabel]=React.useState('');
  const [newTagColor,setNewTagColor]=React.useState('green');
  const today=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  const obs=observations||[];
  const hasEscalation=obs.some(o=>o.escalation&&!o.escalationCleared);
  const allTags=[...OBS_TAGS,...(customTags||[])];

  function toggleTag(label){setSelTags(prev=>prev.includes(label)?prev.filter(t=>t!==label):[...prev,label]);}
  function handleSave(){
    if(!thumb&&selTags.length===0&&!note.trim()) return;
    const isEscalation=selTags.includes('Bunking')||selTags.includes('Disruptive')||selTags.includes('Refuses to participate');
    onSave({thumb,tags:selTags,note:note.trim(),date:today,escalation:isEscalation});
    setThumb(null);setSelTags([]);setNote('');
    setTab('history');
  }
  function handleAddCustomTag(){
    if(!newTagLabel.trim())return;
    if(onAddCustomTag) onAddCustomTag({label:newTagLabel.trim(),color:newTagColor});
    setNewTagLabel('');setNewTagColor('green');setShowAddTag(false);
  }

  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div className="obs-popup" style={{height:540,display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}

          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {student.photo&&<div style={{width:52,height:52,borderRadius:'50%',overflow:'hidden',flexShrink:0,border:'2px solid var(--glass-border2)'}}><img src={student.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/></div>}

          <div style={{display:'flex',alignItems:'center',gap:8}}>

            <span style={{fontSize:11,fontWeight:700,color:'var(--coral)'}}>⚠️ Escalation flagged</span>

                    <span key={c} onClick={()=>setNewTagColor(c)}

                        border:`1.5px solid ${c==='green'?'var(--teal)':c==='yellow'?'var(--yellow)':'var(--coral)'}`,
                        color:c==='green'?'var(--teal)':c==='yellow'?'var(--yellow)':'var(--coral)',
