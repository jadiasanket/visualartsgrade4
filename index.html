// Inline profile (no overlay, used inside combined popup)
function StudentProfileModal({student,attendanceCount,totalSessions,onClose,inline}){
  const [profile,setProfile]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const obs=student.observations||[];
  const allTags=obs.flatMap(o=>o.tags||[]);
  const tagFreq={};
  allTags.forEach(t=>{tagFreq[t]=(tagFreq[t]||0)+1;});
  const topTags=Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t])=>t);
  const thumbsUp=obs.filter(o=>o.thumb==='up').length;
  const thumbsDown=obs.filter(o=>o.thumb==='down').length;
  const escalations=obs.filter(o=>o.escalation&&!o.escalationCleared).length;
  const notes=obs.filter(o=>o.note).map(o=>o.note);

  async function generateProfile(){
    setLoading(true);setProfile('');
    const prompt=`You are a warm, encouraging art teacher writing a brief student profile for a Grade 4 student. Tone: supportive, positive, growth-focused. Mention concerns very gently as areas of growth, never harshly.

Student: ${student.name}
Attendance: ${attendanceCount}/${totalSessions} sessions
Positive signals: ${thumbsUp} thumbs up, ${thumbsDown} thumbs down
Top observed traits: ${topTags.join(', ')||'Not enough data yet'}
Escalation incidents: ${escalations}
Recent teacher notes: ${notes.slice(-3).join(' | ')||'None recorded'}

Write 3-4 sentences. Start with a genuine strength. Mention attendance naturally. If concerns exist, frame as growth opportunities. End encouragingly.`;

    try{
      const gKey=getGeminiKey();
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${gKey}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:300}})
      });
      const data=await res.json();
      setProfile(data.candidates?.[0]?.content?.parts?.[0]?.text||'Could not generate. Check your API key.');
    }catch{setProfile('Error generating profile.');}
    setLoading(false);
  }

  const inner=(
    <div style={{flex:1,overflowY:'auto'}}>
      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[{l:'Attendance',v:`${attendanceCount}/${totalSessions}`},{l:'Observations',v:obs.length},{l:'👍/👎',v:`${thumbsUp}/${thumbsDown}`},{l:'Flags',v:escalations}].map((s,i)=>(
          <div key={i} style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',borderRadius:8,padding:'7px 10px',textAlign:'center',flex:1}}>
            <div style={{fontSize:9,color:'var(--tx3)',marginBottom:1}}>{s.l}</div>
            <div style={{fontSize:14,fontWeight:800,color:'var(--tx)'}}>{s.v}</div>
          </div>
        ))}
      </div>
      {topTags.length>0&&(
        <div style={{marginBottom:10,display:'flex',flexWrap:'wrap',gap:4}}>
          {topTags.map((t,i)=>{
            const td=OBS_TAGS.find(x=>x.label===t);
            const colors={green:'var(--teal)',yellow:'var(--yellow)',red:'var(--coral)'};
            return<span key={i} style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:10,background:'var(--glass-bg)',border:'1px solid var(--glass-border)',color:colors[td?td.color:'yellow']||'var(--tx2)'}}>{t}</span>;
          })}
        </div>
      )}
      <div style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',borderRadius:10,padding:'10px 12px',minHeight:70,marginBottom:10,fontSize:13,color:profile?'var(--tx)':'var(--tx3)',lineHeight:1.6,fontStyle:profile?'normal':'italic'}}>
        {loading?'Generating...':profile||'Click below to generate an AI student profile.'}
      </div>
      <button className="obs-save-btn" onClick={generateProfile} disabled={loading} style={{opacity:loading?0.6:1}}>
        {loading?'Generating...':`✨ Generate Profile`}
      </button>
    </div>
  );

  if(inline) return inner;
  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div className="obs-history-popup" onClick={e=>e.stopPropagation()}>{inner}</div>
    </div>
  );
}


// ── ATTENDANCE PDF MODAL ──
function AttendancePDFModal({data,section,onClose}){
  const realSessions=data.sessions.filter(s=>!s.isDivider&&s.sessType!=='cancelled');

  // Extract unique months from session dates
  const monthSet=new Set();
  realSessions.forEach(s=>{
    // Try to parse a month out of the date string (e.g. "5 Apr", "Apr 5", "2 May")
    const parts=s.date.split(' ');
    const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    parts.forEach(p=>{
      if(monthNames.some(m=>p.startsWith(m))) monthSet.add(p.slice(0,3));
      else if(monthNames.includes(p)) monthSet.add(p);
    });
  });
  // Also add any months found via Date parsing
  const allMonths=Array.from(monthSet).length>0?Array.from(monthSet):['All'];
  const [selMonths,setSelMonths]=React.useState(new Set(allMonths));

  function toggleMonth(m){
    setSelMonths(prev=>{const n=new Set(prev);n.has(m)?n.delete(m):n.add(m);return n;});
  }

  function generatePDF(){
    const filteredSessions=allMonths.length===1&&allMonths[0]==='All'
      ?realSessions
      :realSessions.filter(s=>[...selMonths].some(m=>s.date.includes(m)));
    if(filteredSessions.length===0){alert('No sessions found for selected months.');return;}

    // Build a reliable lookup: for each filtered session, find its index in data.sessions
    // data.sessions may include dividers — match by object reference
    const allSessions=data.sessions||[];
    const filteredSessionIndices=filteredSessions.map(sess=>{
      const idx=allSessions.findIndex(s=>s===sess);
      return idx; // -1 if not found (shouldn't happen)
    });

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth();
    const pageH=doc.internal.pageSize.getHeight();
    const margin=30;
    const nameW=130;
    const attW=30;
    const availableW=pageW-margin*2-nameW-attW;
    // colW: at least 14pt so dates are readable, shrinks to fit many sessions
    const colW=Math.max(14,Math.min(32,Math.floor(availableW/filteredSessions.length)));
    const tableW=nameW+attW+filteredSessions.length*colW;
    const rowH=18;
    const headerRowH=filteredSessions.length>15?44:24; // taller header if dates need more space
    let y=margin+36;

    // ── Title block ──
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.setTextColor(30,30,40);
    doc.text(`${section.name} — Attendance Register`,margin,margin+14);
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.setTextColor(120,120,140);
    const monthLabel=allMonths[0]==='All'?'All sessions':[...selMonths].join(', ');
    doc.text(`${monthLabel}  ·  ${filteredSessions.length} session${filteredSessions.length!==1?'s':''}  ·  ${data.students.length} students  ·  Generated ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}`,margin,margin+26);

    // ── Header row ──
    doc.setFillColor(235,237,248);
    doc.rect(margin,y,tableW,headerRowH,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(50,50,70);
    doc.text('Student',margin+4,y+headerRowH/2+3);
    doc.text('Att.',margin+nameW+4,y+headerRowH/2+3);

    // Date headers
    filteredSessions.forEach((sess,i)=>{
      const x=margin+nameW+attW+i*colW+colW/2;
      const dateLines=doc.splitTextToSize(sess.date||'',colW-3);
      const lineH=8;
      const totalH=dateLines.length*lineH;
      const startTy=y+(headerRowH-totalH)/2+lineH*0.8;
      dateLines.forEach((dl,li)=>doc.text(dl,x,startTy+li*lineH,{align:'center'}));
    });
    // Column dividers in header
    doc.setDrawColor(210,213,230);doc.setLineWidth(0.5);
    doc.line(margin+nameW,y,margin+nameW,y+headerRowH);
    doc.line(margin+nameW+attW,y,margin+nameW+attW,y+headerRowH);
    filteredSessions.forEach((_,i)=>{
      const x=margin+nameW+attW+i*colW;
      doc.line(x,y,x,y+headerRowH);
    });
    doc.setDrawColor(190,193,215);doc.setLineWidth(1);
    doc.line(margin,y+headerRowH,margin+tableW,y+headerRowH);
    y+=headerRowH;

    // ── Student rows ──
    data.students.forEach((st,si)=>{
      if(y+rowH>pageH-margin){
        doc.addPage();
        y=margin;
        // Repeat header on new page
        doc.setFillColor(235,237,248);
        doc.rect(margin,y,tableW,16,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(50,50,70);
        doc.text('Student',margin+4,y+11);
        doc.text('Att.',margin+nameW+4,y+11);
        filteredSessions.forEach((sess,i)=>{
          const x=margin+nameW+attW+i*colW+colW/2;
          doc.text(sess.date||'',x,y+11,{align:'center',maxWidth:colW-2});
        });
        y+=16;
      }

      // Alternating row bg
      if(si%2===0){doc.setFillColor(250,251,255);doc.rect(margin,y,tableW,rowH,'F');}

      // Name
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,40);
      doc.text(st.name||'',margin+4,y+rowH/2+3,{maxWidth:nameW-8});

      // Attendance count
      const attCount=filteredSessionIndices.filter((realIdx)=>{
        const v=st.attendance&&realIdx>=0?st.attendance[realIdx]:null;
        return v==='present'||v==='late';
      }).length;
      doc.setFont('helvetica','bold');
      doc.text(`${attCount}/${filteredSessions.length}`,margin+nameW+4,y+rowH/2+3);

      // Per-session marks
      doc.setFont('helvetica','normal');
      filteredSessionIndices.forEach((realIdx,ci)=>{
        const v=realIdx>=0&&st.attendance?st.attendance[realIdx]:null;
        const x=margin+nameW+attW+ci*colW+colW/2;
        const ty=y+rowH/2+3;
        if(v==='present'){doc.setTextColor(46,160,130);doc.setFont('helvetica','bold');doc.text('P',x,ty,{align:'center'});}
        else if(v==='late'){doc.setTextColor(190,140,40);doc.setFont('helvetica','bold');doc.text('L',x,ty,{align:'center'});}
        else if(v==='absent'){doc.setTextColor(200,70,55);doc.setFont('helvetica','bold');doc.text('A',x,ty,{align:'center'});}
        else{doc.setTextColor(200,202,215);doc.setFont('helvetica','normal');doc.text('·',x,ty,{align:'center'});}
        doc.setTextColor(30,30,40);
      });

      // Row bottom border
      doc.setDrawColor(225,227,238);doc.setLineWidth(0.3);
      doc.line(margin,y+rowH,margin+tableW,y+rowH);
      y+=rowH;
    });

    // ── Legend ──
    y+=8;
    if(y+14<pageH-margin){
      doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(140,145,165);
      doc.text('P = Present  ·  L = Late  ·  A = Absent  ·  · = Not marked',margin,y);
    }

    doc.save(`${section.name.replace(/\s+/g,'-')}-Attendance-${new Date().toISOString().slice(0,10)}.pdf`);
    onClose();
  }

  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div className="add-session-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📥 Download Attendance PDF</div>
        <div style={{fontSize:12,color:'var(--tx3)',marginBottom:12}}>Select months to include. You can download multiple months together.</div>
        {allMonths[0]==='All'?(
          <div style={{fontSize:12,color:'var(--tx2)',marginBottom:12}}>All {realSessions.length} session{realSessions.length!==1?'s':''} will be included.</div>
        ):(
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
            {allMonths.map(m=>(
              <label key={m} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13,fontWeight:600,color:selMonths.has(m)?'var(--teal)':'var(--tx3)',background:selMonths.has(m)?'rgba(59,191,160,0.12)':'var(--glass-bg)',border:`1px solid ${selMonths.has(m)?'rgba(59,191,160,0.4)':'var(--glass-border)'}`,padding:'6px 14px',borderRadius:20,transition:'all .15s'}}>
                <input type="checkbox" checked={selMonths.has(m)} onChange={()=>toggleMonth(m)} style={{accentColor:'var(--teal)',display:'none'}}/>
                {m}
              </label>
            ))}
          </div>
        )}
        <div className="modal-actions">
          <button className="modal-btn" onClick={onClose}>Cancel</button>
          <button className="modal-btn primary" onClick={generatePDF} disabled={selMonths.size===0&&allMonths[0]!=='All'}>Download PDF</button>
        </div>
      </div>
    </div>
  );
}

// ── CLASS PHOTO VIEW ──
function PvPhotoArea({st,idx,editPhotos,updateData,section}){
  const areaRef=React.useRef(null);
  const pvOffX=st.pvOffsetX||0;
  const pvOffY=st.pvOffsetY||0;
  const pvScale=st.pvScale||1;
  // Non-passive wheel — must use ref to call preventDefault
  React.useEffect(()=>{
    const el=areaRef.current; if(!el) return;
    function onWheel(e){
      if(!editPhotos) return;
      e.preventDefault();
      updateData(d=>{d.students[idx].pvScale=Math.max(0.5,Math.min(3,(d.students[idx].pvScale||1)-e.deltaY*0.003));});
    }
    el.addEventListener('wheel',onWheel,{passive:false});
    return()=>el.removeEventListener('wheel',onWheel);
  },[editPhotos,idx]);
  function pvDragStart(e){
    if(!editPhotos) return;
    e.preventDefault();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const startX=clientX-pvOffX, startY=clientY-pvOffY;
    function onMove(ev){
      const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
      const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
      updateData(d=>{d.students[idx].pvOffsetX=cx-startX;d.students[idx].pvOffsetY=cy-startY;});
    }
    function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);window.removeEventListener('touchmove',onMove);window.removeEventListener('touchend',onUp);}
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
    window.addEventListener('touchmove',onMove,{passive:false});window.addEventListener('touchend',onUp);
  }
  async function handlePhotoUpload(e){
    const file=e.target.files[0]; if(!file) return;
    try{
      const url=await uploadPhotoToStorage(file,section.id,idx);
      updateData(d=>{d.students[idx].photo=url;d.students[idx].pvOffsetX=0;d.students[idx].pvOffsetY=0;d.students[idx].pvScale=1;});
    }catch(err){console.error('Photo upload failed',idx,err);}
    e.target.value='';
  }
  return(
    <div ref={areaRef} style={{width:'100%',height:'100%',position:'relative',
      background:'linear-gradient(180deg,#dedad3 0%,#c4bab0 100%)',
      cursor:editPhotos?'grab':'pointer'}}
      onMouseDown={editPhotos?pvDragStart:undefined}
      onTouchStart={editPhotos?pvDragStart:undefined}>
      {st.photo
        ?<img src={st.photo} draggable={false}
            style={{position:'absolute',bottom:0,left:'50%',
              width:'auto',height:'100%',maxWidth:'none',
              transform:`translateX(-50%) translateX(${pvOffX}px) translateY(${pvOffY}px) scale(${pvScale})`,
              transformOrigin:'bottom center',
              pointerEvents:'none',userSelect:'none'}}/>
        :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:52,opacity:0.3}}>👤</div>
      }
      {editPhotos&&<>
        <div style={{position:'absolute',inset:0,border:'2px dashed rgba(250,204,21,0.6)',borderRadius:16,pointerEvents:'none',zIndex:5}}/>
        <label htmlFor={`pv-photo-${idx}`}
          style={{position:'absolute',top:6,right:6,zIndex:6,fontSize:9,fontWeight:700,
            padding:'3px 8px',borderRadius:6,cursor:'pointer',letterSpacing:'.03em',
            background:'rgba(0,0,0,0.55)',color:'rgba(255,255,255,0.9)',backdropFilter:'blur(4px)'}}>
          📷 {st.photo?'Change':'Add'}
        </label>
        <input id={`pv-photo-${idx}`} type="file" accept="image/*" style={{display:'none'}}
          onChange={handlePhotoUpload}/>
      </>}
    </div>
  );
}
function ClassPhotoView({data,section,teacherMode,onObsPopup,onClose,updateData,cycleAtt,lastSessionIdx,getObsColor}){
  const [flipped,setFlipped]=React.useState(null);
  const [savedTag,setSavedTag]=React.useState(null);
  const [hintDone,setHintDone]=React.useState(false);
  const [hintIdx,setHintIdx]=React.useState(null);
  const [sbLeft,setSbLeft]=React.useState(236);
  const [editPhotos,setEditPhotos]=React.useState(false); // global photo edit mode

  React.useEffect(()=>{
    let debounceTimer=null;
    function measureSb(){
      const sb=document.querySelector('.sidebar');
      if(sb){
        const w=sb.getBoundingClientRect().width;
        setSbLeft(w>0?w:sb.classList.contains('collapsed')?60:236);
      }
    }
    function debouncedMeasure(){
      clearTimeout(debounceTimer);
      debounceTimer=setTimeout(measureSb,180);
    }
    measureSb();
    const sb=document.querySelector('.sidebar');
    let ro;
    if(sb&&window.ResizeObserver){
      ro=new ResizeObserver(debouncedMeasure);
      ro.observe(sb);
    }
    return()=>{if(ro)ro.disconnect();clearTimeout(debounceTimer);};
  },[]);

  // One-time hint: gently flip first card halfway and back
  React.useEffect(()=>{
    if(hintDone||data.students.length===0) return;
    const t1=setTimeout(()=>{
      // Find first card in sorted order
      const sorted=[...data.students.map((_,i)=>i)].sort((a,b)=>data.students[a].name.localeCompare(data.students[b].name));
      setHintIdx(sorted[0]);
    },700);
    const t2=setTimeout(()=>setHintIdx(null),1300);
    const t3=setTimeout(()=>setHintDone(true),1350);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);

  function handleTagSave(studentIdx,tag){
    updateData(d=>{
      if(!d.students[studentIdx].observations)d.students[studentIdx].observations=[];
      d.students[studentIdx].observations.push({
        text:tag.label,
        date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'}),

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 18px',borderBottom:'1px solid var(--glass-border)',background:'linear-gradient(to bottom, var(--glass-bg3), var(--glass-bg2))',backdropFilter:'blur(24px)',flexShrink:0}}>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:'var(--tx)'}}>🪪 {sectionName}</div>
        <div style={{fontSize:11,color:'var(--tx3)'}}>{editPhotos?'Drag to reposition · Scroll to zoom · Click 📷 to change':'Tap card to flip · Tap badge to cycle attendance'}</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {teacherMode&&<button onClick={()=>{setEditPhotos(v=>!v);setFlipped(null);}}
            style={{fontSize:11,fontWeight:700,padding:'5px 12px',borderRadius:8,cursor:'pointer',border:'1px solid',
              borderColor:editPhotos?'var(--teal)':'var(--glass-border)',
              background:editPhotos?'rgba(59,191,160,0.15)':'var(--glass-bg)',
              color:editPhotos?'var(--teal)':'var(--tx3)',letterSpacing:'.03em'}}>
            ✎ {editPhotos?'Done':'Edit Photos'}
          </button>}
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--tx3)',fontSize:20,cursor:'pointer',padding:'4px 10px',borderRadius:8}}>✕</button>
        </div>

        {[...data.students.map((st,idx)=>({st,idx}))].sort((a,b)=>a.st.name.localeCompare(b.st.name)).map(({st,idx})=>{
          const obs=st.observations||[];

          const flash=savedTag&&savedTag.idx===idx;

                    ))}

                  <button onClick={()=>setFlipped(null)} style={{flex:1,padding:'5px 0',borderRadius:7,border:'1px solid var(--glass-border)',background:'var(--glass-bg)',color:'var(--tx3)',fontSize:10,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>← Back</button>
                  {teacherMode&&<button onClick={()=>{setFlipped(null);onObsPopup(idx);}} style={{flex:1,padding:'5px 0',borderRadius:7,border:'none',background:'var(--teal)',color:'#fff',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>Full obs</button>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>,
    document.body
  );

function ClassReviewModal({data,section,onClose}){
  // Build a unified timeline: collect all dates that have either a class log or student observations
  const dateMap = {}; // date → {log, students:[{s, obs}]}

  // Add class logs
  (data.classLogs||[]).forEach(l => {
    if(!dateMap[l.date]) dateMap[l.date] = {log:null, students:[]};
    dateMap[l.date].log = l;
  });

  // Add student observations grouped by date
  data.students.forEach(s => {
    (s.observations||[]).forEach(o => {
      const d = o.date||'Unknown date';
      if(!dateMap[d]) dateMap[d] = {log:null, students:[]};
      // Check if this student already has an entry for this date
      let entry = dateMap[d].students.find(e=>e.name===s.name);
      if(!entry){ entry={name:s.name, photo:s.photo, obs:[]}; dateMap[d].students.push(entry); }
      entry.obs.push(o);
    });
  });

  // Sort dates newest first (try to parse, fall back to string sort)
  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function parseDate(str){
    if(!str) return 0;
    const parts=str.split(' ');
    let d=0,m=-1,y=new Date().getFullYear();
    parts.forEach(p=>{if(MONTHS[p]!==undefined)m=MONTHS[p];else if(/^\d{4}$/.test(p))y=parseInt(p);else if(/^\d+$/.test(p))d=parseInt(p);});
    return m>=0?new Date(y,m,d).getTime():0;
  }
  const dates = Object.keys(dateMap).sort((a,b)=>parseDate(b)-parseDate(a));

  const tagColors={green:'var(--teal)',yellow:'var(--yellow)',red:'var(--coral)'};

  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'var(--popup-bg)',border:'1px solid var(--glass-border2)',
        borderRadius:20,width:'min(620px,95vw)',maxHeight:'88vh',
        display:'flex',flexDirection:'column',boxShadow:'var(--glass-shadow2)',backdropFilter:'blur(24px)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px 14px',borderBottom:'1px solid var(--glass-border)',flexShrink:0}}>
          <div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:'var(--tx)'}}>📝 {section.name} — Class Review</div>
            <div style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>{dates.length} session{dates.length!==1?'s':''} with notes</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--tx3)',fontSize:18,cursor:'pointer',lineHeight:1}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'14px 22px 20px'}}>
          {dates.length===0&&(
            <div style={{textAlign:'center',color:'var(--tx3)',fontSize:13,padding:'40px 0'}}>No notes yet. Add class logs or student observations to see them here.</div>
          )}
          {dates.map(date=>{
            const {log,students}=dateMap[date];
            const ratingCol=log&&log.rating?(log.rating<=2?'var(--coral)':log.rating===3?'var(--yellow)':'var(--teal)'):'var(--tx3)';
            return(
              <div key={date} style={{marginBottom:20}}>
                {/* Date header */}
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{height:1,flex:1,background:'var(--glass-border)'}}/>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--tx2)',whiteSpace:'nowrap'}}>{date}</div>
                  {log&&log.rating>0&&<span style={{fontSize:13,color:ratingCol,fontWeight:700,letterSpacing:1}}>{'★'.repeat(log.rating)}</span>}
                  <div style={{height:1,flex:1,background:'var(--glass-border)'}}/>
                </div>

                {/* Class note */}
                {log&&log.note&&(
                  <div style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',borderRadius:10,padding:'9px 13px',marginBottom:10,fontSize:12,color:'var(--tx2)',lineHeight:1.55,fontStyle:'italic'}}>
                    💬 {log.note}
                  </div>
                )}

                {/* Students for this date */}
                {students.length>0&&(
                  <div style={{display:'flex',flexDirection:'column',gap:7}}>
                    {students.map((entry,ei)=>{
                      const hasEsc=entry.obs.some(o=>o.escalation&&!o.escalationCleared);
                      return(
                        <div key={ei} style={{display:'flex',gap:10,background:'var(--glass-bg)',border:`1px solid ${hasEsc?'rgba(232,112,90,0.35)':'var(--glass-border)'}`,borderRadius:10,padding:'9px 12px',alignItems:'flex-start'}}>
                          {/* Avatar */}
                          {entry.photo?(
                            <div style={{width:30,height:30,borderRadius:'50%',overflow:'hidden',flexShrink:0,marginTop:1}}>
                              <img src={entry.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                            </div>
                          ):(
                            <div style={{width:30,height:30,borderRadius:'50%',background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,marginTop:1}}>👤</div>
                          )}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:700,color:'var(--tx)',marginBottom:4}}>
                              {entry.name}{hasEsc?' ⚠️':''}
                            </div>
                            {entry.obs.map((o,oi)=>(
                              <div key={oi} style={{marginBottom:oi<entry.obs.length-1?6:0}}>
                                {/* Thumb + tags */}
                                <div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>
                                  {o.thumb&&<span style={{fontSize:13}}>{o.thumb==='up'?'👍':'👎'}</span>}
                                  {(o.tags||[]).map((t,ti)=>{
                                    const td=OBS_TAGS.find(x=>x.label===t);
                                    return<span key={ti} style={{fontSize:10,padding:'1px 7px',borderRadius:8,background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',color:tagColors[td?td.color:'yellow']||'var(--tx2)',fontWeight:600}}>{t}</span>;
                                  })}
                                </div>
                                {o.note&&<div style={{fontSize:11,color:'var(--tx3)',marginTop:3,lineHeight:1.45,fontStyle:'italic'}}>"{o.note}"</div>}
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  function getAvgRating(){

    if(!logs.length) return 0;
    return(logs.reduce((a,l)=>a+l.rating,0)/logs.length).toFixed(1);

  async function saveClassLog(){

    updateData(d=>{

  const [linkPickerCustomInput,setLinkPickerCustomInput]=React.useState(''); // for inline custom lesson add

  const [slideExpanded,setSlideExpanded]=React.useState(false);
  const [slideSession,setSlideSession]=React.useState(null);
  const [manualSlideOpen,setManualSlideOpen]=React.useState(false);
  const [manualEditMode,setManualEditMode]=React.useState(false);
  const [manualDraftTitle,setManualDraftTitle]=React.useState('');
  const [manualDraftActivity,setManualDraftActivity]=React.useState('');
  const [manualSlideIdx,setManualSlideIdx]=React.useState(null);
  const [sortBy,setSortBy]=React.useState('alpha-asc');
  const [editMode,setEditMode]=React.useState(false);
  const [subMode,setSubMode]=React.useState(false);
  const [showSubEntry,setShowSubEntry]=React.useState(false);
  const [showGenPIN,setShowGenPIN]=React.useState(false);
  const [showAttPDF,setShowAttPDF]=React.useState(false);
  const [showClassReview,setShowClassReview]=React.useState(false);
  const [undoObs,setUndoObs]=React.useState(null); // {obs, studentIdx, obsIdx, timer}
  const [photoUploading,setPhotoUploading]=React.useState(false);
  const [photoError,setPhotoError]=React.useState(null);

  function updateData(fn){setData(prev=>{
    // Shallow-clone root + deep-clone only students array (photos are URLs now, not large blobs)
    const next={...prev,students:(prev.students||[]).map(st=>({...st}))};
    if(prev.staffInfo) next.staffInfo={...prev.staffInfo};
    if(prev.sessions) next.sessions=[...prev.sessions];
    if(prev.classLogs) next.classLogs=[...prev.classLogs];
    fn(next);return next;
  });}


  // Show loading indicator while Firestore fetch is in progress
  if(fsLoading){
    return(
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,color:'var(--tx3)'}}>
        <div style={{fontSize:28,animation:'spin 1s linear infinite'}}>⏳</div>
        <div style={{fontSize:13,fontWeight:600}}>Loading {section.name}…</div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  function cycleAtt(studentIdx,sessionIdx){
    if(!userId&&!subMode){
      alert('Please sign in as teacher to save attendance. Changes made without signing in will not be saved.');
      return;
    }
    if(subMode){
      // Sub can only edit the column matching the linked PIN date
      const pinData=getSubPIN(section.id);
      if(pinData&&pinData.linkedDate){
        const linkedColIdx=data.sessions.findIndex(s=>!s.isDivider&&s.date===pinData.linkedDate);
        if(linkedColIdx===-1||sessionIdx!==linkedColIdx) return;
      }
      // Sub can only edit columns marked as 'sub' type
      const sess=data.sessions[sessionIdx];
      if(!sess||sess.sessType!=='sub') return;
    }
    updateData(d=>{
      const st=d.students[studentIdx];
      if(!st.attendance) st.attendance={};
      const cur=st.attendance[sessionIdx]||'empty';
      // Skip 'late' in the normal click cycle — late is long-press only
      const next={present:'absent',absent:'empty',empty:'present'}[cur]||'present';
      st.attendance[sessionIdx]=next;
    });
  }

  function setLate(studentIdx,sessionIdx){
    if(subMode){
      const sess=data.sessions[sessionIdx];
      if(!sess||sess.sessType!=='sub') return;
    }
    updateData(d=>{
      const st=d.students[studentIdx];
      if(!st.attendance) st.attendance={};
      st.attendance[sessionIdx]='late';
    });
  }

  function getAttCount(s){
    if(!s.attendance) return 0;
    // only count non-cancelled sessions
    return Object.keys(s.attendance).filter(ki=>{
      const sess=data.sessions[parseInt(ki)];
      return sess&&sess.sessType!=='cancelled'&&(s.attendance[ki]==='present'||s.attendance[ki]==='late');
    }).length;
  }

  function getObsColor(student){
    const obs=student.observations||[];
    if(obs.length===0) return 'empty';
    const lastObs=obs[obs.length-1];
    // Red tag = red
    const hasConcerning=(lastObs.tags||[]).some(t=>OBS_TAGS.find(td=>td.label===t&&td.color==='red'));
    if(hasConcerning) return 'red';
    // Yellow tag = yellow
    const hasYellow=(lastObs.tags||[]).some(t=>OBS_TAGS.find(td=>td.label===t&&td.color==='yellow'));
    if(hasYellow) return 'yellow';
    const sessions=data.sessions.filter(s=>!s.isDivider);
    if(sessions.length===0) return 'green';
    const lastObsSessionIdx=lastObs.sessionIdx!=null?lastObs.sessionIdx:sessions.length-1;
    const since=sessions.filter((_,i)=>i>lastObsSessionIdx).length;
    if(since<=1) return 'green';
    if(since<=3) return 'yellow';
    return 'red';
  }

  function handleSaveObs(studentIdx,obsData){
    updateData(d=>{
      const st=d.students[studentIdx];
      if(!st.observations) st.observations=[];
      const realSessions=d.sessions.filter(s=>!s.isDivider);
      obsData.sessionIdx=realSessions.length-1;
      st.observations.push(obsData);
    });
    setObsPopup(null);
  }
  function handleDeleteObs(studentIdx,obsIdx){
    const deletedObs=data.students[studentIdx].observations[obsIdx];
    setUndoObs({obs:deletedObs,studentIdx,obsIdx,timer:setTimeout(()=>setUndoObs(null),6000)});
    updateData(d=>{d.students[studentIdx].observations.splice(obsIdx,1);});
  }
  function handleUndoDeleteObs(){
    if(!undoObs) return;
    clearTimeout(undoObs.timer);
    updateData(d=>{d.students[undoObs.studentIdx].observations.splice(undoObs.obsIdx,0,undoObs.obs);});
    setUndoObs(null);
  }

  function handleToggleArtfile(studentIdx){
    updateData(d=>{d.students[studentIdx].artfilePending=!d.students[studentIdx].artfilePending;});

  function handleClearEscalation(studentIdx){
    updateData(d=>{
      const obs=d.students[studentIdx].observations||[];
      obs.forEach(o=>{if(o.escalation) o.escalationCleared=true;});
    });
  }

  function getSortedIndices(){
    const indices=data.students.map((_,i)=>i);
    if(sortBy==='alpha-asc') return [...indices].sort((a,b)=>data.students[a].name.localeCompare(data.students[b].name));
    if(sortBy==='alpha-desc') return [...indices].sort((a,b)=>data.students[b].name.localeCompare(data.students[a].name));
    if(sortBy==='att-desc') return [...indices].sort((a,b)=>getAttCount(data.students[b])-getAttCount(data.students[a]));
    if(sortBy==='att-asc') return [...indices].sort((a,b)=>getAttCount(data.students[a])-getAttCount(data.students[b]));
    if(sortBy==='obs-desc') return [...indices].sort((a,b)=>(data.students[b].observations||[]).length-(data.students[a].observations||[]).length);
    if(sortBy==='escalation') return [...indices].sort((a,b)=>{
      const ae=(data.students[a].observations||[]).some(o=>o.escalation&&!o.escalationCleared)?1:0;
      const be=(data.students[b].observations||[]).some(o=>o.escalation&&!o.escalationCleared)?1:0;
      return be-ae;
    });
    return indices;
  }

  const realSessions=data.sessions.filter(s=>!s.isDivider&&s.sessType!=='cancelled');

                <span style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>{s.name}</span>
              </div>

                      <div className="date-th-inner">

                            onChange={e=>setEditDateVal(e.target.value)}

                            onKeyDown={e=>{if(e.key==='Enter'){updateData(d=>{d.sessions[si].date=editDateVal||d.sessions[si].date;});setEditingDateIdx(null);}if(e.key==='Escape')setEditingDateIdx(null);}}/>
                        ):(

                        {teacherMode&&editMode&&(

                              onClick={e=>{e.stopPropagation();updateData(d=>{d.sessions[si].sessType=d.sessions[si].sessType==='sub'?'normal':'sub';});}}>

                            {sess.sessType!=='cancelled'&&(

{/* link picker removed — linking now done in AddSessionModal */}

      {showAttPDF&&teacherMode&&<AttendancePDFModal data={data} section={section} onClose={()=>setShowAttPDF(false)}/>}

      {photoUploading&&(

          <span>Observation deleted</span>
          <button onClick={handleUndoDeleteObs} style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,color:'var(--teal)',background:'none',border:'none',cursor:'pointer',padding:0}}>Undo</button>
          <button onClick={()=>{clearTimeout(undoObs.timer);setUndoObs(null);}} style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:'var(--tx3)',background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1}}>✕</button>
        </div>
      )}

  );
}

// ── GALLERY UPLOAD MODAL ──
function GalleryUpload({onClose,onDone,initialType,initialLesson,initialSection}){
  const AMBER='#f59e0b';
  const THUMB_SIZE=110; // left column thumbnail size

  // ── Queue ──
  const [queue,setQueue]=React.useState([]);
  const [saving,setSaving]=React.useState(false);
  const [selectedIdx,setSelectedIdx]=React.useState(0);

  // ── Global options ──
  const [globalType,setGlobalType]=React.useState(initialType||'artwork');
  const [globalSectionId,setGlobalSectionId]=React.useState(initialSection||G4_SECTIONS[0].id);
  const [globalLessonKey,setGlobalLessonKey]=React.useState(initialLesson||'');
  const customLessons=useCustomLessons();
  const allPhaseLessons=PHASES.flatMap(ph=>ph.sessions.map(s=>({key:`${ph.id}:${s.n}`,label:`S${s.n}: ${s.title}`})));
  const globalSection=G4_SECTIONS.find(s=>s.id===globalSectionId)||G4_SECTIONS[0];

  // ── Edit mode ──
  const [editMode,setEditMode]=React.useState(false);
  // Per-item edit params — keyed by queue index
  const [editParams,setEditParams]=React.useState({}); // {[idx]: {rotation,fineRotation,flipH,brightness,contrast,saturation,crop}}
  const [editHistory,setEditHistory]=React.useState({}); // {[idx]: [...snapshots]}
  // Live edit state for current item
  const [rotation,setRotation]=React.useState(0);
  const [fineRotation,setFineRotation]=React.useState(0);
  const [flipH,setFlipH]=React.useState(false);
  const [brightness,setBrightness]=React.useState(0);
  const [contrast,setContrast]=React.useState(0);
  const [saturation,setSaturation]=React.useState(0);
  const [crop,setCrop]=React.useState({x:0,y:0,w:1,h:1});
  const [cropMode,setCropMode]=React.useState(false);
  const [history,setHistory]=React.useState([]);
  const [autoEnhancing,setAutoEnhancing]=React.useState(false);

  // Canvas refs for edit preview
  const canvasRef=React.useRef(null);
  const baseImg=React.useRef(null);
  const [imgReady,setImgReady]=React.useState(false);
  const [canvasRect,setCanvasRect]=React.useState(null);
  const [dragging,setDragging]=React.useState(false);

  function makeItem(f){return{file:f,localUrl:URL.createObjectURL(f),studentIdx:0,status:'pending'};}
  function addFiles(files){
    const newItems=Array.from(files).map(makeItem);
    setQueue(prev=>{
      const next=[...prev,...newItems];
      if(prev.length===0) setSelectedIdx(0);
      return next;
    });
  }
  function handleDrop(e){e.preventDefault();if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);}
  function update(i,patch){setQueue(prev=>prev.map((item,idx)=>idx===i?{...item,...patch}:item));}
  function remove(i){
    setQueue(prev=>{
      const next=prev.filter((_,idx)=>idx!==i);
      setSelectedIdx(s=>Math.min(s,Math.max(0,next.length-1)));
      return next;
    });
    setEditMode(false);
  }

  // ── Load image for editing ──
  React.useEffect(()=>{
    if(!editMode||!queue[selectedIdx]) return;
    setImgReady(false);
    const url=queue[selectedIdx].localUrl;
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{baseImg.current=img;setImgReady(true);};
    img.onerror=()=>{
      fetch(url).then(r=>r.blob()).then(blob=>{
        const bu=URL.createObjectURL(blob);
        const img2=new Image();
        img2.onload=()=>{baseImg.current=img2;setImgReady(true);URL.revokeObjectURL(bu);};
        img2.src=bu;
      }).catch(()=>setImgReady(false));
    };
    img.src=url+'?t='+Date.now();
  },[editMode,selectedIdx,queue[selectedIdx]?.localUrl]);

  // Restore edit params when switching photos in edit mode
  React.useEffect(()=>{
    if(!editMode) return;
    const saved=editParams[selectedIdx];
    if(saved){
      setRotation(saved.rotation||0);setFineRotation(saved.fineRotation||0);
      setFlipH(saved.flipH||false);setBrightness(saved.brightness||0);
      setContrast(saved.contrast||0);setSaturation(saved.saturation||0);
      setCrop(saved.crop||{x:0,y:0,w:1,h:1});
    } else {
      setRotation(0);setFineRotation(0);setFlipH(false);
      setBrightness(0);setContrast(0);setSaturation(0);
      setCrop({x:0,y:0,w:1,h:1});
    }
    setHistory([]);setCropMode(false);
  },[editMode,selectedIdx]);

  // Redraw canvas
  React.useEffect(()=>{if(imgReady&&editMode) redrawCanvas();},[imgReady,rotation,fineRotation,flipH,editMode]);
  React.useEffect(()=>{
    if(imgReady&&editMode) setTimeout(()=>{if(canvasRef.current) setCanvasRect(canvasRef.current.getBoundingClientRect());},50);
  },[imgReady,rotation,editMode]);

  function getCSSFilter(){
    const b=brightness!==0?`brightness(${1+brightness/100})`:'';
    const c=contrast!==0?`contrast(${1+contrast/100})`:'';
    const s=saturation!==0?`saturate(${1+saturation/100})`:'';
    return[b,c,s].filter(Boolean).join(' ')||'none';
  }

  function redrawCanvas(){
    const canvas=canvasRef.current,img=baseImg.current;
    if(!canvas||!img) return;
    // Fill the preview area — max ~560×420 (popup centre minus panels)
    const maxW=560,maxH=420;
    const totalRot=rotation+fineRotation;
    const rad=totalRot*Math.PI/180;
    const rot90=(rotation===90||rotation===270);
    const baseW=rot90?img.height:img.width;
    const baseH=rot90?img.width:img.height;
    const scale=Math.min(maxW/baseW,maxH/baseH,1);
    canvas.width=Math.round(baseW*scale);
    canvas.height=Math.round(baseH*scale);
    const ctx=canvas.getContext('2d');
    ctx.save();ctx.translate(canvas.width/2,canvas.height/2);
    if(flipH) ctx.scale(-1,1);
    ctx.rotate(rad);
    ctx.drawImage(img,-Math.round(img.width*scale)/2,-Math.round(img.height*scale)/2,Math.round(img.width*scale),Math.round(img.height*scale));
    ctx.restore();
    requestAnimationFrame(()=>{if(canvasRef.current) setCanvasRect(canvasRef.current.getBoundingClientRect());});
  }

  function snapshot(){
    setHistory(h=>[...h,{rotation,fineRotation,flipH,brightness,contrast,saturation,crop:{...crop}}]);
  }
  function undo(){
    setHistory(h=>{
      if(!h.length) return h;
      const prev=h[h.length-1];
      setRotation(prev.rotation);setFineRotation(prev.fineRotation||0);setFlipH(prev.flipH);
      setBrightness(prev.brightness);setContrast(prev.contrast);setSaturation(prev.saturation);
      setCrop({...prev.crop});
      return h.slice(0,-1);
    });
  }
  function resetEdits(){setRotation(0);setFineRotation(0);setFlipH(false);setBrightness(0);setContrast(0);setSaturation(0);setCrop({x:0,y:0,w:1,h:1});setCropMode(false);setHistory([]);}

  // ── Auto-enhance: analyse histogram and apply brightness/contrast correction ──
  async function autoEnhance(){
    const img=baseImg.current;
    if(!img||autoEnhancing) return;
    setAutoEnhancing(true);
    snapshot();
    try{
      const tc=document.createElement('canvas');
      const maxS=400;
      const sc=Math.min(maxS/img.width,maxS/img.height,1);
      tc.width=Math.round(img.width*sc);tc.height=Math.round(img.height*sc);
      const ctx=tc.getContext('2d');
      ctx.drawImage(img,0,0,tc.width,tc.height);
      const data=ctx.getImageData(0,0,tc.width,tc.height).data;
      // Compute luminance histogram
      let sum=0,count=0,minL=255,maxL=0;
      for(let i=0;i<data.length;i+=4){
        const l=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
        sum+=l;count++;
        if(l<minL) minL=l;
        if(l>maxL) maxL=l;
      }
      const avgL=sum/count;
      // Target avg ~128, clamp correction
      const bCorr=Math.round(Math.max(-35,Math.min(35,(128-avgL)/2.2)));
      // Contrast: spread based on range (narrow range = low contrast)
      const range=maxL-minL;
      const cCorr=Math.round(Math.max(-20,Math.min(30,(200-range)/8)));
      setBrightness(bCorr);
      setContrast(cCorr);
    } catch(e){}
    setAutoEnhancing(false);
  }

  // ── Auto crop & straighten: use canvas entropy to detect border crops ──
  async function autoCropStraighten(){
    const img=baseImg.current;
    if(!img) return;
    snapshot();
    try{
      const tc=document.createElement('canvas');
      const sc=Math.min(600/img.width,600/img.height,1);
      tc.width=Math.round(img.width*sc);tc.height=Math.round(img.height*sc);
      const ctx=tc.getContext('2d');
      ctx.drawImage(img,0,0,tc.width,tc.height);
      const data=ctx.getImageData(0,0,tc.width,tc.height);
      const W=tc.width,H=tc.height;
      const px=(x,y)=>{const i=(y*W+x)*4;return[data.data[i],data.data[i+1],data.data[i+2]];};
      function rowVariance(y){
        let s=0,s2=0,n=W;
        for(let x=0;x<W;x++){const[r,g,b]=px(x,y);const l=0.299*r+0.587*g+0.114*b;s+=l;s2+=l*l;}
        return s2/n-(s/n)**2;
      }
      function colVariance(x){
        let s=0,s2=0,n=H;
        for(let y=0;y<H;y++){const[r,g,b]=px(x,y);const l=0.299*r+0.587*g+0.114*b;s+=l;s2+=l*l;}
        return s2/n-(s/n)**2;
      }
      const threshold=30; // low variance = likely border/plain edge
      let top=0,bottom=H-1,left=0,right=W-1;
      while(top<H/3&&rowVariance(top)<threshold) top++;
      while(bottom>2*H/3&&rowVariance(bottom)<threshold) bottom--;
      while(left<W/3&&colVariance(left)<threshold) left++;
      while(right>2*W/3&&colVariance(right)<threshold) right--;
      // Add 2% padding back
      const pad=0.02;
      const nx=Math.max(0,(left/W)-pad);
      const ny=Math.max(0,(top/H)-pad);
      const nw=Math.min(1,(right/W)+pad)-nx;
      const nh=Math.min(1,(bottom/H)+pad)-ny;
      if(nw>0.5&&nh>0.5){
        setCrop({x:nx,y:ny,w:nw,h:nh});
        setCropMode(true);
      }
    }catch(e){}
  }

  // ── Save current edits to queue item ──
  function applyEdits(idx){
    const img=baseImg.current;
    if(!img) return;
    const totalRot=(rotation+fineRotation)*Math.PI/180;
    const cosA=Math.abs(Math.cos(totalRot)),sinA=Math.abs(Math.sin(totalRot));
    const MAX=1400;
    const fullW=img.width*cosA+img.height*sinA;
    const fullH=img.width*sinA+img.height*cosA;
    const scaleF=Math.min(MAX/fullW,MAX/fullH,1);
    const fc=document.createElement('canvas');
    fc.width=Math.round(fullW*scaleF);fc.height=Math.round(fullH*scaleF);
    const ctx=fc.getContext('2d');
    ctx.save();ctx.translate(fc.width/2,fc.height/2);
    if(flipH) ctx.scale(-1,1);
    ctx.rotate(totalRot);
    ctx.drawImage(img,-Math.round(img.width*scaleF)/2,-Math.round(img.height*scaleF)/2,Math.round(img.width*scaleF),Math.round(img.height*scaleF));
    ctx.restore();
    const cx=Math.round(crop.x*fc.width),cy=Math.round(crop.y*fc.height);
    const cw=Math.round(crop.w*fc.width)||fc.width,ch=Math.round(crop.h*fc.height)||fc.height;
    const fc2=document.createElement('canvas');
    fc2.width=cw;fc2.height=ch;
    const ctx2=fc2.getContext('2d');
    const filterStr=getCSSFilter();
    if(filterStr!=='none') ctx2.filter=filterStr;
    ctx2.drawImage(fc,cx,cy,cw,ch,0,0,cw,ch);
    fc2.toBlob(blob=>{
      if(!blob) return;
      const newFile=new File([blob],queue[idx].file.name,{type:'image/jpeg'});
      update(idx,{file:newFile,localUrl:URL.createObjectURL(newFile)});
    },'image/jpeg',0.88);
  }

  function enterEdit(){setEditMode(true);}
  function exitEdit(save){
    if(save) applyEdits(selectedIdx);
    setEditMode(false);
    resetEdits();
  }

  // Crop overlay mouse handling
  const cropHandles=[
    {id:'tl',x:crop.x,y:crop.y,cursor:'nw-resize'},
    {id:'tr',x:crop.x+crop.w,y:crop.y,cursor:'ne-resize'},
    {id:'bl',x:crop.x,y:crop.y+crop.h,cursor:'sw-resize'},
    {id:'br',x:crop.x+crop.w,y:crop.y+crop.h,cursor:'se-resize'},
    {id:'t',x:crop.x+crop.w/2,y:crop.y,cursor:'n-resize'},
    {id:'b',x:crop.x+crop.w/2,y:crop.y+crop.h,cursor:'s-resize'},
    {id:'l',x:crop.x,y:crop.y+crop.h/2,cursor:'w-resize'},
    {id:'r',x:crop.x+crop.w,y:crop.y+crop.h/2,cursor:'e-resize'},
  ];
  function cropHandleMouseDown(e,handle){
    if(!cropMode) return;
    e.preventDefault();e.stopPropagation();snapshot();
    const rect=canvasRef.current.getBoundingClientRect();
    function onMove(ev){
      const nx=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));
      const ny=Math.max(0,Math.min(1,(ev.clientY-rect.top)/rect.height));
      setCrop(prev=>{
        let{x,y,w,h}=prev;
        if(handle==='tl'){const nx2=Math.min(nx,x+w-0.05),ny2=Math.min(ny,y+h-0.05);w=x+w-nx2;h=y+h-ny2;x=nx2;y=ny2;}
        else if(handle==='tr'){w=Math.max(0.05,nx-x);const ny2=Math.min(ny,y+h-0.05);h=y+h-ny2;y=ny2;}
        else if(handle==='bl'){const nx2=Math.min(nx,x+w-0.05);w=x+w-nx2;x=nx2;h=Math.max(0.05,ny-y);}
        else if(handle==='br'){w=Math.max(0.05,nx-x);h=Math.max(0.05,ny-y);}
        else if(handle==='t'){const ny2=Math.min(ny,y+h-0.05);h=y+h-ny2;y=ny2;}
        else if(handle==='b'){h=Math.max(0.05,ny-y);}
        else if(handle==='l'){const nx2=Math.min(nx,x+w-0.05);w=x+w-nx2;x=nx2;}
        else if(handle==='r'){w=Math.max(0.05,nx-x);}
        else if(handle==='move'){x=Math.max(0,Math.min(1-w,prev._dx!==undefined?nx-prev._dx:x));y=Math.max(0,Math.min(1-h,prev._dy!==undefined?ny-prev._dy:y));return{x,y,w,h,_dx:nx-x,_dy:ny-y};}
        return{x,y,w,h};
      });
    }
    function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  }

  const CropIcon=()=>(
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
      <path d="M6 2v14a2 2 0 002 2h14"/><path d="M18 22V8a2 2 0 00-2-2H2"/>
    </svg>
  );

  // ── Save all to Firestore ──
  async function saveAll(){
    if(!queue.length||saving) return;
    if(editMode) exitEdit(true);
    setSaving(true);
    const db=window._db;
    for(let i=0;i<queue.length;i++){
      const item=queue[i];
      if(item.status==='done') continue;
      update(i,{status:'uploading'});
      try{
        const stuIdx=globalType==='artwork'?item.studentIdx:0;
        const url=await uploadPortfolioPhoto(item.file,globalSectionId,stuIdx);
        const date=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
        const snap=await db.collection('sections').doc('shared-'+globalSectionId).get();
        if(snap.exists){
          const data=snap.data();
          if(!data.students[stuIdx].portfolio) data.students[stuIdx].portfolio=[];
          const entry={url,date,caption:'',type:globalType,lessons:[],artTags:[],review:''};
          if(globalLessonKey) entry.lessons=[globalLessonKey];
          data.students[stuIdx].portfolio.push(entry);
          await db.collection('sections').doc('shared-'+globalSectionId).set(data);
        }
        update(i,{status:'done'});
      }catch(err){update(i,{status:'error',errorMsg:err.message});}
    }
    setSaving(false);
    onDone();
  }

  const doneCount=queue.filter(q=>q.status==='done').length;
  const pendingCount=queue.filter(q=>q.status==='pending').length;
  const hasErrors=queue.some(q=>q.status==='error');
  const current=queue[selectedIdx];
  const isDoc=globalType==='documentation';

  const sliders=[
    {label:'Brightness',val:brightness,set:(v)=>{snapshot();setBrightness(v);},icon:'☀',tip:'Adjusts the overall lightness or darkness of the image.'},
    {label:'Contrast',val:contrast,set:(v)=>{snapshot();setContrast(v);},icon:'◑',tip:'Makes highlights brighter and shadows darker to add depth.'},
    {label:'Saturation',val:saturation,set:(v)=>{snapshot();setSaturation(v);},icon:'❋',tip:'Makes colors more vivid or more muted.'},
  ];

  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:6000,
      background:'rgba(6,8,16,0.88)',backdropFilter:'blur(18px)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:20}}
      onClick={e=>{if(e.target===e.currentTarget&&!saving)onClose();}}>

      <div style={{
        background:editMode?'rgba(14,10,4,0.98)':'var(--popup-bg)',
        border:`1px solid ${editMode?'rgba(245,158,11,0.3)':'var(--glass-border2)'}`,
        borderRadius:20,
        boxShadow:editMode?`0 0 0 1px rgba(245,158,11,0.1), var(--glass-shadow2)`:'var(--glass-shadow2)',
        width:'min(1040px,97vw)',height:'min(720px,92vh)',
        display:'flex',flexDirection:'column',overflow:'hidden',
        transition:'background .3s, border-color .3s'}}>

        {/* ── HEADER ── */}
        <div style={{padding:'16px 22px 12px',
          borderBottom:`1px solid ${editMode?'rgba(245,158,11,0.15)':'var(--glass-border)'}`,

            {editMode&&<span style={{fontSize:10,fontWeight:800,letterSpacing:'.1em',color:AMBER,

              <div style={{fontSize:15,fontWeight:800,color:editMode?AMBER:'var(--tx)',

              <div style={{fontSize:11,color:'var(--tx3)',marginTop:1}}>
                {queue.length===0
                  ?'Choose photos to get started'

                    ?'Make edits · click another photo to switch · Save to apply'
                    :`${queue.length} photo${queue.length!==1?'s':''} queued · ${doneCount} saved`}

            </div>
          </div>
          <button onClick={()=>{if(!saving)onClose();}}
            style={{background:'none',border:'none',color:'var(--tx3)',fontSize:20,cursor:'pointer',padding:'2px 6px',lineHeight:1}}>✕</button>
        </div>

          /* ── EMPTY STATE ── */

            <div style={{width:72,height:72,borderRadius:18,border:'2px dashed var(--glass-border2)',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--glass-bg)'}}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:14,fontWeight:700,color:'var(--tx)',marginBottom:6}}>Drop photos here or click to browse</div>
              <div style={{fontSize:11,color:'var(--tx3)'}}>Supports JPEG, PNG · Multiple files at once</div>
            </div>
            <label style={{fontSize:12,fontWeight:700,padding:'9px 24px',borderRadius:10,border:'1px solid var(--teal)',background:'rgba(59,191,160,0.1)',color:'var(--teal)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
              Choose Photos
              <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>{if(e.target.files.length)addFiles(e.target.files);e.target.value='';}}/>
            </label>
          </div>
        ):(

          <div style={{flex:1,display:'flex',minHeight:0}}>

            {/* LEFT — thumbnail strip */}
            <div style={{
              width:THUMB_SIZE+28+'px',flexShrink:0,
              borderRight:`1px solid ${editMode?'rgba(245,158,11,0.12)':'var(--glass-border)'}`,
              display:'flex',flexDirection:'column',overflowY:'auto',padding:'10px 10px',gap:8,
              background:editMode?'rgba(10,7,2,0.6)':'var(--glass-bg)'}}>
              {/* Add more */}
              <label style={{display:'flex',alignItems:'center',justifyContent:'center',
                height:36,borderRadius:8,border:'1px dashed var(--glass-border2)',
                background:'var(--glass-bg)',color:'var(--tx3)',cursor:'pointer',
                fontSize:11,fontWeight:700,gap:5,flexShrink:0}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add
                <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>{if(e.target.files.length)addFiles(e.target.files);e.target.value='';}}/>
              </label>

              {queue.map((item,i)=>{
                const isSel=i===selectedIdx;
                const isDone=item.status==='done';
                const isErr=item.status==='error';
                const isUp=item.status==='uploading';
                return(
                  <div key={i}
                    onClick={()=>{
                      if(editMode&&i!==selectedIdx){
                        applyEdits(selectedIdx);
                        setSelectedIdx(i);
                      } else {
                        setSelectedIdx(i);
                      }
                    }}
                    style={{position:'relative',borderRadius:10,overflow:'hidden',
                      width:THUMB_SIZE,height:THUMB_SIZE,flexShrink:0,cursor:'pointer',
                      outline:isSel
                        ?(editMode?`3px solid ${AMBER}`:'3px solid var(--teal)')
                        :'3px solid transparent',
                      outlineOffset:'-3px',
                      transition:'outline-color .15s'}}>
                    <img src={item.localUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
