// ── GLOBAL SEARCH ────────────────────────────────────────────────────────────
function GlobalSearch({isVisitor,onNav,onPhase,onSection}){
  const [open,setOpen]=React.useState(false);
  const [query,setQuery]=React.useState('');
  const [results,setResults]=React.useState([]);
  const [index,setIndex]=React.useState([]);
  const [fuseInst,setFuseInst]=React.useState(null);
  const inputRef=React.useRef(null);
  const {teacherMode}=React.useContext(KWContext);

  // ── Build index from static data + Firebase ──────────────────────────────
  React.useEffect(()=>{
    const items=[];

    // 1. Sessions / lessons (static)
    PHASES.forEach(ph=>{
      ph.sessions.forEach(s=>{
        items.push({
          id:'session-'+ph.id+'-'+s.n,
          type:'lesson',
          title:'S'+s.n+': '+s.title,
          subtitle:ph.name+' phase · '+ph.months,
          keywords:(s.kws||[]).join(' ')+' '+(s.overview||'')+' '+(s.objective||''),
          thumbnail:null,
          phase:ph,
          session:s,
        });
        // Reference cards inside sessions
        (s.refs||[]).forEach((r,ri)=>{
          if(r.name){
            items.push({
              id:'ref-'+ph.id+'-'+s.n+'-'+ri,
              type:'reference',
              title:r.name,
              subtitle:(r.work||'')+(r.why?' · '+r.why:''),
              keywords:r.why||'',
              thumbnail:null,
              phase:ph,
              session:s,
            });
          }
        });
      });
    });

    // 2. Firebase data — students + photos
    const db=window._db;
    if(!db){buildFuse(items);setIndex(items);return;}
    const SECTION_IDS=G4_SECTIONS.map(s=>s.id);
    let loaded=0;
    SECTION_IDS.forEach(sid=>{
      const sec=G4_SECTIONS.find(s=>s.id===sid);
      db.collection('sections').doc('shared-'+sid).get().then(snap=>{
        if(snap.exists){
          const d=snap.data();
          (d.students||[]).forEach((st,si)=>{
            // Student entry
            items.push({
              id:'student-'+sid+'-'+si,
              type:'student',
              title:st.name,
              subtitle:sec?sec.name:sid,
              keywords:sid+' '+(sec?sec.name:''),
              thumbnail:(st.portfolio&&st.portfolio.length>0)?st.portfolio[st.portfolio.length-1].url:null,
              sectionObj:sec,
              studentIdx:si,
            });
            // Photo entries — skip docs for visitors
            (st.portfolio||[]).forEach((p,pi)=>{
              if(isVisitor&&p.type==='documentation') return;
              const lessonLabel=p.resolvedLesson||resolveLessonLabel((p.lessons&&p.lessons[0])||null)||'';
              items.push({
                id:'photo-'+sid+'-'+si+'-'+pi,
                type:'photo',
                title:p.type==='documentation'?(lessonLabel||'Documentation'):st.name,
                subtitle:(p.type==='documentation'?'Docs':'Artwork')+' · '+(sec?sec.name:sid)+(lessonLabel?' · '+lessonLabel:''),
                keywords:st.name+' '+sid+' '+(sec?sec.name:'')+' '+lessonLabel+' '+(p.artTags||[]).join(' '),
                thumbnail:p.url,
                photo:{...p,studentName:st.name,sectionId:sid,sectionName:sec?sec.name:sid,resolvedLesson:lessonLabel},
              });
            });
          });
        }
        loaded++;
        if(loaded>=SECTION_IDS.length){buildFuse(items);setIndex(items);}
      }).catch(()=>{loaded++;if(loaded>=SECTION_IDS.length){buildFuse(items);setIndex(items);}});
    });

    function buildFuse(it){
      const f=new Fuse(it,{
        keys:[
          {name:'title',weight:3},
          {name:'subtitle',weight:1.5},
          {name:'keywords',weight:1},
        ],
        threshold:0.35,
        includeScore:true,
        minMatchCharLength:2,
      });
      setFuseInst(f);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[isVisitor]);

  // ── Cmd+K / search-toggle listener ─────────────────────────────────────────
  React.useEffect(()=>{
    function onKey(e){
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setOpen(o=>!o);}
      if(e.key==='Escape') setOpen(false);
    }
    function onToggle(){setOpen(o=>!o);}
    window.addEventListener('keydown',onKey);
    window.addEventListener('search-toggle',onToggle);
    return()=>{window.removeEventListener('keydown',onKey);window.removeEventListener('search-toggle',onToggle);};
  },[]);

  // ── Focus input when opened ──────────────────────────────────────────────
  React.useEffect(()=>{
    if(open){
      setQuery('');setResults([]);
      setTimeout(()=>{if(inputRef.current)inputRef.current.focus();},50);
    }
  },[open]);

  // ── Search ───────────────────────────────────────────────────────────────
  React.useEffect(()=>{
    if(!fuseInst||query.trim().length<2){setResults([]);return;}
    const raw=fuseInst.search(query.trim(),{limit:24});
    setResults(raw.map(r=>r.item));
  },[query,fuseInst]);

  // ── Navigate to result ───────────────────────────────────────────────────
  function handleResult(item){
    setOpen(false);
    if(item.type==='lesson'&&item.phase){
      onPhase(item.phase);
    } else if(item.type==='reference'&&item.phase){
      onPhase(item.phase);
    } else if(item.type==='student'&&item.sectionObj){
      onSection(item.sectionObj);
    } else if(item.type==='photo'){
      // Navigate to gallery and open lightbox via a global event
      onNav('gallery');
      // Small delay to let gallery render, then fire open event
      setTimeout(()=>{
        window.dispatchEvent(new CustomEvent('search-open-photo',{detail:item.photo}));
      },300);
    }
  }

  // ── Group results ────────────────────────────────────────────────────────
  const grouped={lesson:[],reference:[],student:[],photo:[]};
  results.forEach(r=>{if(grouped[r.type])grouped[r.type].push(r);});
  const typeLabel={lesson:'Lessons',reference:'References',student:'Students',photo:'Photos'};
  const typeOrder=['student','photo','lesson','reference'];

  const hasResults=results.length>0;
  const showHint=query.trim().length<2&&!hasResults;

  if(!open) return null;

  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:9000,
      background:'rgba(6,8,16,0.82)',backdropFilter:'blur(16px)',
      display:'flex',flexDirection:'column',alignItems:'center',
      paddingTop:'12vh'}}
      onClick={()=>setOpen(false)}>

      {/* Modal box */}
      <div onClick={e=>e.stopPropagation()}
        style={{width:'min(680px,92vw)',background:'var(--popup-bg)',
          border:'1px solid var(--glass-border2)',borderRadius:20,
          boxShadow:'0 32px 80px rgba(0,0,0,0.7)',
          display:'flex',flexDirection:'column',
          maxHeight:'72vh',overflow:'hidden'}}>

        {/* Search input */}
        <div style={{display:'flex',alignItems:'center',gap:12,
          padding:'16px 20px',borderBottom:'1px solid var(--glass-border)'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="var(--tx3)" strokeWidth="2" strokeLinecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input ref={inputRef}
            value={query}
            onChange={e=>setQuery(e.target.value)}
            placeholder="Search students, lessons, artwork, references…"
            style={{flex:1,background:'none',border:'none',outline:'none',
              fontSize:16,color:'var(--tx)',fontFamily:"'DM Sans',sans-serif",
              caretColor:'var(--teal)'}}/>
          <kbd style={{fontSize:10,color:'var(--tx3)',background:'var(--glass-bg2)',
            border:'1px solid var(--glass-border)',borderRadius:5,
            padding:'2px 7px',fontFamily:'monospace',flexShrink:0}}>Esc</kbd>
        </div>

        {/* Results */}
        <div style={{overflowY:'auto',flex:1}}>
          {showHint?(
            <div style={{padding:'28px 24px',display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:12,color:'var(--tx3)',marginBottom:4}}>Try searching for:</div>
              {['Student names','Lesson titles or keywords','Artwork tags','Section names (4 Kanha, 4 Gir…)'].map(h=>(
                <div key={h} style={{fontSize:12,color:'var(--tx2)',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{color:'var(--teal)'}}>→</span>{h}
                </div>
              ))}
            </div>
          ):!hasResults&&query.trim().length>=2?(
            <div style={{padding:'36px 24px',textAlign:'center',color:'var(--tx3)',fontSize:13}}>
              No results for "{query}"
            </div>
          ):(
            <div style={{padding:'8px 0 12px'}}>
              {typeOrder.map(type=>{
                const items=grouped[type];
                if(!items||items.length===0) return null;
                return(
                  <div key={type}>
                    <div style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',
                      textTransform:'uppercase',color:'var(--tx3)',
                      padding:'10px 20px 4px'}}>
                      {typeLabel[type]}
                    </div>
                    {items.slice(0,5).map(item=>(
                      <div key={item.id}
                        onClick={()=>handleResult(item)}
                        style={{display:'flex',alignItems:'center',gap:12,
                          padding:'8px 20px',cursor:'pointer',transition:'background .12s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--glass-bg)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>

                        {/* Thumbnail */}
                        <div style={{width:40,height:40,borderRadius:8,
                          background:'var(--glass-bg2)',flexShrink:0,overflow:'hidden',
                          display:'flex',alignItems:'center',justifyContent:'center'}}>
                          {item.thumbnail?(
                            <img src={item.thumbnail} alt=""
                              style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                          ):(
                            <span style={{fontSize:16}}>
                              {type==='lesson'?'📖':type==='reference'?'🎨':type==='student'?'👤':'🖼'}
                            </span>
                          )}
                        </div>

                        {/* Text */}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:'var(--tx)',
                            whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                            {item.title}
                          </div>
                          <div style={{fontSize:11,color:'var(--tx3)',marginTop:2,
                            whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                            {item.subtitle}
                          </div>
                        </div>

                        {/* Arrow */}
                        <span style={{color:'var(--tx3)',fontSize:14,flexShrink:0}}>›</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{padding:'8px 20px',borderTop:'1px solid var(--glass-border)',
          display:'flex',alignItems:'center',gap:16}}>
          <span style={{fontSize:10,color:'var(--tx3)'}}>
            {index.length>0?index.length+' items indexed':'Building index…'}
          </span>
          <span style={{fontSize:10,color:'var(--tx3)',marginLeft:'auto'}}>
            <kbd style={{fontSize:9,background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',
              borderRadius:4,padding:'1px 5px',fontFamily:'monospace'}}>⌘K</kbd>
            {' '}to toggle
          </span>
        </div>
      </div>
    </div>,
    document.body
  );
}

function App(){
  // ── Auth state ──
  const [user, setUser] = React.useState(undefined); // undefined = loading, null = signed out
  React.useEffect(()=>{
    const unsub = window._auth.onAuthStateChanged(u => setUser(u || null));
    return () => unsub();
  },[]);

  const [view,setView]=React.useState(()=>{
    try{
      const h=window.location.hash.slice(1);
      const p=JSON.parse(decodeURIComponent(h));
      if(p.section){
        for(const ph2 of PHASES){
          if(ph2.sections&&ph2.sections.find(x=>x.id===p.section)) return 'section';
        }
      }
      return p.view||'annual';
    }catch{return 'annual';}
  });
  const [phase,setPhase]=React.useState(()=>{
    try{const h=window.location.hash.slice(1);const p=JSON.parse(decodeURIComponent(h));return p.phase?PHASES.find(x=>x.id===p.phase)||null:null;}catch{return null;}
  });
  const [progress,setProgress]=useLocalStorage('g4v3-prog',{});
  const [theme,setThemeState]=useLocalStorage('g4-theme','dark');
  // Migrate any stored 'colour' theme to 'dark'
  React.useEffect(()=>{
    if(theme==='colour'){setThemeState('dark');document.documentElement.setAttribute('data-theme','dark');}
  },[]);
  const [classView,setClassView]=React.useState(false);
  const [activeKw,setActiveKw]=React.useState(null);
  // Teacher mode: stored in sessionStorage so shared links start in read-only
  const [teacherMode,setTeacherModeState]=React.useState(()=>{
    try{return sessionStorage.getItem('g4-teacher')==='1';}catch{return false;}
  });
  const setTeacherMode=React.useCallback((v)=>{
    setTeacherModeState(v);
    try{if(v)sessionStorage.setItem('g4-teacher','1');else sessionStorage.removeItem('g4-teacher');}catch{}
  },[]);

  const setTheme=React.useCallback((t)=>{
    const allowed=['dark','light'];
    if(!allowed.includes(t)) return;
    setThemeState(t);
    document.documentElement.setAttribute('data-theme',t);
  },[setThemeState]);

  React.useEffect(()=>{
    const safe=['dark','light'].includes(theme)?theme:'dark';
    document.documentElement.setAttribute('data-theme',safe);
  },[theme]);

  React.useEffect(()=>{
    setProgress(prev=>{
      const next={...prev};
      let changed=false;
      ['p1:1','p1:2','p1:3'].forEach(k=>{if(!next[k]){next[k]=true;changed=true;}});
      return changed?next:prev;
    });
  },[]);

  const toggle=React.useCallback((phaseId,n)=>{
    setProgress(prev=>{const key=phaseId+':'+n;const next={...prev};if(next[key])delete next[key];else next[key]=true;return next;});
  },[setProgress]);

  const getPhaseProgress=React.useCallback((phaseId)=>{
    const ph=PHASES.find(p=>p.id===phaseId);
    if(!ph) return{done:0,total:0};
    return{done:ph.sessions.filter(s=>progress[phaseId+':'+s.n]).length,total:ph.sessions.length};
  },[progress]);

  const totalSessions=PHASES.reduce((a,p)=>a+p.sessions.length,0);
  const totalDone=PHASES.reduce((a,p)=>a+p.sessions.filter(s=>progress[p.id+':'+s.n]).length,0);

  const [section,setSection]=React.useState(()=>{
    try{
      const h=window.location.hash.slice(1);
      const p=JSON.parse(decodeURIComponent(h));
      if(p.section){
        for(const ph2 of PHASES){
          const s=ph2.sections&&ph2.sections.find(x=>x.id===p.section);
          if(s) return s;
        }
      }
    }catch{}
    return null;
  });
  const [subSectionId,setSubSectionId]=React.useState(null);
  const updateHash=React.useCallback((v,p,s)=>{
    try{window.location.hash=encodeURIComponent(JSON.stringify({view:v,phase:p?p.id:null,section:s?s.id:null}));}catch{}
  },[]);
  const handlePhase=React.useCallback((p)=>{setPhase(p);setView('phase');setSection(null);updateHash('phase',p,null);},[updateHash]);
  const handleNav=React.useCallback((v)=>{setView(v);if(v!=='phase')setPhase(null);setSection(null);updateHash(v,null,null);},[updateHash]);
  const handleBack=React.useCallback(()=>{setView('annual');setPhase(null);setSection(null);updateHash('annual',null,null);},[updateHash]);
  const handleSection=React.useCallback((s)=>{if(subSectionId&&s.id!==subSectionId)return;setSection(s);setView('section');setPhase(null);updateHash('section',null,s);},[subSectionId,updateHash]);
  const handleOpenLinkedSession=React.useCallback((linked)=>{
    const ph=PHASES.find(p=>p.id===linked.phaseId);
    if(ph){setPhase(ph);setView('phase');setSection(null);}
  },[]);

  function handleSignOut(){
    window._auth.signOut();
    try{sessionStorage.removeItem('g4-teacher');}catch{}
    setTeacherModeState(false);
  }

  async function handleExportData(){
    const db=window._db;
    const SECTION_IDS=['4gir','4sariska','4ranthambore','4kanha','4corbett'];
    const exportObj={exportedAt:new Date().toISOString(),sections:{},localStorage:{}};
    for(const sid of SECTION_IDS){
      const sharedDocId='shared-'+sid;
      try{
        const snap=await db.collection('sections').doc(sharedDocId).get();
        const main=snap.exists?snap.data():{};
        const students=main.students||[];
        // Fetch any legacy base64 photo docs for students not yet on Storage
        const photoPromises=students.map((st,i)=>{
          if(st.photo&&st.photo.startsWith('http')) return Promise.resolve(st.photo);
          return db.collection('sections').doc(sharedDocId+'-photo-'+i).get()
            .then(s=>s.exists?s.data().photo:null).catch(()=>null);
        });
        const photos=await Promise.all(photoPromises);
        exportObj.sections[sid]={...main,_photos:photos};
      }catch(e){console.warn('Export failed for',sid,e);}
    }
    try{
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k) exportObj.localStorage[k]=localStorage.getItem(k);
      }
    }catch(e){console.warn('localStorage export failed:',e);}
    const blob=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='grade4-arts-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  async function handleImportData(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    if(!window.confirm('This will overwrite ALL section data in Firebase with the data from this file. Are you sure?'))return;
    try{
      const text=await file.text();
      const importObj=JSON.parse(text);
      if(!importObj.sections)throw new Error('Invalid backup file — missing sections key.');
      const db=window._db;
      for(const [sid,data] of Object.entries(importObj.sections)){
        const sharedDocId='shared-'+sid;
        const photos=data._photos||[];
        const mainData={...data};
        delete mainData._photos;
        const students=mainData.students||[];
        // For each student: if _photos[i] is a URL, save directly; if base64, upload to Storage
        const resolvedStudents=await Promise.all(students.map(async(st,i)=>{
          const p=photos[i];
          if(!p) return{...st,photo:null};
          if(p.startsWith('http')) return{...st,photo:p};
          // base64 → upload to Storage
          try{
            const blob=dataURLtoBlob(p);
            const ext=p.startsWith('data:image/png')?'png':'jpg';
            const ref=window._storage.ref(`photos/${sid}/${i}.${ext}`);
            await ref.put(blob,{contentType:ext==='png'?'image/png':'image/jpeg'});
            const url=await ref.getDownloadURL();
            return{...st,photo:url};
          }catch{
            // fallback: write to legacy photo doc
            await db.collection('sections').doc(sharedDocId+'-photo-'+i).set({photo:p}).catch(()=>{});
            return{...st,photo:'__photo_ref__'};
          }
        }));
        mainData.students=resolvedStudents;
        await db.collection('sections').doc(sharedDocId).set(mainData);
      }
      if(importObj.localStorage){
        try{
          for(const [k,v] of Object.entries(importObj.localStorage)){
            localStorage.setItem(k,v);
          }
        }catch(lsErr){console.warn('localStorage restore failed:',lsErr);}
      }
      alert('Import complete! Refresh the page to see restored data.');
    }catch(err){
      alert('Import failed: '+err.message);
    }
    e.target.value='';
  }

  // ── showSignIn modal state (for signing in from within the app) ──
  const [showSignIn,setShowSignIn]=React.useState(false);

  // ── Auth loading ──
  if(user===undefined){
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--tx3)',fontSize:14}}>
        Loading…
      </div>
    );
  }

  // userId for Firestore — null if not signed in (sub PIN access uses guest userId)
  const userId=user?user.uid:null;
  // Visitor = not logged in AND not teacher mode
  const isVisitor=!user&&!teacherMode;

  // ── Render full app (signed in OR not — sections gate themselves) ──
  return(
    <KWContext.Provider value={{activeKw,setActiveKw,teacherMode,setTeacherMode}}>
      <div className={`app${classView?' class-view-active':''}`}>
        {classView&&(
          <>
            <div className="class-view-bar">
              <span className="cv-label" style={{display:"inline-flex",alignItems:"center",gap:6}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="12" rx="2"/><circle cx="17" cy="13" r="2"/><path d="M7 13h4M7 10h2M7 16h2"/></svg>Class View — projected</span>
            </div>
            <button className="cv-float-exit" onClick={()=>setClassView(false)}>✕ Exit Class View</button>
          </>
        )}
        {!classView&&<Sidebar view={view} phase={phase} section={section} onNav={handleNav} onPhase={handlePhase} onSection={handleSection}
          getPhaseProgress={getPhaseProgress} totalDone={totalDone} totalSessions={totalSessions}
          theme={theme} setTheme={setTheme} classView={classView} setClassView={setClassView} subSectionId={subSectionId}
          user={user} onSignOut={handleSignOut} onSignIn={()=>setShowSignIn(true)} isVisitor={isVisitor} onExportData={handleExportData} onImportData={handleImportData}/>}
        <div className="main">
          {view==='annual'&&<AnnualPlan onPhase={handlePhase} getPhaseProgress={getPhaseProgress} totalDone={totalDone} totalSessions={totalSessions} isVisitor={isVisitor} onExportData={handleExportData} onImportData={handleImportData}/>}
          {view==='months'&&<MonthsView/>}
          {view==='gallery'&&<GalleryView isVisitor={isVisitor}/>}
          {view==='phase'&&phase&&<PhaseDetail phase={phase} onBack={handleBack} progress={progress} toggle={toggle} classView={classView} isVisitor={isVisitor}/>}
          {view==='notes'&&(isVisitor?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--tx3)',fontSize:13}}>Sign in to access Unit Notes.</div>:<GlobalNotes/>)}
          {view==='section'&&section&&<SectionView section={section} phases={PHASES} onOpenLinkedSession={handleOpenLinkedSession} teacherMode={teacherMode} subSectionId={subSectionId} setSubSectionId={setSubSectionId} userId={userId} onSignIn={()=>setShowSignIn(true)}/>}
        </div>
        <GlobalSearch isVisitor={isVisitor} onNav={handleNav} onPhase={handlePhase} onSection={handleSection}/>
        <GlobalKWPopup activeKw={activeKw} onClose={()=>setActiveKw(null)}/>
        <Timer/>
        <AIChatbot phases={PHASES} sections={G4_SECTIONS} teacherMode={teacherMode} currentView={view} currentPhase={phase} currentSection={section}/>
        {/* Sign-in modal — can be triggered from sidebar when not logged in */}
        {showSignIn&&<SignInModal onClose={()=>setShowSignIn(false)}/>}
      </div>
    </KWContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
/* ── Cursor Refraction Glow — fixed overlay, LED point-source, blue ── */
(function(){
  var mx=0,my=0,raf=null;

  // Overlay injected as fixed-position div in body, tracked per panel via WeakMap
  var overlays=new WeakMap();

  function ensureOverlay(el){
    if(overlays.has(el)) return overlays.get(el);
    var ov=document.createElement('div');
    ov.className='lb-glow-ov';
    ov.style.cssText='position:fixed;pointer-events:none;z-index:9999;border-radius:15px;opacity:0;transition:opacity .3s;';
    document.body.appendChild(ov);
    overlays.set(el,ov);
    return ov;
  }

  function applyGlow(){
    raf=null;
    document.querySelectorAll('.lb-glass-panel').forEach(function(el){
      var r=el.getBoundingClientRect();
      if(!r.width||!r.height) return;
      var ov=ensureOverlay(el);
      // Position overlay exactly over the panel
      ov.style.left=r.left+'px';
      ov.style.top=r.top+'px';
      ov.style.width=r.width+'px';
      ov.style.height=r.height+'px';
      // Pill shape gets full border-radius
      if(r.height<60) ov.style.borderRadius='100px';
      else ov.style.borderRadius='15px';

      var cx=mx-r.left, cy=my-r.top;
      var rx=cx/r.width, ry=cy/r.height;
      var outsideX=Math.max(0,Math.max(-cx,cx-r.width));
      var outsideY=Math.max(0,Math.max(-cy,cy-r.height));
      var dist=Math.sqrt(outsideX*outsideX+outsideY*outsideY);
      var prox=Math.max(0,1-dist/130);

      if(prox<0.01){ov.style.opacity='0';return;}
      ov.style.opacity='1';

      var px=(rx*100).toFixed(1)+'%', py=(ry*100).toFixed(1)+'%';

      // Surface scatter — soft blue radial at cursor
      var s=(0.15*prox).toFixed(3);
      var surface='radial-gradient(circle 60% at '+px+' '+py+',rgba(80,140,255,'+s+') 0%,rgba(60,100,255,'+(s*0.3).toFixed(3)+') 35%,rgba(40,80,200,0) 72%)';

      // Border rim — tight ellipse at cursor projected onto nearest edge
      var bx=Math.max(0,Math.min(r.width,cx));
      var by=Math.max(0,Math.min(r.height,cy));
      var bpx=(bx/r.width*100).toFixed(1)+'%';
      var bpy=(by/r.height*100).toFixed(1)+'%';
      var dL=Math.abs(cx),dR=Math.abs(r.width-cx),dT=Math.abs(cy),dB=Math.abs(r.height-cy);
      var minE=Math.min(dL,dR,dT,dB);
      var ep=Math.max(0,1-Math.max(0,minE)/90);
      var rs=(0.6*prox*ep).toFixed(3);
      var rim='';
      if(dL===minE)      rim='radial-gradient(ellipse 20px 60px at 0% '+bpy+',rgba(130,180,255,'+rs+') 0%,rgba(80,130,255,0) 100%)';
      else if(dR===minE) rim='radial-gradient(ellipse 20px 60px at 100% '+bpy+',rgba(130,180,255,'+rs+') 0%,rgba(80,130,255,0) 100%)';
      else if(dT===minE) rim='radial-gradient(ellipse 60px 20px at '+bpx+' 0%,rgba(130,180,255,'+rs+') 0%,rgba(80,130,255,0) 100%)';
      else               rim='radial-gradient(ellipse 60px 20px at '+bpx+' 100%,rgba(130,180,255,'+rs+') 0%,rgba(80,130,255,0) 100%)';

      ov.style.background=rim+','+surface;
    });
  }

  window.addEventListener('mousemove',function(e){
    mx=e.clientX;my=e.clientY;
    if(!raf) raf=requestAnimationFrame(applyGlow);
  },{passive:true});

  document.addEventListener('mouseleave',function(){
    document.querySelectorAll('.lb-glow-ov').forEach(function(o){o.style.opacity='0';});
    if(raf){cancelAnimationFrame(raf);raf=null;}
  });

  // MutationObserver: pre-create overlay as soon as panel appears
  var observer=new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      m.addedNodes.forEach(function(node){
        if(!node.querySelectorAll) return;
        if(node.classList&&node.classList.contains('lb-glass-panel')) ensureOverlay(node);
        node.querySelectorAll('.lb-glass-panel').forEach(ensureOverlay);
      });
    });
  });
  observer.observe(document.body,{childList:true,subtree:true});
})();
</script>
</body>
</html>
