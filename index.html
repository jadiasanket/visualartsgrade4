function useLocalStorage(key,init){
  const [val,setVal]=React.useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  // Re-read from storage if key changes (e.g. switching sessions)
  React.useEffect(()=>{
    try{const s=localStorage.getItem(key);setVal(s?JSON.parse(s):init);}catch{setVal(init);}
  },[key]);
  const set=React.useCallback((v)=>{
    setVal(prev=>{
      const next=typeof v==='function'?v(prev):v;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      return next;
    });
  },[key]);
  return[val,set];
}

// ── Firestore hook — replaces useLocalStorage for section data only ──
// Reads/writes Firestore doc at sections/shared-[sectionId].
// Accessible to all users (authenticated or sub PIN). Falls back to localStorage.
// On first load, migrates data from old userId-sectionId doc if needed.
// ── Upload a photo file to Firebase Storage, return download URL ──────────────
// sectionId : e.g. '4gir'
// studentIdx : integer index in the students array
// file       : File object from <input type="file">
// Compress a photo File to a small base64 JPEG using canvas.
// Max dimension 800px, quality 0.82 — good clarity, stays under ~150KB per photo.
// Returns a data URL string saved directly into Firestore (no Storage needed).
function compressPhoto(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); reject(new Error('Could not read image file.')); };
    img.src = objectUrl;
  });
}

// ── Migrate any base64 photos still in a Firestore section doc ────────────────
// Runs once per load when old data is detected; updates Firestore in place.
function dataURLtoBlob(dataUrl) {
  const [header, base64] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const binary = atob(base64);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function migrateBase64Photos(sectionId, data, sharedRef) {
  const storage = window._storage;
  if (!data.students) return data;
  let changed = false;
  const updatedStudents = await Promise.all(data.students.map(async (st, idx) => {
    if (st.photo && st.photo.startsWith('data:')) {
      try {
        const blob = dataURLtoBlob(st.photo);
        const ref = storage.ref(`photos/${sectionId}/${idx}-migrated`);
        await ref.put(blob);
        const url = await ref.getDownloadURL();
        changed = true;
        return { ...st, photo: url };
      } catch (e) {
        console.warn('Photo migration failed for student', idx, e);
        return st;
      }
    }
    return st;
  }));
  if (changed) {
    const migrated = { ...data, students: updatedStudents };
    await sharedRef.set(migrated);
    return migrated;
  }
  return data;
}

function useFirestore(sectionId, userId, init) {
  const sharedDocId = 'shared-' + sectionId;
  const lsKey = 'g4-section-' + sectionId;
  const [val, setVal] = React.useState(init);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    if (!sectionId) return;
    const db = window._db;
    const sharedRef = db.collection('sections').doc(sharedDocId);
    let cancelled = false;

    sharedRef.get().then(async snap => {
      if (cancelled) return;
      if (snap.exists && snap.data() && snap.data().students) {
        let fsData = snap.data();
        // Fetch each student's photo from its own doc in the sections collection
        try {
          const students = fsData.students || [];
          const photoPromises = students.map((st, i) =>
            db.collection('sections').doc(sharedDocId + '-photo-' + i).get()
              .then(s => s.exists ? s.data().photo : null)
              .catch(() => null)
          );
          const photos = await Promise.all(photoPromises);
          fsData = {
            ...fsData,
            students: students.map((st, i) => ({ ...st, photo: photos[i] || null }))
          };
        } catch(e) { console.warn('Could not load photos:', e); }
        if (cancelled) return;
        setVal(fsData);
        try { localStorage.setItem(lsKey, JSON.stringify(fsData)); } catch {}
        setLoading(false);
      } else {
        // Shared doc empty — try migrating from old userId-sectionId doc
        const tryMigrate = async () => {
          let migrated = false;
          if (userId) {
            try {
              const oldRef = db.collection('sections').doc(userId + '-' + sectionId);
              const oldSnap = await oldRef.get();
              if (oldSnap.exists && oldSnap.data() && oldSnap.data().students) {
                const oldData = oldSnap.data();
                await sharedRef.set(oldData);
                // Delete old doc after successful migration
                oldRef.delete().catch(() => {});
                if (!cancelled) { setVal(oldData); try { localStorage.setItem(lsKey, JSON.stringify(oldData)); } catch {} setLoading(false); }
                migrated = true;
              }
            } catch {}
          }
          if (!migrated && !cancelled) {
            // Fall back to localStorage
            try {
              const lsRaw = localStorage.getItem(lsKey);
              if (lsRaw) {
                const lsData = JSON.parse(lsRaw);
                sharedRef.set(lsData).catch(() => {});
                if (!cancelled) { setVal(lsData); setLoading(false); }
              } else {
                if (!cancelled) { setVal(init); setLoading(false); }
              }
            } catch { if (!cancelled) { setVal(init); setLoading(false); } }
          }
        };
        tryMigrate();
      }
    }).catch(() => {
      if (cancelled) return;
      try {
        const lsRaw = localStorage.getItem(lsKey);
        setVal(lsRaw ? JSON.parse(lsRaw) : init);
      } catch { setVal(init); }
      setLoading(false);
    });

    return () => { cancelled = true; };
  }, [sectionId, userId]);

  const saveTimerRef = React.useRef(null);

  const set = React.useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      // Always save to localStorage immediately
      try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch {}
      // Debounce Firestore writes — wait 1.5s after last change before writing
      if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
      saveTimerRef.current = setTimeout(() => {
        const db = window._db;
        const mainRef = db.collection('sections').doc(sharedDocId);
        const nextWithoutPhotos = {
          ...next,
          students: (next.students || []).map((st, i) => {
            if (st.photo) {
              db.collection('sections').doc(sharedDocId + '-photo-' + i)
                .set({ photo: st.photo })
                .catch(e => console.error('Photo save failed for student', i, e));
            }
            return { ...st, photo: '__photo_ref__' };
          })
        };
        mainRef.set(nextWithoutPhotos).catch(e => console.error('Firestore save failed:', e));
      }, 1500);
      return next;
    });
  }, [sectionId]);

  return [val, set, loading];
}

function useNoteLog(key){
  const [entries,setEntries]=useLocalStorage(key,[]);
  const add=React.useCallback((text)=>{
    if(!text.trim()) return;
    setEntries(prev=>[{text,time:new Date().toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'})},...prev]);
  },[setEntries]);
  const del=React.useCallback((i)=>{setEntries(prev=>prev.filter((_,idx)=>idx!==i));},[setEntries]);
  return[entries,add,del];
}

// Global keyword popup context — ensures only one popup open at a time
const KWContext=React.createContext({activeKw:null,setActiveKw:()=>{},teacherMode:true,setTeacherMode:()=>{}});


function KWPopup({word,color,stu,tch,anchorRect,onClose}){
  const col=KW_COLORS[color]||KW_COLORS.sky;
  const popupRef=React.useRef(null);
  const popW=256;
  const left=Math.max(8,Math.min(anchorRect.left+anchorRect.width/2-popW/2, window.innerWidth-popW-8));
  const spaceAbove=anchorRect.top-16;
  const top=spaceAbove>180?anchorRect.top-8:anchorRect.bottom+8;
  const above=spaceAbove>180;

  // Close on outside click — but not when clicking another pill/tag (let that pill handle it)
  React.useEffect(()=>{
    const handle=(e)=>{
      if(popupRef.current&&popupRef.current.contains(e.target)) return;
      // Walk up from target — if it's a pill or tag, don't close here; the pill's handler will fire next
      let node=e.target;
      while(node&&node!==document.body){
        if(node.classList&&(node.classList.contains('kw-pill')||node.classList.contains('kw-popup-wrap')||node.classList.contains('sc-tag'))) return;
        node=node.parentNode;
      }
      onClose();
    };
    const t=setTimeout(()=>document.addEventListener('mousedown',handle),50);
    return()=>{clearTimeout(t);document.removeEventListener('mousedown',handle);};
  },[onClose]);

  return(
    <div ref={popupRef} className="kw-popup"
      style={{position:'fixed',left,top,transform:above?'translateY(-100%)':'none',width:popW,zIndex:500}}
      onMouseDown={e=>e.stopPropagation()}>
      <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10}}>
        <div style={{flex:1}}>
          <div className="kw-popup-word" style={{color:col.text,fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:700,marginBottom:2}}>{word}</div>
          <div style={{height:2,width:32,background:col.text,borderRadius:1,opacity:0.4}}></div>
        </div>
        <div className="kw-icon-wrap" style={{background:col.bg,borderColor:col.border}}>
          <KWIcon word={word} color={color} size={28}/>
        </div>
        <button className="kw-popup-x" onMouseDown={e=>{e.stopPropagation();onClose();}}>✕</button>
      </div>
      {stu&&<><div className="kw-popup-label">For Students</div><div className="kw-popup-text">{stu}</div></>}
      {tch&&<><div className="kw-popup-label" style={{marginTop:8}}>Teacher Note</div><div className="kw-popup-text">{tch}</div></>}
    </div>
  );
}

function KWPill({w,c,s,t,size='normal'}){
  const {activeKw,setActiveKw}=React.useContext(KWContext);
  const pillRef=React.useRef(null);
  const uid=React.useRef(Math.random().toString(36).slice(2));
  const col=KW_COLORS[c]||KW_COLORS.sky;
  const isOpen=activeKw&&activeKw.id===uid.current;

  const handleMouseDown=React.useCallback((e)=>{
    e.stopPropagation();
    e.preventDefault();
    // Always set directly — document listener handles closing when clicking outside
    // If same pill clicked while open, close it; if different pill, switch directly
    if(isOpen){
      setActiveKw(null);
    } else {
      setActiveKw({id:uid.current,word:w,color:c,stu:s,tch:t,rect:pillRef.current.getBoundingClientRect()});
    }
  },[isOpen,w,c,s,t,setActiveKw]);

  return(
    <span className="kw-popup-wrap">
      <span ref={pillRef} className="kw-pill"
        onMouseDown={handleMouseDown}
        onClick={e=>{e.stopPropagation();e.preventDefault();}}
        style={{background:col.bg,borderColor:col.border,color:col.text,
          fontSize:size==='small'?'11px':'12px',
          padding:size==='small'?'3px 9px':'5px 10px',

        {w}
      </span>
    </span>
  );
}

function Lightbox({items,startIndex,onClose}){
  const [idx,setIdx]=React.useState(startIndex||0);
  const item=items[idx];
  const prev=()=>setIdx(i=>Math.max(0,i-1));
  const next=()=>setIdx(i=>Math.min(items.length-1,i+1));

  React.useEffect(()=>{
    const handle=(e)=>{
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft') prev();
      if(e.key==='ArrowRight') next();
    };
    window.addEventListener('keydown',handle);
    return()=>window.removeEventListener('keydown',handle);
  },[onClose,idx]);

  return(
    <div className="lb-overlay" onClick={onClose}>
      <div className="lb-inner" onClick={e=>e.stopPropagation()}>
        <button className="lb-close" onClick={onClose} style={{display:"flex",alignItems:"center",justifyContent:"center"}}>{IC.close}</button>
        {item.type==='image'&&<img className="lb-img" src={item.src} alt={item.caption}/>}
        {item.type==='video'&&<iframe className="lb-video" src={item.src+'?autoplay=1'} allow="autoplay;encrypted-media" allowFullScreen title={item.caption}/>}
        {item.caption&&<div className="lb-caption">{item.caption}</div>}
        {items.length>1&&(
          <div className="lb-nav">
            <button className="lb-nav-btn" onClick={prev} disabled={idx===0}>←</button>
            <span className="lb-counter">{idx+1} / {items.length}</span>
            <button className="lb-nav-btn" onClick={next} disabled={idx===items.length-1}>→</button>
          </div>
        )}
      </div>
    </div>
  );
}

}

// Extract YouTube video ID from URL

function ResourceAdder({onAdd,addType,setAddType,textDraft,setTextDraft,urlDraft,setUrlDraft,urlLabel,setUrlLabel,addText,addUrl,handleImgUpload}){
  const [dragging,setDragging]=React.useState(false);
  const dropRef=React.useRef(null);

  // Paste handler
  React.useEffect(()=>{
    const handlePaste=(e)=>{
      const items=Array.from(e.clipboardData.items||[]);
      items.forEach(item=>{
        if(item.type.startsWith('image/')){
          const file=item.getAsFile();
          const r=new FileReader();
          r.onload=ev=>onAdd({type:'image',src:ev.target.result,name:'Pasted image'});
          r.readAsDataURL(file);
        }
      });
      const text=e.clipboardData.getData('text');
      if(text&&(text.startsWith('http://')||text.startsWith('https://'))){
        onAdd({type:'link',url:text.trim(),name:text.trim()});
      }
    };
    document.addEventListener('paste',handlePaste);
    return()=>document.removeEventListener('paste',handlePaste);
  },[onAdd]);

  const handleDrop=React.useCallback((e)=>{
    e.preventDefault();setDragging(false);
    Array.from(e.dataTransfer.files).forEach(file=>{
      if(file.type.startsWith('image/')){
        const r=new FileReader();
        r.onload=ev=>onAdd({type:'image',src:ev.target.result,name:file.name});
        r.readAsDataURL(file);
      }
    });
    const url=e.dataTransfer.getData('text/uri-list')||e.dataTransfer.getData('text/plain');
    if(url&&(url.startsWith('http://')||url.startsWith('https://'))){
      onAdd({type:'link',url:url.trim(),name:url.trim()});
    }
  },[onAdd]);

  return(
    <div>
      {/* Button row + drop hint */}
      <div ref={dropRef} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={handleDrop}
        style={{border:`2px dashed ${dragging?'var(--teal)':'var(--glass-border)'}`,borderRadius:10,padding:'10px 12px',transition:'border-color .15s,background .15s',background:dragging?'var(--ts)':'transparent'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          {[{id:'img',label:'Image',icon:'img'},{id:'link',label:'Link',icon:'link'},{id:'text',label:'Note',icon:'note'}].map(btn=>(
            <button key={btn.id} onClick={()=>setAddType(addType===btn.id?null:btn.id)}
              style={{padding:'5px 11px',background:addType===btn.id?'var(--ts)':'var(--glass-bg2)',border:`1px solid ${addType===btn.id?'var(--tb)':'var(--glass-border)'}`,borderRadius:8,color:addType===btn.id?'var(--teal)':'var(--tx3)',fontFamily:'DM Sans,sans-serif',fontSize:'11px',fontWeight:700,cursor:'pointer',transition:'all .15s'}}>
              {btn.label}
            </button>
          ))}
          <span style={{fontSize:'11px',color:'var(--tx3)',marginLeft:4}}>or drag & drop · paste image/link</span>
        </div>
      </div>
      {/* Form panels */}
      {addType==='img'&&(
        <label style={{display:'flex',alignItems:'center',gap:8,marginTop:8,padding:'8px 12px',background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:9,color:'var(--tx2)',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>
          Choose image file
          <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleImgUpload}/>
        </label>
      )}
      {addType==='link'&&(
        <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
          <input value={urlDraft} onChange={e=>setUrlDraft(e.target.value)}
            onPaste={e=>{const t=e.clipboardData.getData('text');if(t.startsWith('http'))setUrlDraft(t.trim());}}
            placeholder="Paste URL — YouTube, website, anything..." style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:8,padding:'7px 10px',color:'var(--tx)',fontFamily:'DM Sans,sans-serif',fontSize:'12px',outline:'none',width:'100%'}}/>
          <input value={urlLabel} onChange={e=>setUrlLabel(e.target.value)} placeholder="Label (optional)"
            style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:8,padding:'7px 10px',color:'var(--tx)',fontFamily:'DM Sans,sans-serif',fontSize:'12px',outline:'none',width:'100%'}}/>
          <button onClick={addUrl} style={{alignSelf:'flex-start',padding:'6px 14px',background:'var(--ts)',border:'1px solid var(--tb)',borderRadius:8,color:'var(--teal)',fontFamily:'DM Sans,sans-serif',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>Add link</button>
        </div>
      )}
      {addType==='text'&&(
        <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
          <textarea value={textDraft} onChange={e=>setTextDraft(e.target.value)} placeholder="Add a note, reminder or resource description..." rows={3}
            style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:8,padding:'8px 10px',color:'var(--tx)',fontFamily:'DM Sans,sans-serif',fontSize:'12px',resize:'none',outline:'none',width:'100%'}}/>
          <button onClick={addText} style={{alignSelf:'flex-start',padding:'6px 14px',background:'var(--ts)',border:'1px solid var(--tb)',borderRadius:8,color:'var(--teal)',fontFamily:'DM Sans,sans-serif',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>Save note</button>
        </div>
      )}
    </div>
  );
}

// ── REFS PANEL: inline filmstrip for slides, upload for all sessions ──
function RefsPanel({refs,sessionKey}){
  const [lbItems,setLbItems]=React.useState(null);
  const [lbStart,setLbStart]=React.useState(0);
  const [uploads,setUploads]=useLocalStorage('uploads-'+sessionKey,[]);
  const [artistUploads,setArtistUploads]=useLocalStorage('artist-uploads-'+sessionKey,{});
  const [addType,setAddType]=React.useState(null);
  const [textDraft,setTextDraft]=React.useState('');
  const [urlDraft,setUrlDraft]=React.useState('');
  const [urlLabel,setUrlLabel]=React.useState('');
  const {teacherMode}=React.useContext(KWContext);

  const slideRefs=(refs||[]).filter(r=>r.type==='slide');
  const allSlides=[
    ...slideRefs.map((r,i)=>({src:r.embeddedSrc||(uploads[i]&&uploads[i].src)||null,caption:r.name,embedded:!!r.embeddedSrc})),
    ...uploads.filter((_,i)=>i>=slideRefs.length).map(u=>({src:u.src,caption:u.name,embedded:false}))
  ].filter(s=>s.src);

  const openSlides=(startIdx)=>{setLbItems(allSlides.map(s=>({type:'image',src:s.src,caption:s.caption})));setLbStart(startIdx);};

  const handleImgUpload=(e)=>{
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setUploads(prev=>[...prev,{src:ev.target.result,name:file.name,type:'image'}]);
      r.readAsDataURL(file);
    });
    e.target.value='';
  };

  const addText=()=>{if(textDraft.trim()){setUploads(prev=>[...prev,{type:'text',content:textDraft.trim(),name:'Note'}]);setTextDraft('');setAddType(null);}};
  const addUrl=()=>{if(urlDraft.trim()){setUploads(prev=>[...prev,{type:'link',url:urlDraft.trim(),name:urlLabel||urlDraft.trim()}]);setUrlDraft('');setUrlLabel('');setAddType(null);}};
  const delUpload=(i)=>setUploads(prev=>prev.filter((_,idx)=>idx!==i));

  const nonSlideRefs=(refs||[]).filter(r=>r.type!=='slide');

  return(
    <div>
      {/* SLIDES FILMSTRIP */}
      {(allSlides.length>0||slideRefs.length>0)&&(
        <div style={{marginBottom:14}}>
          <div className="pl" style={{marginBottom:8}}>Presentation Slides</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {slideRefs.map((r,i)=>{
              const src=r.embeddedSrc||(uploads[i]&&uploads[i].src)||null;
              return(
                <div key={i} onClick={()=>src&&openSlides(allSlides.findIndex(s=>s.src===src))}
                  style={{width:90,height:68,borderRadius:8,border:`1px solid ${src?'var(--glass-border2)':'var(--glass-border)'}`,overflow:'hidden',cursor:src?'pointer':'default',background:'var(--glass-bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:'0 0 auto',transition:'border-color .15s'}}>
                  {src?<img src={src} alt={r.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:
                    <div style={{textAlign:'center',padding:4}}><div style={{marginBottom:2,display:"flex",justifyContent:"center"}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{color:"var(--tx3)"}}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div><div style={{fontSize:'9px',fontWeight:800,color:'var(--tx3)'}}>Upload below</div></div>}
                  <div style={{position:'absolute',fontSize:'9px',fontWeight:800,background:'rgba(0,0,0,0.55)',color:'#fff',padding:'1px 4px',borderRadius:'0 0 4px 4px',bottom:0,left:0,right:0,textAlign:'center',pointerEvents:'none'}}>{r.name}</div>
                </div>
              );
            })}
          </div>
          {allSlides.length>1&&<div style={{fontSize:'11px',color:'var(--tx3)',marginTop:5}}>Click any slide · use ← → to navigate</div>}
          {allSlides.length===1&&<div style={{fontSize:'11px',color:'var(--tx3)',marginTop:5}}>Click to view full size</div>}
        </div>
      )}

      {/* ARTIST REFS */}
      {nonSlideRefs.length>0&&(
        <div style={{marginBottom:12}}>
          <div className="pl" style={{marginBottom:8}}>Artists & References</div>
          {nonSlideRefs.map((r,i)=>{
            const isVid=!!r.videoUrl;
            const vid=isVid?ytId(r.videoUrl):null;
            const thumb=vid?`https://img.youtube.com/vi/${vid}/mqdefault.jpg`:null;
            const artImg=artistUploads[i]||null;
            const handleArtUpload=(e)=>{
              const file=e.target.files[0];if(!file)return;
              const rd=new FileReader();
              rd.onload=ev=>setArtistUploads(prev=>({...prev,[i]:{src:ev.target.result,name:file.name}}));
              rd.readAsDataURL(file);
              e.target.value='';
            };
            const removeArtImg=()=>setArtistUploads(prev=>{const n={...prev};delete n[i];return n;});
            return(
              <div key={i} className="ref-card">
                <div className="ref-top" style={{alignItems:'flex-start',gap:10}}>
                  <span className={`ref-type rt-${isVid?'video':r.type}`}>{isVid?'video':r.type}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="ref-name">{r.name}</div>
                    {r.work&&<div className="ref-work">{r.work}</div>}
                    <div className="ref-why" style={{marginTop:4}}>{r.why}</div>
                    {isVid&&<div style={{fontSize:'11px',color:'var(--sky)',marginTop:5,fontWeight:600,cursor:'pointer'}}
                      onClick={()=>{setLbItems([{type:'video',src:r.videoUrl,caption:`${r.name}${r.work?' — '+r.work:''}`}]);setLbStart(0);}}>▶ Click to watch</div>}
                  </div>
                  {thumb&&(
                    <div style={{width:64,height:44,borderRadius:6,overflow:'hidden',flexShrink:0,position:'relative',cursor:'pointer'}}
                      onClick={()=>{setLbItems([{type:'video',src:r.videoUrl,caption:`${r.name}${r.work?' — '+r.work:''}`}]);setLbStart(0);}}>
                      <img src={thumb} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.28)'}}>
                        <div style={{width:20,height:20,borderRadius:'50%',background:'rgba(255,50,30,0.9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',paddingLeft:2}}>▶</div>
                      </div>
                    </div>
                  )}
                </div>
                {/* Per-artist image upload */}
                {artImg?(
                  <div style={{marginTop:8,position:'relative'}}>
                    <img src={artImg.src} alt={artImg.name} onClick={()=>{setLbItems([{type:'image',src:artImg.src,caption:`${r.name}${r.work?' — '+r.work:''}`}]);setLbStart(0);}}
                      style={{width:'100%',maxHeight:140,objectFit:'cover',borderRadius:6,cursor:'pointer',display:'block'}}/>
                    {teacherMode&&<button onClick={removeArtImg}
                      style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,0.55)',border:'none',borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#fff',fontSize:10}}>✕</button>}
                  </div>
                ):(
                  teacherMode&&(
                    <label style={{display:'inline-flex',alignItems:'center',gap:5,marginTop:8,fontSize:'11px',color:'var(--tx3)',cursor:'pointer',padding:'4px 8px',borderRadius:6,border:'1px dashed var(--glass-border2)',transition:'border-color .15s'}}>
                      <span style={{fontSize:13}}>+</span> Add reference image
                      <input type="file" accept="image/*" onChange={handleArtUpload} style={{display:'none'}}/>
                    </label>
                  )
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* MY RESOURCES — redesigned */}
      <div style={{marginTop:4}}>
        <div className="pl" style={{marginBottom:10}}>My Resources</div>
        {teacherMode&&(
          <ResourceAdder onAdd={(item)=>setUploads(prev=>[...prev,item])} addType={addType} setAddType={setAddType}
            textDraft={textDraft} setTextDraft={setTextDraft} urlDraft={urlDraft} setUrlDraft={setUrlDraft}
            urlLabel={urlLabel} setUrlLabel={setUrlLabel} addText={addText} addUrl={addUrl} handleImgUpload={handleImgUpload}/>
        )}
        {uploads.length>0?(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8,marginTop:teacherMode?10:0}}>
            {uploads.map((u,i)=>(
              <ResourceCard key={i} u={u} onDelete={teacherMode?()=>delUpload(i):null}
                onView={()=>{
                  const vid=u.type==='link'&&u.url?ytId(u.url):null;
                  if(u.type==='image'){setLbItems([{type:'image',src:u.src,caption:u.name}]);setLbStart(0);}
                  else if(vid){setLbItems([{type:'video',src:`https://www.youtube.com/embed/${vid}`,caption:u.name||u.url}]);setLbStart(0);}
                }}/>
            ))}
          </div>
        ):(
          <div style={{fontSize:'12px',color:'var(--tx3)',marginTop:10,textAlign:'center',padding:'16px 0'}}>
            {teacherMode?'No resources yet — drop files, paste a link, or use the buttons above.':'No resources added.'}
          </div>
        )}
      </div>

      {lbItems&&<Lightbox items={lbItems} startIndex={lbStart} onClose={()=>setLbItems(null)}/>}
    </div>
  );
}

/* ── STEP LIGHTBOX COMPONENT ── */
function StepLightbox({steps,startIndex,pm,tickedSteps,onTick,onClose}){
  const [idx,setIdx]=React.useState(startIndex||0);
  const step=steps[idx];
  const isTicked=!!tickedSteps[idx];
  const prev=()=>setIdx(i=>Math.max(0,i-1));
  const next=()=>setIdx(i=>Math.min(steps.length-1,i+1));

  React.useEffect(()=>{
    const handle=(e)=>{
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft') prev();
      if(e.key==='ArrowRight') next();
    };
    window.addEventListener('keydown',handle);
    return()=>window.removeEventListener('keydown',handle);
  },[onClose]);

  if(!step) return null;
  return(
    <div className="slb-overlay" onClick={onClose}>
      <div className="slb-card" onClick={e=>e.stopPropagation()}>
        <div className="slb-meta">
          <div className="slb-num" style={{background:pm.s,color:pm.l}}>{idx+1}</div>
          <span className="slb-of">Step {idx+1} of {steps.length}</span>
        </div>
        {step.t&&<div className="slb-title">{step.t}</div>}
        <div className="slb-text">{step.s}</div>
        <div className="slb-tick-row">
          <button className={`slb-tick-btn ${isTicked?'ticked':'unticked'}`} onClick={()=>onTick(idx)}
            style={{
              width:36,height:36,borderRadius:'50%',padding:0,
              display:'flex',alignItems:'center',justifyContent:'center',
              border:`2px solid ${isTicked?'var(--teal)':'var(--glass-border2)'}`,
              background:isTicked?'transparent':'var(--glass-bg)',
              position:'relative',flexShrink:0,
            }}>
            {isTicked&&<div style={{width:14,height:14,borderRadius:'50%',background:'var(--teal)',boxShadow:'0 0 8px rgba(59,191,160,0.6)'}}/>}
          </button>
          <span style={{fontSize:'12px',fontWeight:700,color:isTicked?'var(--teal)':'var(--tx3)'}}>
            {isTicked?'Done':'Mark done'}
          </span>
        </div>
        <div className="slb-nav-row">
          <button className="slb-nav-btn" onClick={prev} disabled={idx===0}>← Previous</button>
          <span style={{fontSize:11,color:'var(--tx3)',fontWeight:600}}>{idx+1} / {steps.length}</span>
          <button className="slb-nav-btn" onClick={next} disabled={idx===steps.length-1}>Next →</button>
        </div>
      </div>
      <button className="slb-close" onClick={onClose} style={{display:"flex",alignItems:"center",justifyContent:"center"}}>{IC.close}</button>
    </div>
  );
}

function SessionCard({s,color,phaseId,progress,toggle,classView,openSession,setOpenSession,isVisitor}){
  const open=openSession===s.n;
  const setOpen=(val)=>setOpenSession(val?s.n:null);
  const [tab,setTab]=React.useState('overview');
  const isDone=!!progress[phaseId+':'+s.n];
  const pm=PM[color];
  const {teacherMode}=React.useContext(KWContext);
  const slideRefs=s.refs?s.refs.filter(r=>r.type==='slide'):[];
  let slideCount=0;

  // Per-step tick state persisted in localStorage
  const stepKey='steps-'+phaseId+'-'+s.n;
  const [tickedSteps,setTickedSteps]=useLocalStorage(stepKey,{});
  const [slbOpen,setSlbOpen]=React.useState(false);
  const [slbStart,setSlbStart]=React.useState(0);

  const toggleStepTick=React.useCallback((i)=>{
    setTickedSteps(prev=>({...prev,[i]:!prev[i]}));
  },[setTickedSteps]);
  const tickAll=()=>setTickedSteps(Object.fromEntries(s.activity.map((_,i)=>[i,true])));
  const uncheckAll=()=>setTickedSteps({});
  const allDone=s.activity.every((_,i)=>tickedSteps[i]);
  const anyDone=s.activity.some((_,i)=>tickedSteps[i]);

  // In class view, auto-open and default to activity tab
  React.useEffect(()=>{if(classView){setTab('activity');}else{setTab('overview');}},[classView]);

  const visibleTabs=classView
    ?[{id:'activity',label:'Activity'},{id:'overview',label:'Session Info'},{id:'references',label:'References'}]
    :[{id:'overview',label:'Overview'},{id:'activity',label:'Activity'},{id:'references',label:'References'},{id:'notes',label:'My Notes'}];

  return(
    <div className={`sc ${isDone?'done':''} ${open?'open-card':''}`} style={{background:isDone&&!open?'rgba(59,191,160,0.03)':''}}>
      {s.cluster&&(
        <div style={{padding:'5px 15px 0',fontSize:'10px',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:pm.l,opacity:.7}}>

        <div className="sc-info">

          </div>
          <div className="sc-tags">
            {s.tags.map((tg,i)=><TagPill key={i} label={tg.l} colorClass={TM[tg.c]||'t-sky'}/>)}

          </div>
        </div>
        <div className="sc-right">

            <button
              onClick={e=>{e.stopPropagation();generateSessionPDF(s,color);}}

                borderRadius:8,color:'var(--tx3)',fontFamily:"'DM Sans',sans-serif",
                fontSize:'10px',fontWeight:800,padding:'4px 9px',cursor:'pointer',
                transition:'all .15s',flexShrink:0
              }}
              onMouseEnter={e=>{e.currentTarget.style.background='var(--glass-bg2)';e.currentTarget.style.color='var(--tx)';}}
              onMouseLeave={e=>{e.currentTarget.style.background='var(--glass-bg)';e.currentTarget.style.color='var(--tx3)';}}>

          {!classView&&<div className={`sc-chk ${isDone?'checked':''}`} onClick={e=>{e.stopPropagation();if(!isVisitor)toggle(phaseId,s.n);}} title={isVisitor?'Sign in to mark sessions':isDone?'Mark incomplete':'Mark complete'} style={isVisitor?{opacity:0.4,cursor:'not-allowed'}:{}}>{isDone?'✓':''}</div>}
          <span className={`sc-chev ${open?'open':''}`}>▼</span>

                  <div className="tn-tx">{s.bridge}</div>

          {tab==='activity'&&(
            <div className="sc-panel active">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div className="pl" style={{margin:0}}>Step by Step — click any step to expand</div>
                <div className="step-controls">
                  {anyDone&&<button className="step-ctrl-btn" onClick={uncheckAll}>Uncheck all</button>}
                  {!allDone&&<button className="step-ctrl-btn" onClick={tickAll}>Tick all</button>}
                </div>
              </div>
              {s.activity.map((step,i)=>(
                <div key={i} className={`step ${tickedSteps[i]?'step-done':''}`}
                  onClick={()=>{setSlbStart(i);setSlbOpen(true);}}>
                  <span className="step-n" style={{background:pm.s,color:pm.l}}>{i+1}</span>
                  <div style={{flex:1,minWidth:0}}>
                    {step.t&&<div style={{fontSize:'12px',fontWeight:800,color:tickedSteps[i]?'var(--teal)':'var(--tx)',marginBottom:'3px'}}>{step.t}</div>}
                    <span className="step-t">{step.s}</span>

                  <div className="step-tick"/>
                </div>

              {slbOpen&&<StepLightbox steps={s.activity} startIndex={slbStart} pm={pm} tickedSteps={tickedSteps} onTick={toggleStepTick} onClose={()=>setSlbOpen(false)}/>}

              <NotesTab noteKey={'notes-'+phaseId+'-'+s.n}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Timer(){
  const [open,setOpen]=React.useState(false);
  const [fullscreen,setFullscreen]=React.useState(false);
  const [total,setTotal]=React.useState(0);
  const [remaining,setRemaining]=React.useState(0);
  const [running,setRunning]=React.useState(false);
  const [customVal,setCustomVal]=React.useState('');
  const [customUnit,setCustomUnit]=React.useState('min');
  const [pos,setPos]=React.useState({x:null,y:null});
  const [dragging,setDragging]=React.useState(false);
  const dragRef=React.useRef(null);
  const fabRef=React.useRef(null);
  const iconBtnRef=React.useRef(null);
  const intervalRef=React.useRef(null);
  const audioCtxRef=React.useRef(null);

  const beep=React.useCallback((freq=880,dur=0.15,vol=0.35)=>{
    try{
      if(!audioCtxRef.current||audioCtxRef.current.state==='closed'){
        audioCtxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      }
      if(audioCtxRef.current.state==='suspended') audioCtxRef.current.resume();
      const ctx=audioCtxRef.current;
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(vol,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur+0.05);
    }catch(e){}
  },[]);

  React.useEffect(()=>{
    if(running&&remaining>0){
      intervalRef.current=setInterval(()=>{
        setRemaining(r=>{
          const next=r<=1?0:r-1;
          if(next===0){
            setRunning(false);
            setTimeout(()=>beep(523,0.25,0.5),0);
            setTimeout(()=>beep(659,0.25,0.5),280);
            setTimeout(()=>beep(784,0.5,0.5),560);
          } else if(next<=5){
            beep(330+next*30,0.1,0.22);
          }
          return next;
        });
      },1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return()=>clearInterval(intervalRef.current);
  },[running,remaining,beep]);

  // Drag on the icon button only
  const onIconMouseDown=React.useCallback((e)=>{
    if(open) return; // don't drag when panel is open — click to toggle
    e.preventDefault();
    const fab=fabRef.current.getBoundingClientRect();
    dragRef.current={ox:e.clientX-fab.left,oy:e.clientY-fab.top,moved:false};
    setDragging(true);
  },[open]);

  React.useEffect(()=>{
    if(!dragging) return;
    const move=(e)=>{
      dragRef.current.moved=true;
      const nx=e.clientX-dragRef.current.ox;
      const ny=e.clientY-dragRef.current.oy;
      setPos({x:Math.max(0,Math.min(nx,window.innerWidth-56)),y:Math.max(0,Math.min(ny,window.innerHeight-56))});
    };
    const up=()=>setDragging(false);
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  },[dragging]);

  // ESC closes fullscreen
  React.useEffect(()=>{
    if(!fullscreen) return;
    const h=(e)=>{if(e.key==='Escape') setFullscreen(false);};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[fullscreen]);

  const setTimeSecs=(secs)=>{setTotal(secs);setRemaining(secs);setRunning(false);};
  const addTime=(secs)=>{setTotal(t=>t+secs);setRemaining(r=>r+secs);};
  const start=()=>{
    if(remaining>0){
      if(audioCtxRef.current?.state==='suspended') audioCtxRef.current.resume();
      setRunning(true);
    }
  };
  const pause=()=>setRunning(false);
  const reset=()=>{setRunning(false);setRemaining(total);};

  const handleSet=()=>{
    const n=Number(customVal);
    if(!n||n<=0) return;
    setTimeSecs(customUnit==='sec'?Math.round(n):Math.round(n*60));
    setCustomVal('');
  };

  const mm=Math.floor(remaining/60);
  const ss=remaining%60;
  const pct=total?Math.max(0,(total-remaining)/total):0;

  const timerColor=React.useMemo(()=>{
    if(!total||remaining===total) return '#3BBFA0';
    const ratio=remaining/total;
    if(ratio>0.6) return '#3BBFA0';
    if(ratio>0.35){const t=(0.6-ratio)/0.25;return `hsl(${Math.round(160-t*80)},72%,52%)`;}
    if(ratio>0.15){const t=(0.35-ratio)/0.2;return `hsl(${Math.round(80-t*50)},78%,52%)`;}
    return '#E8705A';
  },[remaining,total]);

  const fabStyle=pos.x!==null
    ?{position:'fixed',left:pos.x+'px',top:pos.y+'px',bottom:'auto',right:'auto'}
    :{};

  const displayTime=mm>0
    ?`${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
    :String(ss).padStart(2,'0');

  const doneLabel=remaining===0&&total>0?'Done!':running?'Running':'Ready';

  // Fullscreen overlay
  if(fullscreen) return(
    <div className="timer-fullscreen">
      <button className="tf-close" onClick={()=>setFullscreen(false)}>✕</button>
      {/* Arc */}
      <svg width={220} height={120} style={{display:'block'}}>
        <path d="M 10 110 A 100 100 0 0 1 210 110" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="8" strokeLinecap="round"/>
        {total>0&&<path d="M 10 110 A 100 100 0 0 1 210 110" fill="none" stroke={timerColor} strokeWidth="8" strokeLinecap="round"
          strokeDasharray="314" strokeDashoffset={314*(1-pct)} style={{transition:'stroke-dashoffset 1s linear,stroke .5s'}}/>}
      </svg>
      <div className="tf-time" style={{color:timerColor,marginTop:-30}}>{displayTime}</div>
      <div className="tf-label">{doneLabel}</div>
      {/* Add time */}
      {running&&(
        <div className="tf-add">
          <span style={{fontSize:'12px',color:'var(--tx3)',fontWeight:700,marginRight:4}}>+ Add</span>
          {[1,5].map(m=><button key={m} className="tf-add-btn" onClick={()=>addTime(m*60)}>+{m}m</button>)}
        </div>
      )}
      {/* Presets */}
      {!running&&<div className="tf-presets">
        {[5,10,15,20,30].map(m=><button key={m} className="tf-preset" onClick={()=>setTimeSecs(m*60)}>{m}m</button>)}
      </div>}
      {/* Custom set */}
      {!running&&(
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input className="tp-input" type="number" min="1" placeholder="Custom"
            value={customVal} onChange={e=>setCustomVal(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSet()}
            style={{width:90}}/>
          <select value={customUnit} onChange={e=>setCustomUnit(e.target.value)}
            style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:9,padding:'6px 8px',color:'var(--tx2)',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',fontWeight:700,outline:'none',cursor:'pointer'}}>
            <option value="min">min</option>
            <option value="sec">sec</option>
          </select>
          <button className="tp-set-btn" style={{padding:'7px 16px',fontSize:'13px'}} onClick={handleSet}>Set</button>
        </div>
      )}
      {/* Controls */}
      <div className="tf-btns">
        {!running
          ?<button className="tf-btn tf-btn-start" onClick={start}>▶ Start</button>
          :<button className="tf-btn tf-btn-pause" onClick={pause}>⏸ Pause</button>
        }
        <button className="tf-btn tf-btn-stop" onClick={reset} title="Reset">■</button>
      </div>
    </div>
  );

  return(
    <div className="timer-fab" ref={fabRef} style={{...fabStyle}}>
      {open&&(
        <div className="timer-panel">
          {/* Expand to fullscreen */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:'10px',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--tx3)'}}>Timer</span>
            <button onClick={()=>{setFullscreen(true);setOpen(false);}}
              style={{background:'none',border:'none',color:'var(--tx3)',cursor:'pointer',fontSize:'11px',fontWeight:800,padding:'2px 6px',borderRadius:6,transition:'color .15s'}}
              title="Fullscreen">⤢</button>
          </div>

          {/* Arc + time */}
          <div className="tp-display">
            <svg width={90} height={50} style={{display:'block',margin:'0 auto 2px'}}>
              <path d="M 8 46 A 38 38 0 0 1 82 46" fill="none" stroke="var(--glass-bg3)" strokeWidth="5" strokeLinecap="round"/>
              {total>0&&<path d="M 8 46 A 38 38 0 0 1 82 46" fill="none" stroke={timerColor} strokeWidth="5" strokeLinecap="round"
                strokeDasharray="119" strokeDashoffset={119*(1-pct)} style={{transition:'stroke-dashoffset 1s linear,stroke .5s'}}/>}
            </svg>
            <span className="tp-time" style={{color:timerColor,fontSize:mm>0?'36px':'44px',letterSpacing:'-1px'}}>{displayTime}</span>
            <div className="tp-label">{doneLabel}</div>
          </div>

          {/* Quick set */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:4,marginBottom:8}}>
            {[5,10,15,20].map(min=>(
              <button key={min} className="tp-preset" onClick={()=>setTimeSecs(min*60)}>{min}m</button>
            ))}
          </div>

          {/* Custom */}
          <div style={{display:'flex',gap:5,marginBottom:9,alignItems:'stretch'}}>
            <input className="tp-input" type="number" min="1" placeholder="Custom"
              value={customVal} onChange={e=>setCustomVal(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleSet()}
              style={{flex:1,minWidth:0}}/>
            <select value={customUnit} onChange={e=>setCustomUnit(e.target.value)}
              style={{background:'var(--glass-bg2)',border:'1px solid var(--glass-border)',borderRadius:9,
                padding:'0 6px',color:'var(--tx2)',fontFamily:"'DM Sans',sans-serif",
                fontSize:'11px',fontWeight:700,outline:'none',cursor:'pointer',flexShrink:0}}>
              <option value="min">min</option>
              <option value="sec">sec</option>
            </select>
            <button className="tp-set-btn" onClick={handleSet}>Set</button>
          </div>

          {/* Add time (visible while running) */}
          {running&&(
            <div style={{display:'flex',gap:4,marginBottom:8}}>
              <span style={{fontSize:'10px',fontWeight:800,color:'var(--tx3)',alignSelf:'center',marginRight:2}}>+</span>
              {[1,5].map(m=><button key={m} className="tp-preset" onClick={()=>addTime(m*60)}>+{m}m</button>)}
            </div>
          )}

          {/* Controls */}
          <div className="tp-btns">
            {!running
              ?<button className="tp-btn tp-btn-start" onClick={start}>▶ Start</button>
              :<button className="tp-btn tp-btn-pause" onClick={pause}>⏸ Pause</button>
            }
            <button className="tp-btn tp-btn-stop" onClick={reset} title="Reset">■</button>
          </div>
        </div>
      )}
      <button ref={iconBtnRef} className="timer-icon-btn"
        onMouseDown={onIconMouseDown}
        onClick={()=>{if(!dragging&&(!dragRef.current||!dragRef.current.moved)) setOpen(o=>!o);}}
        title="Class timer"
        style={{
          borderColor:running?timerColor:'var(--glass-border2)',
          boxShadow:running?`0 0 16px ${timerColor}55,var(--glass-shadow2)`:'var(--glass-shadow2),var(--inset)'
        }}>
        <span style={{color:'var(--tx2)',fontSize:20}}>⏱</span>
      </button>
    </div>
  );
}


// ── EXPORT: bake localStorage into a portable HTML file ──
function exportHTML(){
  const html=document.documentElement.outerHTML;
  // Collect all localStorage keys
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    data[k]=localStorage.getItem(k);
  }
  const injection=`<script id="__ls_seed__">
(function(){var d=${JSON.stringify(data)};Object.keys(d).forEach(function(k){try{localStorage.setItem(k,d[k]);}catch(e){}});var s=document.getElementById('__ls_seed__');if(s)s.parentNode.removeChild(s);})();
<\/script>`;
  // Insert injection right after <body>
  const out=html.replace(/<body>/,'<body>'+injection);
  const blob=new Blob([out],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);

  doc.setTextColor(18,22,40);
  const objL=doc.splitTextToSize(s.objective,CW);
  objL.forEach(l=>{chk(5);doc.text(l,M,y);y+=5.8;});
  y+=4;

  // ── OVERVIEW ──
  section('Session Overview');

  y+=4;

  // ── MATERIALS + KEYWORDS side by side ──
  chk(32);

  const rx=M+half+8;
  const sideY=y;

  // Left: Materials
  doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(ac[0],ac[1],ac[2]);
  doc.text('MATERIALS',M,y);y+=4;
  doc.setDrawColor(ac[0],ac[1],ac[2]);doc.setLineWidth(0.15);doc.line(M,y,M+half,y);y+=4;
  s.mats.forEach(m=>{
    chk(5);
    doc.setFillColor(ac[0],ac[1],ac[2]);
    doc.circle(M+1.2,y-0.8,0.9,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(55,60,80);
    doc.splitTextToSize(m,half-6).forEach(l=>{doc.text(l,M+5,y);y+=4.8;});

  // Right: Keywords
  let ky=sideY;
  doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(ac[0],ac[1],ac[2]);
  doc.text('KEY WORDS',rx,ky);ky+=4;
  doc.setDrawColor(ac[0],ac[1],ac[2]);doc.setLineWidth(0.15);doc.line(rx,ky,rx+half,ky);ky+=4;
  s.kws.forEach(k=>{
    const kobj=KWS.find(kw=>kw.w===k);
    doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(ac[0],ac[1],ac[2]);
    doc.text(k,rx,ky);ky+=4.5;
    if(kobj){
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120,125,145);
      doc.splitTextToSize(kobj.s,half-2).forEach(l=>{doc.text(l,rx,ky);ky+=3.8;});
      ky+=1;
    }

  y=Math.max(y,ky)+8;

  // ── BIG QUESTIONS ──
  section('Big Questions');
  s.bigQ.forEach((q,i)=>{
    chk(12);
    doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(80,85,108);

    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(ac[0],ac[1],ac[2]);

    doc.splitTextToSize(q,CW-7).forEach(l=>{doc.text(l,M+6,y);y+=5.2;});

    doc.circle(M+3.5,y+0.5,3.5,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(255,255,255);

      doc.text(tl[0],M+10,y+1.5);

    } else {y+=6;}

    // Step detail
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(75,80,100);
    doc.splitTextToSize(step.s,CW-10).forEach(l=>{chk(5);doc.text(l,M+10,y);y+=4.8;});
    y+=5;
  });

  // ── TEACHER NOTE ──
  if(s.tn){
    chk(22);
    section('Teacher Note');
    const tnLines=doc.splitTextToSize(s.tn,CW-8);
    const tnH=tnLines.length*5+10;
    chk(tnH);
    doc.setFillColor(250,251,253);
    doc.roundedRect(M,y-2,CW,tnH,2,2,'F');
    doc.setFillColor(ac[0],ac[1],ac[2]);
    doc.rect(M,y-2,2,tnH,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(70,75,95);
    tnLines.forEach(l=>{doc.text(l,M+6,y);y+=5;});

    doc.splitTextToSize(s.bridge,CW).forEach(l=>{chk(5);doc.text(l,M,y);y+=5.2;});

  const nonSlide=(s.refs||[]).filter(r=>r.type!=='slide');
  if(nonSlide.length){
    chk(20);
    section('Artists & References');

      doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(18,22,40);
      doc.text(r.name,M,y);
      if(r.work){

        doc.text('  '+r.work,M+doc.getTextWidth(r.name),y);
      }
      y+=5;
      if(r.why){

        doc.splitTextToSize(r.why,CW).forEach(l=>{chk(4);doc.text(l,M,y);y+=4.4;});

  // ── FOOTER ──

    doc.text(`Order & Chaos  ·  Grade 4  ·  Session ${s.n}: ${s.title}`,M,292);
    doc.text(`${p} / ${pages}`,W-M,292,{align:'right'});
    if(p>1) drawPageHeader();
  }

  doc.save(`lesson-plan-session-${s.n}.pdf`);
}

  soiLines.forEach(l=>{y+=5.8;doc.text(l,M+6,y);});
  y+=10;

  // Phase-by-phase
  section('Phase-by-Phase Breakdown',PA.teal);
  PHASES.forEach(phase=>{
    chk(28);
    const ac=PA[phase.color]||PA.coral;

    // Phase header
    doc.setFillColor(250,251,253);doc.roundedRect(M,y-2,CW,18,2,2,'F');
    doc.setFillColor(ac[0],ac[1],ac[2]);doc.rect(M,y-2,2.5,18,'F');

    doc.text(phase.name,M+7,y+5);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(165,170,185);
    doc.text(phase.months,W-M,y+5,{align:'right'});
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(80,85,105);
    const subLines=doc.splitTextToSize(phase.sub,CW-40);
    doc.text(subLines[0],M+7,y+12);
    y+=24;

    // Session rows
    phase.sessions.forEach(s=>{
      chk(14);
      doc.setFillColor(252,252,254);doc.rect(M,y-1,CW,11,'F');
      doc.setFillColor(ac[0],ac[1],ac[2]);doc.rect(M,y-1,1.5,11,'F');

      doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(ac[0],ac[1],ac[2]);

      doc.text(`${s.dur}  ·  ${s.tags.map(t=>t.l).join('  ·  ')}`,M+12,y+9);
      y+=13;
    });

    // Phase keywords strip
    const phKws=[...new Set(phase.sessions.flatMap(s=>s.kws))];
    chk(10);
    doc.setFillColor(250,251,253);doc.rect(M,y,CW,9,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(ac[0],ac[1],ac[2]);
    doc.text('KEYWORDS',M+3,y+5.5);
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(80,85,105);
    doc.text(phKws.join('  ·  '),M+26,y+5.5);
    y+=15;
  });

  // All terminologies
  section('All Key Terminologies',PA.violet);
  const kwW=(CW-8)/2;
  let kwX=M, kwY=y, kwN=0;
  KWS.forEach(kw=>{
    if(kwY+12>283){doc.addPage();drawStripe();kwY=M;kwX=M;kwN=0;}
    const ac=PA[kw.c]||PA.coral;

  y=kwY+6;

  // Footer
  const pages=doc.internal.getNumberOfPages();

    doc.text(`${p} / ${pages}`,W-M,292,{align:'right'});
    if(p>1)drawStripe();
  }
  doc.save('grade4-unit-plan.pdf');
}

// Utility: hex to [r,g,b]
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}

// ── SUB PIN SYSTEM ──
const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE'; // Replace with your key

function generatePIN(){return String(Math.floor(1000+Math.random()*9000));}
function getPINStorageKey(sectionId){return 'g4-sub-pin-'+sectionId;}
function getSubPIN(sectionId){
  try{
    const d=JSON.parse(localStorage.getItem(getPINStorageKey(sectionId))||'null');
    if(!d) return null;
    if(Date.now()>d.expires) {localStorage.removeItem(getPINStorageKey(sectionId));return null;}
    return d;
  }catch{return null;}
}
function saveSubPIN(sectionId,pin,linkedDate,durationHours){
  const hrs = durationHours||8;
  const d={pin,expires:Date.now()+hrs*60*60*1000,linkedDate,sectionId};
  localStorage.setItem(getPINStorageKey(sectionId),JSON.stringify(d));
}

              }
              return(
                <div style={{position:'absolute',inset:0,cursor:dragging?'grabbing':'grab'}}
                  onMouseDown={e=>{e.stopPropagation();startDrag(e.clientX,e.clientY);}}
                  onMouseMove={e=>{moveDrag(e.clientX,e.clientY);}}
                  onMouseUp={endDrag}
                  onMouseLeave={endDrag}
                  onTouchStart={e=>{e.stopPropagation();const t=e.touches[0];startDrag(t.clientX,t.clientY);}}
                  onTouchMove={e=>{const t=e.touches[0];moveDrag(t.clientX,t.clientY);}}
                  onTouchEnd={endDrag}>
                  {student.photo
                    ?<img ref={imgRef} src={student.photo} draggable={false}
                        style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:`${photoPos.x}% ${photoPos.y}%`,userSelect:'none',pointerEvents:'none'}} alt=""/>
                    :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--glass-bg)',fontSize:80,opacity:.25}}>👤</div>}
                  {/* Drag hint — fades after first drag */}
                  {!dragging&&<div style={{position:'absolute',top:10,right:12,fontSize:9,color:'rgba(255,255,255,0.6)',background:'rgba(0,0,0,0.45)',padding:'3px 9px',borderRadius:8,backdropFilter:'blur(4px)',letterSpacing:'.04em',pointerEvents:'none',fontWeight:700}}>✎ Drag to reposition</div>}
                </div>
              );
            })()}
            {/* Gradient overlay — lighter, covers only bottom 30% strongly */}
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to top, rgba(5,10,20,0.94) 0%, rgba(5,10,20,0.65) 22%, rgba(5,10,20,0.1) 42%, transparent 58%)',pointerEvents:'none'}}/>
            {/* Decorative top border accent */}
            <div style={{position:'absolute',top:0,left:0,right:0,height:5,background:`linear-gradient(90deg,${accentCol},${accentCol}88,transparent)`,pointerEvents:'none'}}/>
            {/* Content at bottom — trump card style — tap this area to flip back */}
            <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'20px 22px 24px',cursor:'pointer',pointerEvents:'auto'}}
              onClick={e=>{e.stopPropagation();setFlipped(false);}}>
              {/* Name */}
              <div style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:700,color:'#fff',lineHeight:1.1,marginBottom:6,textShadow:'0 2px 8px rgba(0,0,0,0.7)'}}>{student.name}</div>
              {/* Colour bar */}
              <div style={{width:36,height:3,borderRadius:2,background:accentCol,marginBottom:10,opacity:.9}}/>
              {/* 4 stats in a row */}
              <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>
                {[
                  {l:'ATT',v:`${attendanceCount}/${totalSessions}`,pct:attPct},
                  {l:'OBS',v:obs.length},
                  {l:'👍',v:thumbsUp},
                  {l:'FLAGS',v:escalations||'–',red:escalations>0},
                ].map((st,i)=>(
                  <div key={i} style={{textAlign:'center'}}>
                    <div style={{fontSize:8,color:'rgba(255,255,255,0.55)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:1}}>{st.l}</div>
                    <div style={{fontSize:16,fontWeight:800,color:st.red?'var(--coral)':'#fff',lineHeight:1,textShadow:'0 1px 4px rgba(0,0,0,0.5)'}}>{st.v}</div>
                    {st.pct!==undefined&&<div style={{fontSize:8,color:'rgba(255,255,255,0.45)'}}>{st.pct}%</div>}
                  </div>
                ))}
              </div>
              {/* Top tag badges */}
              {topTags.length>0&&(
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {topTags.slice(0,3).map((t,i)=>{
                    const td=OBS_TAGS.find(x=>x.label===t);

                    return<span key={i} style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:10,background:'rgba(255,255,255,0.12)',border:`1px solid ${cl[td?td.color:'teal']||'rgba(255,255,255,0.3)'}`,color:cl[td?td.color:'teal']||'rgba(255,255,255,0.8)',backdropFilter:'blur(4px)'}}>{t}</span>;

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── COMBINED OBSERVATION POPUP (history + add new) ──
function CombinedObsPopup({studentIdx,student,artfilePending,observations,totalSessions,attendanceCount,onSave,onDeleteObs,onToggleArtfile,onClearEscalation,onPhotoChange,onClose,editMode,customTags,onAddCustomTag,onDeleteCustomTag}){
  const [tab,setTab]=React.useState('add'); // 'add' | 'history' | 'profile'
  const [thumb,setThumb]=React.useState(null);
  const [selTags,setSelTags]=React.useState([]);
  const [note,setNote]=React.useState('');
  const [showAddTag,setShowAddTag]=React.useState(false);
  const [newTagLabel,setNewTagLabel]=React.useState('');
  const [newTagColor,setNewTagColor]=React.useState('green');
  const today=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  const obs=observations||[];
  const hasEscalation=obs.some(o=>o.escalation&&!o.escalationCleared);
  const allTags=[...OBS_TAGS,...(customTags||[])];

  function toggleTag(label){setSelTags(prev=>prev.includes(label)?prev.filter(t=>t!==label):[...prev,label]);}
  function handleSave(){
    if(!thumb&&selTags.length===0&&!note.trim()) return;
    const isEscalation=selTags.includes('Bunking')||selTags.includes('Disruptive')||selTags.includes('Refuses to participate');
    onSave({thumb,tags:selTags,note:note.trim(),date:today,escalation:isEscalation});
    setThumb(null);setSelTags([]);setNote('');
    setTab('history');
  }
  function handleAddCustomTag(){
    if(!newTagLabel.trim())return;
    if(onAddCustomTag) onAddCustomTag({label:newTagLabel.trim(),color:newTagColor});
    setNewTagLabel('');setNewTagColor('green');setShowAddTag(false);
  }

  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div className="obs-popup" style={{height:540,display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="obs-popup-header" style={{flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {student.photo&&<div style={{width:52,height:52,borderRadius:'50%',overflow:'hidden',flexShrink:0,border:'2px solid var(--glass-border2)'}}><img src={student.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/></div>}
            <div className="obs-popup-name">{student.name}</div>
          </div>
          <button className="obs-popup-close" onClick={onClose}>✕</button>
        </div>


        {/* Artfile toggle — always visible */}

          <span style={{fontSize:11,fontWeight:700,color:'var(--tx3)',letterSpacing:'.05em',textTransform:'uppercase'}}>Artfile</span>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:artfilePending?'var(--coral)':'var(--teal)',fontWeight:600}}>{artfilePending?'Not received':'Received ✓'}</span>
            <div onClick={()=>onToggleArtfile()}
              style={{width:40,height:22,borderRadius:11,background:artfilePending?'rgba(232,112,90,0.3)':'rgba(59,191,160,0.3)',border:`1.5px solid ${artfilePending?'var(--coral)':'var(--teal)'}`,cursor:'pointer',position:'relative',transition:'all .2s'}}>
              <div style={{position:'absolute',top:2,left:artfilePending?2:18,width:16,height:16,borderRadius:'50%',background:artfilePending?'var(--coral)':'var(--teal)',transition:'left .2s'}}/>
            </div>
          </div>
        </div>

        {/* Escalation clear — only if active */}
        {hasEscalation&&(
          <div style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--glass-border)',marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:'var(--coral)'}}>⚠️ Escalation flagged</span>
            <button onClick={onClearEscalation} style={{fontSize:11,padding:'3px 10px',borderRadius:7,background:'rgba(232,112,90,0.12)',border:'1px solid rgba(232,112,90,0.3)',color:'var(--coral)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
              Clear flag
            </button>
          </div>
        )}

        {/* Tabs — Add Note only; History & Profile live on student name click */}
        <div style={{flexShrink:0,display:'flex',gap:0,marginBottom:10,background:'var(--glass-bg)',borderRadius:9,padding:3}}>
          {[{id:'add',label:'+ Add Note'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:'5px 0',borderRadius:7,border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,
                background:tab===t.id?'var(--glass-bg3)':'transparent',
                color:tab===t.id?'var(--tx)':'var(--tx3)',transition:'all .15s'}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ADD NOTE TAB */}
        {tab==='add'&&(
          <div style={{flex:1,overflowY:'auto'}}>
            <div className="obs-thumb-row" style={{gap:10}}>
              <div className={`obs-thumb${thumb==='up'?' selected-up':''}`} style={{flex:1,fontSize:28,padding:'12px 0'}} onClick={()=>setThumb(thumb==='up'?null:'up')}>👍</div>
              <div className={`obs-thumb${thumb==='down'?' selected-down':''}`} style={{flex:1,fontSize:28,padding:'12px 0'}} onClick={()=>setThumb(thumb==='down'?null:'down')}>👎</div>
            </div>
            <div className="obs-section-label">Tags</div>
            <div className="obs-tags">
              {allTags.map((t,i)=>(
                <span key={i} className={`obs-tag ${t.color}${selTags.includes(t.label)?' sel':''}`}
                  onClick={()=>toggleTag(t.label)} style={{position:'relative'}}>
                  {t.label}
                  {editMode&&(
                    <span onClick={e=>{e.stopPropagation();if((customTags||[]).find(ct=>ct.label===t.label)){if(onDeleteCustomTag)onDeleteCustomTag(t.label);}else{toggleTag(t.label);}}}
                      style={{marginLeft:4,fontSize:9,opacity:.7,fontWeight:800}}>✕</span>
                  )}
                </span>
              ))}
              {editMode&&!showAddTag&&(
                <span className="obs-tag" style={{background:'var(--glass-bg)',borderStyle:'dashed',cursor:'pointer',opacity:.7}}

              <div style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',borderRadius:10,padding:'10px 12px',marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
                <input className="modal-input" value={newTagLabel} onChange={e=>setNewTagLabel(e.target.value)}
                  placeholder="Tag label..." style={{padding:'6px 10px',fontSize:12}}/>
                <div style={{display:'flex',gap:6}}>
                  {['green','yellow','red'].map(c=>(
                    <span key={c} onClick={()=>setNewTagColor(c)}
                      style={{flex:1,textAlign:'center',padding:'4px 0',borderRadius:7,cursor:'pointer',fontSize:11,fontWeight:700,
                        background:c==='green'?'rgba(59,191,160,0.2)':c==='yellow'?'rgba(212,168,67,0.2)':'rgba(232,112,90,0.2)',
                        border:`1.5px solid ${c==='green'?'var(--teal)':c==='yellow'?'var(--yellow)':'var(--coral)'}`,
                        color:c==='green'?'var(--teal)':c==='yellow'?'var(--yellow)':'var(--coral)',
                        opacity:newTagColor===c?1:0.45}}>
                      {c.charAt(0).toUpperCase()+c.slice(1)}
                    </span>
                  ))}
                </div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>{setShowAddTag(false);setNewTagLabel('');}} style={{flex:1,padding:'5px 0',borderRadius:8,border:'1px solid var(--glass-border)',background:'var(--glass-bg)',color:'var(--tx3)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:11}}>Cancel</button>
                  <button onClick={handleAddCustomTag} style={{flex:1,padding:'5px 0',borderRadius:8,border:'1px solid var(--teal)',background:'rgba(59,191,160,0.2)',color:'var(--teal)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700}}>Add Tag</button>
                </div>
              </div>
            )}
            <div className="obs-section-label">Quick Note</div>
            <textarea className="obs-note-input" placeholder="Write a quick observation..." value={note} onChange={e=>setNote(e.target.value)}/>
            <button className="obs-save-btn" onClick={handleSave}>Save Observation</button>
          </div>
        )}
      </div>
    </div>
  );
}

// Inline profile (no overlay, used inside combined popup)
function StudentProfileModal({student,attendanceCount,totalSessions,onClose,inline}){
  const [profile,setProfile]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const obs=student.observations||[];
  const allTags=obs.flatMap(o=>o.tags||[]);
  const tagFreq={};
  allTags.forEach(t=>{tagFreq[t]=(tagFreq[t]||0)+1;});
  const topTags=Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t])=>t);
  const thumbsUp=obs.filter(o=>o.thumb==='up').length;
  const thumbsDown=obs.filter(o=>o.thumb==='down').length;
  const escalations=obs.filter(o=>o.escalation&&!o.escalationCleared).length;
  const notes=obs.filter(o=>o.note).map(o=>o.note);

  async function generateProfile(){
    setLoading(true);setProfile('');
    const prompt=`You are a warm, encouraging art teacher writing a brief student profile for a Grade 4 student. Tone: supportive, positive, growth-focused. Mention concerns very gently as areas of growth, never harshly.

Student: ${student.name}
Attendance: ${attendanceCount}/${totalSessions} sessions
Positive signals: ${thumbsUp} thumbs up, ${thumbsDown} thumbs down
Top observed traits: ${topTags.join(', ')||'Not enough data yet'}
Escalation incidents: ${escalations}
Recent teacher notes: ${notes.slice(-3).join(' | ')||'None recorded'}

Write 3-4 sentences. Start with a genuine strength. Mention attendance naturally. If concerns exist, frame as growth opportunities. End encouragingly.`;

    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,messages:[{role:'user',content:prompt}]})
      });
      const data=await res.json();
      setProfile(data.content?.[0]?.text||'Could not generate. Check your API key.');
    }catch{setProfile('Error generating profile.');}
    setLoading(false);
  }

  const inner=(
    <div style={{flex:1,overflowY:'auto'}}>
      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[{l:'Attendance',v:`${attendanceCount}/${totalSessions}`},{l:'Observations',v:obs.length},{l:'👍/👎',v:`${thumbsUp}/${thumbsDown}`},{l:'Flags',v:escalations}].map((s,i)=>(
          <div key={i} style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',borderRadius:8,padding:'7px 10px',textAlign:'center',flex:1}}>
            <div style={{fontSize:9,color:'var(--tx3)',marginBottom:1}}>{s.l}</div>
            <div style={{fontSize:14,fontWeight:800,color:'var(--tx)'}}>{s.v}</div>
          </div>
        ))}
      </div>
      {topTags.length>0&&(
        <div style={{marginBottom:10,display:'flex',flexWrap:'wrap',gap:4}}>
          {topTags.map((t,i)=>{
            const td=OBS_TAGS.find(x=>x.label===t);
            const colors={green:'var(--teal)',yellow:'var(--yellow)',red:'var(--coral)'};
            return<span key={i} style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:10,background:'var(--glass-bg)',border:'1px solid var(--glass-border)',color:colors[td?td.color:'yellow']||'var(--tx2)'}}>{t}</span>;
          })}
        </div>
      )}
      <div style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',borderRadius:10,padding:'10px 12px',minHeight:70,marginBottom:10,fontSize:13,color:profile?'var(--tx)':'var(--tx3)',lineHeight:1.6,fontStyle:profile?'normal':'italic'}}>
        {loading?'Generating...':profile||'Click below to generate an AI student profile.'}
      </div>
      <button className="obs-save-btn" onClick={generateProfile} disabled={loading} style={{opacity:loading?0.6:1}}>
        {loading?'Generating...':`✨ Generate Profile`}
      </button>
    </div>
  );

  if(inline) return inner;
  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div className="obs-history-popup" onClick={e=>e.stopPropagation()}>{inner}</div>
    </div>
  );
}


// ── ATTENDANCE PDF MODAL ──
function AttendancePDFModal({data,section,onClose}){
  const realSessions=data.sessions.filter(s=>!s.isDivider&&s.sessType!=='cancelled');

  // Extract unique months from session dates
  const monthSet=new Set();
  realSessions.forEach(s=>{
    // Try to parse a month out of the date string (e.g. "5 Apr", "Apr 5", "2 May")
    const parts=s.date.split(' ');
    const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    parts.forEach(p=>{
      if(monthNames.some(m=>p.startsWith(m))) monthSet.add(p.slice(0,3));
      else if(monthNames.includes(p)) monthSet.add(p);
    });
  });
  // Also add any months found via Date parsing
  const allMonths=Array.from(monthSet).length>0?Array.from(monthSet):['All'];
  const [selMonths,setSelMonths]=React.useState(new Set(allMonths));

  function toggleMonth(m){
    setSelMonths(prev=>{const n=new Set(prev);n.has(m)?n.delete(m):n.add(m);return n;});
  }

  function generatePDF(){
    // Filter sessions by selected months
    const filteredSessions=allMonths.length===1&&allMonths[0]==='All'
      ?realSessions
      :realSessions.filter(s=>{
        return [...selMonths].some(m=>s.date.includes(m));
      });
    if(filteredSessions.length===0){alert('No sessions found for selected months.');return;}
    // Map each filtered session to its real index in data.sessions (for attendance lookup)
    const filteredSessionIndices=filteredSessions.map(sess=>data.sessions.indexOf(sess));

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth();
    const pageH=doc.internal.pageSize.getHeight();
    const margin=30;
    const colW=Math.min(32,Math.floor((pageW-margin*2-120)/filteredSessions.length));
    const rowH=16;
    const nameW=120;
    const startX=margin;
    let y=margin+30;

    // Title
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.setTextColor(30,30,40);
    doc.text(`${section.name} — Attendance Register`,startX,margin+14);
    doc.setFontSize(9);
    doc.setFont('helvetica','normal');
    doc.setTextColor(120,120,140);
    doc.text(`Months: ${[...selMonths].join(', ')} · Generated ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}`,startX,margin+26);

    // Header row
    doc.setFillColor(240,240,248);
    doc.rect(startX,y,nameW+filteredSessions.length*colW+40,rowH,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(60,60,80);
    doc.text('Student',startX+3,y+11);
    doc.text('Att.',startX+nameW+3,y+11);
    filteredSessions.forEach((sess,i)=>{
      const x=startX+nameW+40+i*colW;
      // rotate date label
      doc.save();
      doc.text(sess.date,x+colW/2+2,y+10,{angle:0,maxWidth:colW-2,align:'center'});
      doc.restore();
    });
    y+=rowH;

    // Student rows
    doc.setFont('helvetica','normal');doc.setFontSize(8);
    data.students.forEach((st,si)=>{
      if(y+rowH>pageH-margin){doc.addPage();y=margin;}
      // alternating bg
      if(si%2===0){doc.setFillColor(250,250,253);doc.rect(startX,y,nameW+filteredSessions.length*colW+40,rowH,'F');}
      doc.setTextColor(30,30,40);
      doc.text(st.name,startX+3,y+11,{maxWidth:nameW-6});
      // Attendance count for filtered sessions
      const attCount=filteredSessions.filter((sess,ci)=>{
        const realIdx=filteredSessionIndices[ci];
        const v=st.attendance&&st.attendance[realIdx];
        return v==='present'||v==='late';
      }).length;
      doc.text(String(attCount),startX+nameW+8,y+11);
      filteredSessions.forEach((sess,ci)=>{
        const realIdx=filteredSessionIndices[ci];
        const v=st.attendance&&st.attendance[realIdx];
        const x=startX+nameW+40+ci*colW;
        if(v==='present'){doc.setTextColor(59,191,160);doc.text('P',x+colW/2,y+11,{align:'center'});}
        else if(v==='late'){doc.setTextColor(212,168,67);doc.text('L',x+colW/2,y+11,{align:'center'});}
        else if(v==='absent'){doc.setTextColor(232,112,90);doc.text('A',x+colW/2,y+11,{align:'center'});}
        else{doc.setTextColor(200,200,210);doc.text('-',x+colW/2,y+11,{align:'center'});}
        doc.setTextColor(30,30,40);
      });
      // row border
      doc.setDrawColor(220,220,230);doc.line(startX,y+rowH,startX+nameW+filteredSessions.length*colW+40,y+rowH);
      y+=rowH;
    });

    // Legend
    if(y+20<pageH-margin){
      y+=10;
      doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(140,140,160);
      doc.text('P = Present  L = Late  A = Absent  - = Not marked',startX,y);
    }

    doc.save(`${section.name.replace(/\s+/g,'-')}-Attendance-${[...selMonths].join('-')}.pdf`);
    onClose();
  }

  return(
    <div className="obs-popup-overlay" onClick={onClose}>
      <div className="add-session-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📥 Download Attendance PDF</div>
        <div style={{fontSize:12,color:'var(--tx3)',marginBottom:12}}>Select months to include. You can download multiple months together.</div>
        {allMonths[0]==='All'?(
          <div style={{fontSize:12,color:'var(--tx2)',marginBottom:12}}>All {realSessions.length} session{realSessions.length!==1?'s':''} will be included.</div>
        ):(
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
            {allMonths.map(m=>(
